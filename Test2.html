<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUS QR SCANNER (LINE MODE)</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #60a5fa;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        header { padding: 18px; text-align: center; font-size: 22px; font-weight: 800; color: var(--primary); }
        .container { max-width: 520px; margin: auto; padding: 16px; }
        #reader { border-radius: 16px; overflow: hidden; min-height: 250px; display: flex; align-items: center; justify-content: center; background: #1e293b; }
        .card { margin-top: 14px; background: var(--card); border-radius: 16px; padding: 14px; }
        .status { text-align: center; color: var(--muted); font-weight: 700; padding: 10px; }
        
        .uuid-display {
            margin-top: 10px; 
            padding: 12px; 
            background: #0f172a; 
            border-radius: 10px; 
            word-break: break-all; 
            font-family: monospace; 
            color: white; 
            font-size: 14px;
            pointer-events: none; 
            border: 1px solid #334155;
        }

        button { width: 100%; border: none; border-radius: 12px; padding: 14px; margin-top: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
        .process-btn { background: #2563eb; color: white; }
        .success { color: var(--success); }
        .error { color: #ef4444; }
        
        /* 🌟 สไตล์สำหรับหน้าจอโหลดและหน้าจอบล็อก 🌟 */
        .overlay-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px;
        }
        #loadingAuth { background: #0f172a; color: white; }
        #deniedAuth { background: rgba(239, 68, 68, 0.95); color: white; backdrop-filter: blur(10px); }
    </style>
</head>

<body>

<div id="loadingAuth" class="overlay-screen">
    <i class="fa-solid fa-shield-halved fa-beat-fade" style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"></i>
    <div style="font-size: 18px; font-weight: bold;">กำลังตรวจสอบสิทธิ์พนักงาน...</div>
</div>

<div id="deniedAuth" class="overlay-screen" style="display: none;">
    <i class="fa-solid fa-hand" style="font-size: 70px; margin-bottom: 20px;"></i>
    <div style="font-size: 26px; font-weight: 900; margin-bottom: 10px;">การเข้าถึงถูกปฏิเสธ!</div>
    <div id="deniedMsg" style="font-size: 16px;">อุปกรณ์นี้เป็นของพนักงาน ไม่อนุญาตให้ใช้เว็บสแกน</div>
</div>

<div id="mainScannerApp" style="display:none;">
    <header>BUS QR SCANNER</header>
    <div class="container">
        <div id="reader">
            <div style="color: #94a3b8;"><i class="fa-solid fa-spinner fa-spin"></i> กำลังเตรียมกล้อง...</div>
        </div>
        <div class="card">
            <div id="statusBox" class="status">● Ready to scan</div>
            <div id="scanCount" style="margin-top:10px; text-align:center; color:#94a3b8;">สแกนแล้ว 0 รายการ</div>
        </div>
        <button class="process-btn" onclick="processData()">ประมวลผล</button>
    </div>
</div>

<script>
    const SCANNER_LIFF_ID = "2007956727-gZOxrA26"; // LIFF ID ของหน้าเว็บสแกน (เว็บที่ 2)
    const SAVE_API = "https://script.google.com/macros/s/AKfycbxXBx3J64GaNQORciPtSiYcLA87q3x9fzAM1Jqhv4rZ24EbNDH1gZz3ip4tFFkdFXor/exec";
    
    let scanner;
    let scannedUUIDs = [];

    // 🌟 เริ่มกระบวนการตรวจสอบสิทธิ์ทันทีที่โหลดเว็บ 🌟
    window.onload = async () => { 
        try {
            await liff.init({ liffId: SCANNER_LIFF_ID });
            
            // บังคับล็อกอินดึงบัญชี LINE
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            const profile = await liff.getProfile();
            const currentLineUserId = profile.userId;

            // 🚨 ยิงไปถาม Apps Script ว่า Line ID นี้เป็นพนักงานแม่บ้านหรือไม่?
            const response = await fetch(`${SAVE_API}?action=verifyScanner&scannerLineId=${currentLineUserId}`);
            const result = await response.json();

            // ถ้าเจอว่าเป็นพนักงานแม่บ้าน -> โชว์หน้าแดง บล็อกทันที!
            if (result.allowed === false) {
                document.getElementById('loadingAuth').style.display = 'none';
                document.getElementById('deniedAuth').style.display = 'flex';
                if(result.message) document.getElementById('deniedMsg').innerText = result.message;
                return; 
            }
        } catch (error) {
            console.error("LIFF Check Failed", error);
        }

        // ถ้ารอดการตรวจสอบ (หัวหน้างานเข้าใช้งาน)
        document.getElementById('loadingAuth').style.display = 'none';
        document.getElementById('mainScannerApp').style.display = 'block';
        await startScanner(); 
    };

    // ==========================================
    // โค้ดกล้องและการบันทึก
    // ==========================================
    async function startScanner() {
        if (!scanner) {
            scanner = new Html5Qrcode("reader");
        }
        try {
            document.getElementById("reader").innerHTML = ""; 
            await scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScan);
        } catch (err) {
            document.getElementById("reader").innerHTML = `
                <div style="padding: 20px; text-align: center; color: white;">
                    <i class="fa-solid fa-camera-rotate" style="font-size: 40px; margin-bottom: 15px; color: #60a5fa;"></i>
                    <div style="margin-bottom: 15px;">กรุณาอนุญาตให้ใช้กล้อง</div>
                    <button onclick="startScanner()" style="background: #10b981; color: white; padding: 10px; border-radius: 8px;">ลองใหม่อีกครั้ง</button>
                </div>
            `;
        }
    }

    async function onScan(decodedText) {
        try { await scanner.pause(); } catch(err) {}

        const raw = decodedText.trim();
        const pattern = /id=(.+)$/i; 
        const match = raw.match(pattern);

        if (!match) {
            setStatus("QR ไม่ถูกต้อง", true);
            setTimeout(async () => { await scanner.resume(); }, 1000);
            return;
        }

        const uuid = match[1].trim();
        if (!scannedUUIDs.includes(uuid)) {
            scannedUUIDs.push(uuid);
            updateCount();
        }
        setStatus(uuid, false);
        setTimeout(async () => { await scanner.resume(); }, 700);
    }

    function setStatus(text, isError) {
        const el = document.getElementById("statusBox");
        el.innerHTML = isError ? `✖ ${text}` : `✔ ${text}`;
        el.className = "status " + (isError ? "error" : "success");
    }

    function updateCount() {
        document.getElementById("scanCount").innerHTML = "สแกนแล้ว " + scannedUUIDs.length + " รายการ";
    }

    function processData() {
        if (scannedUUIDs.length === 0) { alert("ยังไม่มีข้อมูล"); return; }
        try { if(scanner) scanner.stop(); } catch(err) {}

        // 🌟 ดึงรหัสพนักงานที่เคยพิมพ์ไว้จาก LocalStorage (เหมือนเว็บที่ 1)
        const savedScannerId = localStorage.getItem("scannerId") || "";

        document.body.innerHTML = `<div style="height:100vh; display:flex; align-items:center; justify-content:center; color:white;">กำลังประมวลผล...</div>`;

        setTimeout(() => {
            let html = `
                <header style="text-align:center; padding:18px; color:#60a5fa; font-size:22px;">BUS QR SCANNER</header>
                <div class="container" style="max-width:520px; margin:auto; padding:18px;">
                    <div style="background:#1e293b; border-radius:16px; padding:18px;">
                        <div style="margin-bottom:12px; font-weight:700; color:#60a5fa; font-size:18px;">UUID ที่สแกน</div>
            `;
            
            scannedUUIDs.forEach(uuid => {
                html += `<div class="uuid-display">${uuid}</div>`;
            });

            // 🌟 กลับมาใช้ Input Box ให้หัวหน้าพิมพ์และจำค่า
            html += `
                        <div style="margin-top:22px; color:#94a3b8; font-size:15px;">รหัสพนักงานผู้สแกน</div>
                        <input id="scannerId" placeholder="เช่น K0123" value="${savedScannerId}" 
                               style="width:100%; padding:14px; border:none; border-radius:10px; background:#0f172a; color:white; font-size:16px; margin-top:5px; box-sizing:border-box;">
                        
                        <button onclick="sendData()" style="background:#10b981; color:white; margin-top:20px;">บันทึกข้อมูลเข้าสู่ระบบ</button>
                        <button onclick="location.reload()" style="background:transparent; border:1px solid #475569; color:#94a3b8; margin-top:12px;">ยกเลิก / เริ่มใหม่</button>
                    </div>
                </div>
            `;
            document.body.innerHTML = html;
        }, 600);
    }

    async function captureSelfie() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.createElement("video");
            video.srcObject = stream; video.playsInline = true; await video.play();
            await new Promise(r => setTimeout(r, 1200));
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0);
            stream.getTracks().forEach(t => t.stop());
            return canvas.toDataURL("image/jpeg", 0.35);
        } catch(err) { return ""; }
    }

    async function sendData() {
        // 🌟 ดึงค่าจากการพิมพ์ (และแปลงเป็นตัวพิมพ์ใหญ่)
        const scannerId = document.getElementById("scannerId").value.trim().toUpperCase();
        if (!scannerId) { alert("กรุณากรอกรหัสพนักงานผู้สแกน"); return; }
        
        // 🌟 จำค่าลงเครื่อง
        localStorage.setItem("scannerId", scannerId);
        
        document.body.innerHTML = `<div style="height:100vh; display:flex; align-items:center; justify-content:center; background:#0f172a; color:white;">กำลังบันทึกข้อมูล...</div>`;
        
        const selfie = await captureSelfie();
        const response = await fetch(SAVE_API, {
            method: "POST",
            body: JSON.stringify({ action: "saveData", uuidList: scannedUUIDs, scannerId: scannerId, selfie: selfie })
        });
        
        const result = await response.json();

        let alertMsg = "";
        if (result.expiredList && result.expiredList.length > 0) {
            alertMsg += "❌ รายการหมดอายุ (สแกนไม่สำเร็จ):\n";
            result.expiredList.forEach(item => { alertMsg += "- " + item.name + "\n"; });
            alertMsg += "\n";
        }
        
        if (result.updatedCount > 0) {
            alertMsg += "✅ บันทึกสำเร็จ " + result.updatedCount + " รายการ";
        }

        alert(alertMsg);

        if (result.updatedCount > 0) {
            document.body.innerHTML = `
                <div style="height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; background:#0f172a; color:white;">
                    <div style="font-size:60px;">${result.expiredList.length > 0 ? '⚠️' : '✔'}</div>
                    <div style="font-size:24px; font-weight:700;">ประมวลผลเสร็จสิ้น</div>
                    <div style="color:#94a3b8; margin-top:10px;">หน้าต่างจะปิดอัตโนมัติ...</div>
                </div>
            `;
            setTimeout(() => {
                if (typeof liff !== 'undefined' && liff.isInClient()) {
                    liff.closeWindow();
                } else {
                    window.open('', '_self'); window.close();
                }
            }, 3000);
        } else {
            location.reload(); 
        }
    }

    window.addEventListener('blur', () => document.body.classList.add('secure-blur'));
    window.addEventListener('focus', () => document.body.classList.remove('secure-blur'));
</script>
</body>
</html>
