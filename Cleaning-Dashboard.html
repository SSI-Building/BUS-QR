<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>BUS QR - Interactive Dashboard 2026</title>

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 🎨 ตัวแปรสีพื้นฐาน (Light Mode) --- */
        :root {
            --primary: #4f46e5;
            --primary2: #6366f1;
            --bg-gradient-1: #ffffff;
            --bg-gradient-2: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --ot-color: #f97316;
            --radial-1: rgba(79, 70, 229, .12);
            --radial-2: rgba(99, 102, 241, .08);
            --table-thead: #f8fafc;
            --table-hover: #fafaff;
            --table-border: #f1f5f9;
            --card-active-bg: #f4f2ff;
            --badge-scanner-bg: #f1f5f9;
        }

        /* --- 🌙 ตัวแปรสีสำหรับโหมดมืด (Dark Mode) --- */
        [data-theme="dark"] {
            --primary: #818cf8;
            --primary2: #6366f1;
            --bg-gradient-1: #0f172a;
            --bg-gradient-2: #020617;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #334155;
            --ot-color: #fb923c;
            --radial-1: rgba(129, 140, 248, .15);
            --radial-2: rgba(99, 102, 241, .1);
            --table-thead: #1e293b;
            --table-hover: #1e293bba;
            --table-border: #334155;
            --card-active-bg: #2e3b52;
            --badge-scanner-bg: #334155;
        }

        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(180deg, var(--bg-gradient-1), var(--bg-gradient-2));
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body:before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at top right, var(--radial-1), transparent 35%),
                radial-gradient(circle at bottom left, var(--radial-2), transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            height: 100vh;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .fixed-top-section {
            flex-shrink: 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .title h1 { margin: 0; font-size: 28px; color: var(--text); }
        .title p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }

        /* --- ☀️/🌙 ปุ่มสลับธีมบริเวณมุมขวาบน --- */
        .theme-toggle-btn {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .03);
        }
        .theme-toggle-btn:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.15);
        }

        /* --- แถบ KPI Cards --- */
        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 18px;
            box-shadow: 0 4px 12px rgba(0, 0, 0, .03);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        
        .card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.08);
            border-color: var(--primary2);
        }

        .card.active-filter {
            background: var(--card-active-bg);
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
        }

        .card span { color: var(--muted); font-size: 12px; font-weight: 500; }
        
        .card-content {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 4px;
        }
        .card h2 { margin: 0; font-size: 24px; font-weight: 700; color: var(--text); }
        
        .card .filter-indicator {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 6px;
            display: none;
        }
        .card.active-filter .filter-indicator { display: inline-block; }

        /* --- Toolbar --- */
        .toolbar {
            background: var(--card);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 280px;
            position: relative;
        }
        .search-box i {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--muted);
        }
        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 40px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            border-radius: 10px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--primary); }

        .filter-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .date-input-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-gradient-2);
            padding: 4px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .date-input-wrapper label { font-size: 13px; font-weight: 600; color: var(--muted); }
        .date-input-wrapper input[type="date"] {
            border: none; background: transparent; outline: none;
            font-family: 'Prompt', sans-serif; font-size: 14px; color: var(--text);
            cursor: pointer;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { background: var(--primary2); transform: translateY(-1px); }
        
        .btn-muted {
            background: var(--bg-gradient-2); color: var(--muted); border: 1px solid var(--border);
        }
        .btn-muted:hover { background: var(--border); }

        /* --- ส่วนตารางสลิด์เลื่อนอิสระ --- */
        .table-wrap {
            background: var(--card);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 40px rgba(0, 0, 0, .05);
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
        }

        table { width: 100%; border-collapse: collapse; }
        
        thead th {
            position: sticky; 
            top: 0; 
            background: var(--table-thead);
            z-index: 10;
            text-transform: uppercase; font-size: 12px;
            letter-spacing: .5px; color: var(--muted);
            padding: 14px 16px; text-align: left;
            border-bottom: 1px solid var(--border);
            box-shadow: inset 0 -1px 0 var(--border);
        }

        th, td { padding: 12px 16px; border-bottom: 1px solid var(--table-border); font-size: 14px; vertical-align: middle; }
        tbody tr:hover { background: var(--table-hover); }
        tbody tr:last-child td { border-bottom: none; }

        .text-nowrap { white-space: nowrap; }
        .ot-badge { color: var(--ot-color); font-weight: 700; margin-left: 4px; font-size: 11px; }

        /* --- Profile Avatar --- */
        .profile { display: flex; align-items: center; gap: 12px; }
        .avatar {
            width: 36px; height: 36px; border-radius: 10px;
            background: var(--bg-gradient-2); display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-weight: 700; font-size: 14px;
            object-fit: cover; border: 2px solid var(--border);
            transition: transform 0.2s; cursor: pointer;
        }
        img.avatar:hover { transform: scale(1.15); border-color: var(--primary); }

        /* --- Scan Record Cell --- */
        .scan-cell { display: flex; align-items: center; gap: 10px; }
        .time-text { font-weight: 700; color: var(--primary); font-size: 14px; }
        .badge-scanner {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 11px; color: var(--muted); background: var(--badge-scanner-bg);
            padding: 2px 6px; border-radius: 4px;
        }
        .badge-scanner img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; cursor: pointer; }

        /* --- Status Badges --- */
        .status-container { display: flex; flex-wrap: wrap; gap: 4px; }
        .status { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; text-align: center; white-space: nowrap; }
        .success { background: #dcfce7; color: #166534; }
        .warning { background: #fef3c7; color: #92400e; }
        .danger { background: #fee2e2; color: #991b1b; }
        .info { background: #e0e7ff; color: #3730a3; }

        .reason-text { font-size: 13px; color: var(--muted); white-space: pre-wrap; word-break: break-word; }
        .loading-state { text-align: center; padding: 60px; color: var(--muted); font-size: 15px; }

        @media(max-width:900px){ .cards { grid-template-columns: repeat(2, 1fr); } }
        @media(max-width:600px){
            body { padding: 0; }
            .container { padding: 12px; height: 100vh; }
            .cards { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
            .title h1 { font-size: 22px; }
            .toolbar { flex-direction: column; align-items: stretch; padding: 12px; margin-bottom: 12px; gap: 10px; }
            .filter-controls { justify-content: space-between; }
            .search-box { min-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="fixed-top-section">
        <div class="topbar">
            <div class="title">
                <h1><i class="fa-solid fa-clipboard-list" style="color: var(--primary);"></i> Cleaning Dashboard</h1>
                <p>Work Assignment Tracking System</p>
            </div>
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="toggleTheme()" title="สลับโหมด มืด/สว่าง">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>

        <div class="cards">
            <div class="card active-filter" id="card-all" onclick="selectStatusFilter('ALL')">
                <span>พนักงานปฏิบัติงาน</span>
                <div class="card-content">
                    <h2 id="totalEmp">0</h2>
                    <span class="filter-indicator success">ดูทั้งหมด</span>
                </div>
            </div>
            <div class="card" id="card-late" onclick="selectStatusFilter('LATE')">
                <span>เข้างานสาย</span>
                <div class="card-content">
                    <h2 id="lateEmp">0</h2>
                    <span class="filter-indicator danger" style="background:#fee2e2; color:#991b1b;">กำลังกรอง</span>
                </div>
            </div>
            <div class="card" id="card-early" onclick="selectStatusFilter('EARLY')">
                <span>ออกก่อนเวลา</span>
                <div class="card-content">
                    <h2 id="earlyEmp">0</h2>
                    <span class="filter-indicator danger" style="background:#fee2e2; color:#991b1b;">กำลังกรอง</span>
                </div>
            </div>
            <div class="card" id="card-ot" onclick="selectStatusFilter('OT')">
                <span>ทำงานโอเวอร์ไทม์ (OT)</span>
                <div class="card-content">
                    <h2 id="otEmp">0</h2>
                    <span class="filter-indicator info" style="background:#e0e7ff; color:#3730a3;">กำลังกรอง</span>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="ค้นหาด้วยชื่อ หรือรหัสพนักงาน..." oninput="applyFilter()">
            </div>

            <div class="filter-controls">
                <div class="date-input-wrapper">
                    <label><i class="fa-solid fa-calendar-days"></i> วันที่:</label>
                    <input type="date" id="dateFilter" onchange="applyFilter()">
                </div>
                <button class="btn btn-muted" onclick="clearDateFilter()">ดูทั้งหมด</button>
                <button class="btn" onclick="loadData()"><i class="fa-solid fa-rotate-right"></i> Refresh</button>
            </div>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th class="text-nowrap">รหัส</th>
                    <th class="text-nowrap">ชื่อพนักงาน</th>
                    <th class="text-nowrap">วันที่</th>
                    <th class="text-nowrap">เวลาเข้า</th>
                    <th class="text-nowrap">เวลาออก</th>
                    <th class="text-nowrap">สถานะ</th>
                    <th>เหตุผล / หมายเหตุ</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="7">
                        <div class="loading-state">
                            <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>กำลังเตรียมระบบประมวลผลข้อมูล...
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXBx3J64GaNQORciPtSiYcLA87q3x9fzAM1Jqhv4rZ24EbNDH1gZz3ip4tFFkdFXor/exec";
let cachedRawData = [];
let currentStatusFilter = "ALL"; 

// 🌓 ฟังก์ชันสลับโหมดกลางวัน/กลางคืน และบันทึกลงหน่วยความจำ
function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    let newTheme = 'light';
    
    if (currentTheme !== 'dark') {
        newTheme = 'dark';
    }
    
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('dashboard-theme', newTheme); // จำสถานะธีมไว้ใช้ครั้งถัดไป
    updateThemeIcon(newTheme);
}

// อัปเดตรูปไอคอนบนปุ่มสลับธีม
function updateThemeIcon(theme) {
    const btn = document.getElementById('themeToggleBtn');
    if (theme === 'dark') {
        btn.innerHTML = `<i class="fa-solid fa-sun" style="color: #f59e0b;"></i>`;
    } else {
        btn.innerHTML = `<i class="fa-solid fa-moon"></i>`;
    }
}

// ฟังก์ชันดึงข้อมูลจากระบบ
async function loadData() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = `<tr><td colspan="7"><div class="loading-state"><i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>กำลังโหลดข้อมูล...</div></td></tr>`;

    try {
        const response = await fetch(`${SCRIPT_URL}?action=getDashboardData`);
        const result = await response.json();

        if (result.success) {
            cachedRawData = result.data;
            applyFilter();
        } else {
            tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:30px; color:red;">เกิดข้อผิดพลาด: ${result.message || 'ไม่สามารถดึงข้อมูลได้'}</td></tr>`;
        }
    } catch (error) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:30px; color:red;">เชื่อมต่อฐานข้อมูลล้มเหลว กรุณากดปุ่มเพื่อลองใหม่อีกครั้ง</td></tr>`;
    }
}

// ฟังก์ชันเมื่อผู้ใช้กดเลือกการ์ด KPI ด้านบน
function selectStatusFilter(statusType) {
    currentStatusFilter = statusType;
    
    document.getElementById("card-all").classList.remove("active-filter");
    document.getElementById("card-late").classList.remove("active-filter");
    document.getElementById("card-early").classList.remove("active-filter");
    document.getElementById("card-ot").classList.remove("active-filter");
    
    if(statusType === "ALL") document.getElementById("card-all").classList.add("active-filter");
    if(statusType === "LATE") document.getElementById("card-late").classList.add("active-filter");
    if(statusType === "EARLY") document.getElementById("card-early").classList.add("active-filter");
    if(statusType === "OT") document.getElementById("card-ot").classList.add("active-filter");
    
    applyFilter(); 
}

// รวมศุนย์การคัดกรองข้อมูลทั้งหมด
function applyFilter() {
    const filterVal = document.getElementById("dateFilter").value;
    const searchVal = document.getElementById("searchInput").value.toLowerCase().trim();
    let formattedFilterDate = "";
    
    if (filterVal) {
        const parts = filterVal.split('-');
        formattedFilterDate = `${parts[2]}/${parts[1]}/${parts[0]}`; 
    }
    
    processAndRenderData(cachedRawData, formattedFilterDate, searchVal, currentStatusFilter);
}

function clearDateFilter() {
    document.getElementById("dateFilter").value = "";
    applyFilter();
}

// ฟังก์ชันประมวลผลคำนวณและแสดงผลลัพธ์
function processAndRenderData(rawData, filterDate, searchQuery, statusFilter) {
    const tbody = document.getElementById("tableBody");
    const grouped = {};
    
    const now = new Date();
    const todayStr = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
    const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

    let countTotal = 0;
    let countLate = 0;
    let countEarly = 0;
    let countOT = 0;

    rawData.forEach(row => {
        if (!row.scanTime || row.scanTime === "ยังไม่สแกน" || String(row.scanTime).trim() === "") return; 
        if (!row.dateOnly) return;

        let cleanDate = String(row.dateOnly).trim();
        if (cleanDate.includes('T')) {
            const dObj = new Date(cleanDate);
            cleanDate = `${String(dObj.getDate()).padStart(2, '0')}/${String(dObj.getMonth() + 1).padStart(2, '0')}/${dObj.getFullYear()}`;
        } 
        else if (cleanDate.includes('-') && cleanDate.split('-')[0].length === 4) {
            let parts = cleanDate.split('-');
            cleanDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        if (filterDate && cleanDate !== filterDate) return;

        const nameMatch = row.fullName ? row.fullName.toLowerCase().includes(searchQuery) : false;
        const idMatch = row.empId ? String(row.empId).toLowerCase().includes(searchQuery) : false;
        if (searchQuery && !nameMatch && !idMatch) return;

        const timeMatch = row.scanTime.match(/\d{2}:\d{2}:\d{2}/);
        const timeStr = timeMatch ? timeMatch[0].substring(0, 5) : "";

        const key = `${row.empId}_${cleanDate}`;
        
        if (!grouped[key]) {
            grouped[key] = {
                empId: row.empId,
                fullName: row.fullName,
                profilePic: row.profilePic, 
                dateOnly: cleanDate,
                scans: [],
                reasons: [] 
            };
        }

        grouped[key].scans.push({
            timeStr: timeStr,
            scannerId: row.scannerId,
            imageUrl: row.imageUrl
        });

        if (row.reason && row.reason !== "-" && !grouped[key].reasons.includes(row.reason)) {
            grouped[key].reasons.push(row.reason);
        }
    });

    const displayRows = [];

    Object.values(grouped).forEach(group => {
        group.scans.sort((a, b) => a.timeStr.localeCompare(b.timeStr));
        const reasonText = group.reasons.length > 0 ? `<div class="reason-text">${group.reasons.join('<br>')}</div>` : "-";

        for (let i = 0; i < group.scans.length; i += 2) {
            let sIn = group.scans[i];
            let sOut = group.scans[i + 1]; 
            const isOT = (i >= 2); 

            if (sIn && !sOut) {
                if (sIn.timeStr >= "12:00") {
                    sOut = sIn;
                    sIn = null;
                }
            }

            let statusArr = [];
            let rowHasLate = false;
            let rowHasEarly = false;
            
            if (!isOT) {
                if (sIn && !sOut) {
                    if (!(group.dateOnly === todayStr && currentTimeStr < "16:25")) {
                        statusArr.push('<span class="status warning">ไม่บันทึกเวลาออก</span>');
                    }
                }
                
                if (!sIn && sOut) statusArr.push('<span class="status warning">ไม่บันทึกเวลาเข้า</span>');
                
                if (sIn && sIn.timeStr > "08:45") {
                    statusArr.push('<span class="status danger">เข้างานสาย</span>');
                    countLate++;
                    rowHasLate = true;
                }
                
                if (sOut && sOut.timeStr < "16:30") {
                    statusArr.push('<span class="status danger">ออกก่อนเวลา</span>');
                    countEarly++;
                    rowHasEarly = true;
                }
                
                if (sIn && sOut && statusArr.length === 0) {
                    statusArr.push('<span class="status success">ปกติ</span>');
                }
            } else {
                statusArr.push('<span class="status info">OT</span>');
                countOT++;
            }

            if (statusFilter === "LATE" && !rowHasLate) continue;
            if (statusFilter === "EARLY" && !rowHasEarly) continue;
            if (statusFilter === "OT" && !isOT) continue;

            displayRows.push({
                empId: group.empId,
                fullName: group.fullName,
                profilePic: group.profilePic,
                dateOnly: group.dateOnly,
                sIn: sIn,
                sOut: sOut,
                isOT: isOT,
                statusHtml: `<div class="status-container">${statusArr.join('')}</div>`,
                reasonText: reasonText,
                sortDate: group.dateOnly.split('/').reverse().join(''),
                sortTime: sIn ? sIn.timeStr : (sOut ? sOut.timeStr : "") 
            });
        }
    });

    // นับจำนวนพนักงานจากข้อมูลที่ถูกกรองวันที่และคำค้นหาเรียบร้อยแล้ว (grouped)
    countTotal = new Set(Object.values(grouped).map(g => g.empId)).size;
    
    document.getElementById("totalEmp").innerText = countTotal;
    document.getElementById("lateEmp").innerText = countLate;
    document.getElementById("earlyEmp").innerText = countEarly;
    document.getElementById("otEmp").innerText = countOT;

    displayRows.sort((a, b) => {
         if (b.sortDate !== a.sortDate) return b.sortDate.localeCompare(a.sortDate);
         if (b.sortTime !== a.sortTime) return b.sortTime.localeCompare(a.sortTime);
         return a.empId.localeCompare(b.empId);
    });

    if (displayRows.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding: 40px; color: var(--muted);">ไม่พบรายชื่อในกลุ่มตัวกรองสถานะที่เลือก</td></tr>`;
        return;
    }

    const buildScanCell = (scan) => {
        if (!scan) return `<span style="color:#cbd5e1;">-</span>`;
        
        let imgHtml = "";
        if (scan.imageUrl) {
            if (scan.imageUrl.includes("id=")) {
                const fileId = scan.imageUrl.split("id=")[1].split("&")[0];
                const thumbnailUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w100`;
                imgHtml = `<img src="${thumbnailUrl}" onclick="window.open('${scan.imageUrl}', '_blank')" title="คลิกเปิดดูหลักฐานเต็ม">`;
            } 
            else if (scan.imageUrl.startsWith("http")) {
                imgHtml = `<img src="${scan.imageUrl}" onclick="window.open('${scan.imageUrl}', '_blank')" title="เปิดดูหลักฐาน">`;
            }
        }
        
        return `
            <div class="scan-cell">
                <span class="time-text">${scan.timeStr}</span>
                <div class="badge-scanner">
                    <i class="fa-solid fa-user-check"></i> ${scan.scannerId}
                    ${imgHtml}
                </div>
            </div>
        `;
    };

    let html = "";
    displayRows.forEach(row => {
        let firstLetter = row.fullName ? row.fullName.charAt(0) : "E";
        let profileHtml = `
            <div class="profile">
                ${row.profilePic && row.profilePic !== "" ? 
                    `<img src="${row.profilePic}" class="avatar" alt="Profile" onclick="window.open('${row.profilePic}', '_blank')" onerror="this.onerror=null; this.outerHTML='<div class=\\'avatar\\'>${firstLetter}</div>';">` : 
                    `<div class="avatar">${firstLetter}</div>`
                }
                <div>
                    <span style="font-weight: 500;">${row.fullName}</span>
                    ${row.isOT ? `<sup class="ot-badge">OT</sup>` : ''}
                </div>
            </div>
        `;

        html += `
            <tr>
                <td class="text-nowrap"><strong>${row.empId}</strong></td>
                <td class="text-nowrap">${profileHtml}</td>
                <td class="text-nowrap" style="color: var(--muted); font-weight: 500;">${row.dateOnly}</td>
                <td class="text-nowrap">${buildScanCell(row.sIn)}</td>
                <td class="text-nowrap">${buildScanCell(row.sOut)}</td>
                <td class="text-nowrap">${row.statusHtml}</td>
                <td>${row.reasonText}</td>
            </tr>
        `;
    });

    tbody.innerHTML = html;
}

// เมื่อโหลดหน้าจอ ให้ดึงสถานะธีมเดิมที่เคยบันทึกไว้
window.onload = function() {
    const savedTheme = localStorage.getItem('dashboard-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeIcon(savedTheme);

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    
    document.getElementById("dateFilter").value = `${yyyy}-${mm}-${dd}`;
    loadData();
};
</script>

</body>
</html>
