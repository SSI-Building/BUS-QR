<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Rating - QR System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { 
  --primary: #60a5fa;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f8fafc;
  --star-off: #475569;
  --star-on: #fbbf24;
}

body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  padding: 20px;
  background: rgba(30, 41, 59, 0.8);
  backdrop-filter: blur(10px);
  color: var(--primary);
  font-weight: 800;
  font-size: 1.2rem;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: 0 auto;
  width: 100%;
  box-sizing: border-box;
}

#reader {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
  background: #000;
}

.status-box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 20px 0;
  font-size: 0.95rem;
  color: #94a3b8;
}

#result-panel {
  margin: 20px 0;
  padding: 25px;
  border-radius: 16px;
  display: none;
  animation: slideUp 0.3s ease-out;
  text-align: center;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.emp-name { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
.emp-pos { font-size: 1rem; color: #94a3b8; margin-bottom: 20px; }

/* Rating Stars */
.star-group {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 25px;
}
.star-btn {
  font-size: 40px;
  background: none;
  border: none;
  color: var(--star-off);
  cursor: pointer;
  transition: transform 0.2s;
}
.star-btn.active { color: var(--star-on); transform: scale(1.1); }

button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  font-size: 1rem;
  transition: all 0.2s;
}

#submitBtn { background: var(--success); color: white; margin-bottom: 10px; }
#cancelBtn { background: transparent; color: #94a3b8; border: 1px solid #475569; }

button:active { transform: scale(0.98); }

.icon { width: 20px; height: 20px; fill: currentColor; vertical-align: middle; }

/* SVG Spinner */
.spinner {
  animation: rotate 2s linear infinite;
  width: 20px; height: 20px;
}
@keyframes rotate { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<header>STAFF RATING SYSTEM</header>

<div class="container">
  <!-- ส่วนสแกน -->
  <div id="scanner-section">
    <div id="reader"></div>
    <div id="statusText" class="status-box">
      <svg class="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-dasharray="80, 200" stroke-dashoffset="0" stroke-linecap="round"></circle></svg>
      <span>กำลังเปิดกล้อง...</span>
    </div>
  </div>

  <!-- ส่วนแสดงผลและประเมิน -->
  <div id="result-panel">
    <div id="emp-info">
        <div class="emp-name" id="disp-name">พนัดดา คำทะเนตร</div>
        <div class="emp-pos" id="disp-pos">ช่างเทคนิค</div>
    </div>
    
    <div class="star-group" id="star-container">
        <button class="star-btn" onclick="setRating(1)">★</button>
        <button class="star-btn" onclick="setRating(2)">★</button>
        <button class="star-btn" onclick="setRating(3)">★</button>
        <button class="star-btn" onclick="setRating(4)">★</button>
        <button class="star-btn" onclick="setRating(5)">★</button>
    </div>

    <button id="submitBtn" onclick="sendData()">
        ยืนยันการให้คะแนน
    </button>
    <button id="cancelBtn" onclick="restartScan()">ยกเลิก</button>
  </div>
</div>
<div id="emp-info">
    <div class="emp-name" id="disp-name" style="text-align: left; font-size: 1.1rem;"></div>
    <div class="emp-pos" id="disp-pos" style="text-align: left; font-size: 1.1rem; color: #f8fafc;"></div>
</div>

<script>
let html5QrCode;
let currentEmployee = null;
let selectedRating = 0;

// ฟังก์ชันเริ่มต้นกล้อง
async function startScanner() {
    html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 10, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0
    };

    try {
        await html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess
        );
        setStatus("success", "พร้อมสแกน QR Code");
    } catch (err) {
        console.error(err);
        setStatus("error", "ไม่สามารถเข้าถึงกล้องได้ (โปรดใช้ HTTPS)");
    }
}

function setStatus(type, text) {
    const statusBox = document.getElementById("statusText");
    let icon = '';
    if(type === 'success') icon = '✅';
    if(type === 'error') icon = '❌';
    if(type === 'loading') icon = '<svg class="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-dasharray="80, 200" stroke-dashoffset="0" stroke-linecap="round"></circle></svg>';
    
    statusBox.innerHTML = `${icon} <span>${text}</span>`;
}

async function onScanSuccess(decodedText) {
    // 1. ล้างอักขระขยะ () ออกให้หมด โดยกรองเอาเฉพาะตัวอักษรไทย อังกฤษ ตัวเลข และเครื่องหมาย /
    const cleanText = decodedText.replace(/[^\u0E00-\u0E7F\ a-zA-Z0-9/]/g, '').trim();
    
    // 2. แยกข้อมูลด้วย / 
    const data = cleanText.split('/');
    
    if(data.length >= 3) {
        currentEmployee = {
            fname: data[0].trim(),
            lname: data[1].trim(),
            position: data[2].trim()
        };

        try { await html5QrCode.stop(); } catch(e) {}
        
        document.getElementById("scanner-section").style.display = "none";
        document.getElementById("result-panel").style.display = "block";
        
        // 3. แสดงผล: เว้นวรรค 3 ครั้งระหว่างชื่อ-นามสกุล โดยใช้ &nbsp; (Non-Breaking Space)
        // &nbsp;&nbsp;&nbsp; คือการทำเว้นวรรค 3 ครั้งในหน้าเว็บครับ
        document.getElementById("disp-name").innerHTML = `ชื่อพนักงาน: ${currentEmployee.fname}&nbsp;&nbsp;&nbsp;${currentEmployee.lname}`;
        
        // 4. ส่วนตำแหน่ง ตัดอักขระขยะออกเรียบร้อยแล้ว แสดงผลปกติ
        document.getElementById("disp-pos").innerHTML = `ตำแหน่ง: ${currentEmployee.position}`;
        
    } else {
        alert("รูปแบบ QR Code ไม่ถูกต้อง (ต้องเป็น ชื่อ/นามสกุล/ตำแหน่ง)");
        restartScan();
    }
}

function setRating(n) {
    selectedRating = n;
    const stars = document.querySelectorAll('.star-btn');
    stars.forEach((s, i) => {
        s.classList.toggle('active', i < n);
    });
}

function sendData() {
    if(selectedRating === 0) return alert("โปรดเลือกคะแนนดาว");
    
    // แจ้งเตือนตามโจทย์
    const msg = `บันทึกคะแนนเรียบร้อย!\n\nพนักงาน: ${currentEmployee.fname}\nคะแนน: ${selectedRating} ดาว`;
    alert(msg);
    
    // รีเซ็ตกลับไปหน้าสแกน
    restartScan();
}

function restartScan() {
    currentEmployee = null;
    selectedRating = 0;
    document.querySelectorAll('.star-btn').forEach(s => s.classList.remove('active'));
    document.getElementById("scanner-section").style.display = "block";
    document.getElementById("result-panel").style.display = "none";
    startScanner();
}

// เริ่มทำงาน
window.onload = startScanner;
</script>

</body>
</html>
