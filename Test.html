<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee QR Rating System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --primary:#60a5fa;
    --success:#10b981;
    --warning:#fbbf24;
}

body{
    margin:0;
    font-family:Segoe UI;
    background:var(--bg);
    color:var(--text);
}

header{
    text-align:center;
    padding:18px;
    font-weight:800;
    color:var(--primary);
    background:rgba(30,41,59,.8);
}

.container{
    max-width:520px;
    margin:auto;
    padding:18px;
}

#reader{
    border-radius:16px;
    overflow:hidden;
}

.status{
    margin-top:12px;
    padding:12px;
    background:var(--card);
    border-radius:12px;
    text-align:center;
    color:var(--muted);
    font-weight:600;
}

button{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    font-size:16px;
}

#processBtn{
    background:#2563eb;
    color:white;
}

#scanCount{
    text-align:center;
    margin-top:10px;
    color:var(--muted);
}

</style>
</head>

<body>

<header>STAFF QR RATING SYSTEM</header>

<div class="container">

    <div id="reader"></div>

    <div id="statusBox" class="status">
        ● Ready to scan
    </div>

    <button id="processBtn" onclick="processEmployees()">
        ประมวลผลรายชื่อ
    </button>

    <div id="scanCount">
        สแกนแล้ว 0 คน
    </div>

    <div id="result"></div>

</div>

<script>

let scanner;
let scanned = [];
let finalList = [];

// ================= CAMERA =================
async function startScanner(){

    scanner = new Html5Qrcode("reader");

    await scanner.start(
        { facingMode:"environment" },
        { fps:10, qrbox:250 },
        onScan
    );

    setStatus("idle","");
}

// ================= STATUS =================
function setStatus(type,text){

    const el = document.getElementById("statusBox");

    if(type==="idle"){
        el.innerHTML = "● Ready to scan";
        el.style.color = "#94a3b8";
    }

    if(type==="scan"){
        el.innerHTML = "⟳ Processing...";
        el.style.color = "#fbbf24";
    }

    if(type==="success"){
        el.innerHTML = "✔ " + text;
        el.style.color = "#10b981";
    }

    if(type==="error"){
        el.innerHTML = "✖ " + text;
        el.style.color = "#ef4444";
    }
}

// ================= SCAN =================
async function onScan(decodedText){

    setStatus("scan","");

    await scanner.pause();

    // ================= GET RAW TEXT =================
    let code = decodedText.trim();

    // ================= REMOVE URL =================
    // ตัวอย่าง:
    // https://ssi-building.github.io/BUS-QR/Test.html?id=KSG0244
    // เหลือ:
    // KSG0244

    if(code.includes("?id=")){

        code = code.split("?id=")[1];
    }

    // กัน space หรือ / ติดท้าย
    code = code.replace(/\//g,"").trim();

    // ================= VALIDATION =================
    // รองรับ:
    // K0123
    // P0734
    // KSG0244
    // TLG0159

    const isValid = /^[A-Z0-9]+$/i.test(code);

    if(!isValid){

        setStatus("error","รูปแบบ QR ไม่ถูกต้อง");

        setTimeout(()=>{

            setStatus("idle","");
            scanner.resume();

        },1000);

        return;
    }

    // ================= DUPLICATE CHECK =================
    const dup = scanned.find(e => e.code === code);

    if(!dup){

        scanned.push({
            code:code,
            rating:0
        });

        updateCount();
    }

    setStatus("success",code);

    setTimeout(()=>{

        setStatus("idle","");
        scanner.resume();

    },700);
}

// ================= COUNT =================
function updateCount(){

    document.getElementById("scanCount").innerText =
        "สแกนแล้ว " + scanned.length + " คน";
}

// ================= PROCESS =================
function processEmployees(){

    if(scanned.length===0){
        alert("ยังไม่มีข้อมูล");
        return;
    }

    finalList = [...scanned];

    document.getElementById("reader").style.display = "none";
    document.getElementById("processBtn").style.display = "none";
    document.getElementById("scanCount").style.display = "none";
    document.getElementById("statusBox").style.display = "none";

    render();
}

// ================= RENDER =================
function render(){

    const box = document.getElementById("result");

    box.innerHTML = "";

    // ================= EVALUATOR =================
    box.innerHTML += `
        <div style="
            background:#1e293b;
            padding:14px;
            border-radius:12px;
            margin-bottom:12px;
        ">
            <div style="
                margin-bottom:8px;
                color:#94a3b8;
                font-size:14px;
            ">
                รหัสพนักงานผู้ประเมิน
            </div>

            <input
                type="text"
                id="evaluatorId"
                placeholder="เช่น K0123"
                style="
                    width:100%;
                    padding:12px;
                    border:none;
                    border-radius:10px;
                    background:#0f172a;
                    color:white;
                    font-size:16px;
                    box-sizing:border-box;
                "
            >
        </div>
    `;

    // ================= EMPLOYEE LIST =================
    finalList.forEach((e,i)=>{

        let stars = "";

        for(let n=1;n<=5;n++){

            stars += `
                <span
                    onclick="rate(${i},${n})"
                    style="
                        font-size:30px;
                        cursor:pointer;
                        color:${n<=e.rating ? '#fbbf24' : '#475569'};
                        margin-left:2px;
                    ">
                    ★
                </span>
            `;
        }

        box.innerHTML += `
        <div style="
            display:flex;
            align-items:center;
            justify-content:space-between;

            background:#1e293b;
            padding:12px 14px;
            margin-top:10px;

            border-radius:12px;

            font-family:monospace;
        ">

            <!-- CODE -->
            <div style="
                min-width:120px;
                color:#60a5fa;
                font-weight:700;
                letter-spacing:1px;
            ">
                ${e.code}
            </div>

            <!-- STARS -->
            <div style="
                display:flex;
                flex-wrap:nowrap;
            ">
                ${stars}
            </div>

        </div>
        `;
    });

    // ================= BUTTONS =================
    box.innerHTML += `
        <button onclick="send()" style="
            margin-top:15px;
            background:#10b981;
            color:white;
        ">
            ส่งข้อมูล
        </button>

        <button onclick="location.reload()" style="
            margin-top:10px;
            background:transparent;
            border:1px solid #475569;
            color:#94a3b8;
        ">
            เริ่มใหม่
        </button>
    `;
}

// ================= RATE =================
function rate(i,n){

    finalList[i].rating = n;

    render();

    // ================= KEEP EVALUATOR VALUE =================
    const input = document.getElementById("evaluatorId");

    if(input && window.savedEvaluator){
        input.value = window.savedEvaluator;
    }
}

// ================= SEND =================
function send(){

    // ================= EVALUATOR =================
    const evaluator =
        document.getElementById("evaluatorId")
        .value
        .trim();

    if(evaluator === ""){

        alert("กรุณากรอกรหัสพนักงานผู้ประเมิน");

        return;
    }

    // ================= CHECK RATING =================
    const empty = finalList.find(e=>e.rating===0);

    if(empty){

        alert("ให้คะแนนไม่ครบ");

        return;
    }

    // ================= FINAL DATA =================
    const payload = {
        evaluator:evaluator,
        datetime:new Date().toISOString(),
        data:finalList
    };

    console.log(payload);

    // ================= SUCCESS =================
    alert("ส่งข้อมูลสำเร็จ");

    // ================= TRY CLOSE TAB =================
    window.open('', '_self');
    window.close();

    // ================= FALLBACK =================
    setTimeout(()=>{

        document.body.innerHTML = `
            <div style="
                height:100vh;
                display:flex;
                align-items:center;
                justify-content:center;
                flex-direction:column;
                background:#0f172a;
                color:white;
                font-family:Segoe UI;
                text-align:center;
                padding:20px;
                box-sizing:border-box;
            ">

                <div style="
                    font-size:70px;
                    margin-bottom:20px;
                ">
                    ✔
                </div>

                <div style="
                    font-size:24px;
                    font-weight:700;
                    margin-bottom:10px;
                ">
                    ดำเนินการเรียบร้อย
                </div>

                <div style="
                    color:#94a3b8;
                    font-size:15px;
                ">
                    สามารถปิดหน้านี้ได้เลย
                </div>

            </div>
        `;

    },500);
}

// ================= SAVE INPUT =================
document.addEventListener("input",(e)=>{

    if(e.target.id==="evaluatorId"){

        window.savedEvaluator = e.target.value;
    }
});

// ================= START =================
window.onload = startScanner;

</script>

</body>
</html>
