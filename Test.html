<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BUS QR - Face Processor</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8; 
            --primary: #60a5fa; --primary-hover: #93c5fd; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; -webkit-user-select: none; user-select: none; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: -webkit-fill-available; flex-direction: column; overflow: hidden; padding: 20px;}
        
        html { height: -webkit-fill-available; }

        .container { text-align: center; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1;}
        .icon-large { font-size: 70px; margin-bottom: 25px; }
        .spin { animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        h1 { font-size: 26px; margin: 0 0 12px 0; color: white; font-weight: 700; letter-spacing: -0.5px;}
        p { color: var(--muted); font-size: 16px; margin: 0 0 25px 0; line-height: 1.6; }
        
        /* สไตล์สำหรับหน้าสแกนใบหน้า */
        .register-card { background: var(--card); border-radius: 28px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; display: none; width: 100%; max-width: 360px; border: 1px solid #334155;}
        
        .input-group { margin-bottom: 25px; text-align: left; }
        .input-group label { display: block; color: var(--muted); font-size: 14px; margin-bottom: 10px; font-weight: 600; }
        input[type="text"] { width: 100%; padding: 16px; border-radius: 14px; border: none; background: #0f172a; color: white; font-size: 16px; outline: none; border: 1px solid #334155;}
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2); }
        
        button { width: 100%; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;}
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); color: white; }
        
        /* 🌟 กรอบกล้องและ OVERLAY สแกนใบหน้า 🌟 */
        .video-container { 
            width: 100%; 
            aspect-ratio: 1; 
            border-radius: 50%; 
            overflow: hidden; 
            background: #0f172a; 
            margin-bottom: 20px; 
            display: none; 
            position: relative; 
            border: 4px solid var(--primary);
            box-shadow: 0 0 30px rgba(96, 165, 250, 0.3);
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* 🌟 เส้นเป้าหมายรูปใบหน้า (Face Overlay) 🌟 */
        .face-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="%2360a5fa" stroke-width="1.5" stroke-dasharray="3 3"><path d="M50 15c-15 0-25 10-25 25 0 10 5 20 10 25s10 10 15 10c15 0 25-10 25-25 0-15-10-25-25-25zM50 75v10M35 70s-5 8 0 12h30s5-4 0-12"/></svg>');
            background-size: 60%;
            background-position: center 40%;
            background-repeat: no-repeat;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>

<body>

<div id="loadingScreen" class="container">
    <i class="fa-solid fa-face-viewfinder icon-large spin" style="color: var(--primary);"></i>
    <h1 id="loadingTitle">กำลังประมวลผล...</h1>
    <p id="loadingDesc">กรุณารอสักครู่ ระบบกำลังตรวจสอบข้อมูลใบหน้า</p>
</div>

<div id="registerScreen" class="register-card">
    <i class="fa-solid fa-face-viewfinder" style="font-size: 45px; color: var(--warning); margin-bottom: 15px;"></i>
    <h1 style="font-size: 22px; font-weight: 800;">ยืนยันใบหน้า</h1>
    <p style="font-size: 14px; margin-bottom: 20px;">เพื่อความปลอดภัยของระบบ กรุณาสแกนใบหน้าและกรอกรหัสพนักงานในครั้งแรกเท่านั้น</p>
    
    <div class="input-group">
        <label>รหัสพนักงานผู้สแกน</label>
        <input type="text" id="empIdInput" placeholder="เช่น K0123" autocomplete="off" inputmode="text">
    </div>

    <div id="cameraArea" class="video-container">
        <video id="selfieVideo" playsinline autoplay muted></video>
        <div class="face-overlay"></div>
    </div>
    
    <button id="startCamBtn" class="btn-primary" onclick="startCamera()">
        <i class="fa-solid fa-camera"></i> เปิดกล้องสแกนใบหน้า
    </button>
    <button id="captureBtn" class="btn-success" onclick="captureAndRegister()" style="display: none;">
        <i class="fa-solid fa-expand"></i> ถ่ายภาพและยืนยัน
    </button>
</div>

<div id="resultScreen" class="container" style="display: none;">
    <i id="resultIcon" class="fa-solid fa-circle-check icon-large" style="color: var(--success);"></i>
    <h1 id="resultTitle">บันทึกข้อมูลสำเร็จ</h1>
    <p id="resultDesc">หน้าต่างจะปิดอัตโนมัติ...</p>
</div>

<script>
    const LIFF_ID = "2007956727-gZOxrA26"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbxXBx3J64GaNQORciPtSiYcLA87q3x9fzAM1Jqhv4rZ24EbNDH1gZz3ip4tFFkdFXor/exec";
    
    let scannedUUID = "";
    let lineProfile = null;
    let videoStream = null;

    window.onload = async () => { 
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const urlParams = new URLSearchParams(window.location.search);
            scannedUUID = urlParams.get('id');

            if (!scannedUUID) {
                showResult("เกิดข้อผิดพลาด", "ไม่พบข้อมูล QR Code กรุณาสแกนใหม่", "error");
                return;
            }

            lineProfile = await liff.getProfile();

            updateLoading("กำลังตรวจสอบสิทธิ์ใบหน้า...");
            const verifyRes = await fetch(`${API_URL}?action=verifyScanner&scannerLineId=${lineProfile.userId}`);
            const verifyData = await verifyRes.json();

            if (verifyData.allowed === false) {
                showResult("การเข้าถึงถูกปฏิเสธ", verifyData.message, "error");
                return;
            }

            const checkRes = await fetch(`${API_URL}?action=checkForeman&lineUserId=${lineProfile.userId}&t=${Date.now()}`);
            const foremanData = await checkRes.json();

            if (foremanData.registered === true) {
                updateLoading("กำลังบันทึกข้อมูล...");
                await autoSaveData(foremanData.scannerId, false);
            } else {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('registerScreen').style.display = 'block';
            }

        } catch (error) {
            showResult("ข้อผิดพลาดระบบ", "ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่", "error");
        }
    };

    async function startCamera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", aspectRatio: 1 } });
            const videoElement = document.getElementById('selfieVideo');
            videoElement.srcObject = videoStream;
            
            document.getElementById('cameraArea').style.display = 'block';
            document.getElementById('startCamBtn').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'flex';
        } catch (err) {
            alert("ไม่สามารถเปิดกล้องสแกนได้ กรุณาอนุญาตการเข้าถึงกล้อง");
        }
    }

    async function captureAndRegister() {
        const empId = document.getElementById('empIdInput').value.trim().toUpperCase();
        if (!empId) return alert("กรุณากรอกรหัสพนักงาน");

        updateLoading("กำลังประมวลผลใบหน้า...");
        const video = document.getElementById('selfieVideo');
        const canvas = document.createElement("canvas");
        const size = Math.min(video.videoWidth, video.videoHeight);
        canvas.width = size; 
        canvas.height = size;
        canvas.getContext("2d").drawImage(
            video, 
            (video.videoWidth - size) / 2, (video.videoHeight - size) / 2, size, size, 
            0, 0, size, size
        );
        const selfieBase64 = canvas.toDataURL("image/jpeg", 0.5); 

        videoStream.getTracks().forEach(track => track.stop());

        document.getElementById('registerScreen').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';
        updateLoading("กำลังยืนยันใบหน้าในระบบ...");

        const regRes = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "registerForeman", 
                lineUserId: lineProfile.userId,
                displayName: lineProfile.displayName,
                pictureUrl: lineProfile.pictureUrl,
                scannerId: empId, 
                selfie: selfieBase64 
            })
        });
        
        const regData = await regRes.json();
        
        if (regData.success) {
            // 🌟 ส่งค่า true ไปบอกฟังก์ชันว่า "เพิ่งลงทะเบียนเสร็จหมาดๆ"
            await autoSaveData(empId, true);
        } else {
            showResult("ยืนยันใบหน้าล้มเหลว", regData.message, "error");
        }
    }

    // 🌟 รับค่า isJustRegistered เข้ามาตรวจสอบ 🌟
    async function autoSaveData(scannerId, isJustRegistered = false) {
        try {
            const picUrl = (lineProfile && lineProfile.pictureUrl) ? lineProfile.pictureUrl : "";

            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "saveData", 
                    uuidList: [scannedUUID], 
                    scannerId: scannerId, 
                    pictureUrl: picUrl 
                })
            });
            const result = await response.json();

            // 1. ดักกรณีเกินเวลา 90 วินาที
            if (result.expiredList && result.expiredList.length > 0) {
                if (isJustRegistered) {
                    showResult("ลงทะเบียนสำเร็จ!", "แต่ QR Code หมดเวลา 90 วินาทีแล้ว<br>กรุณาให้พนักงานสร้าง QR แล้วสแกนใหม่อีกครั้ง", "warning");
                    setTimeout(() => closeApp(), 6000); // ให้เวลาอ่าน 6 วิ เพราะเพิ่งลงทะเบียนเสร็จ
                } else {
                    showResult("สแกนไม่สำเร็จ", "QR Code นี้หมดเวลา 90 วินาทีแล้ว<br>หน้าต่างจะปิดอัตโนมัติ...", "error");
                    setTimeout(() => closeApp(), 3000);
                }
            } 
            // 2. ดักกรณีเกินเวลา 120 วินาที
            else if (result.notFound && result.notFound.length > 0) {
                if (isJustRegistered) {
                    showResult("ลงทะเบียนสำเร็จ!", "แต่ QR Code ถูกลบเนื่องจากหมดเวลาแล้ว<br>กรุณาให้พนักงานสร้าง QR แล้วสแกนใหม่อีกครั้ง", "warning");
                    setTimeout(() => closeApp(), 6000);
                } else {
                    showResult("สแกนไม่สำเร็จ", "ไม่พบข้อมูล หรือ QR หมดอายุไปนานแล้ว<br>หน้าต่างจะปิดอัตโนมัติ...", "error");
                    setTimeout(() => closeApp(), 3000);
                }
            } 
            // 3. บันทึกสำเร็จ
            else if (result.success) {
                if (isJustRegistered) {
                    showResult("ยืนยันตัวตน & บันทึกสำเร็จ", "หน้าต่างจะปิดอัตโนมัติ...", "success");
                } else {
                    showResult("บันทึกข้อมูลสำเร็จ", "หน้าต่างจะปิดอัตโนมัติ...", "success");
                }
                setTimeout(() => closeApp(), 2500);
            } 
            // 4. Error อื่นๆ
            else {
                showResult("สแกนไม่สำเร็จ", (result.message || "เกิดข้อผิดพลาดบางอย่าง") + "<br>หน้าต่างจะปิดอัตโนมัติ...", "error");
                setTimeout(() => closeApp(), 3000);
            }
        } catch (err) {
            showResult("ข้อผิดพลาด", "ไม่สามารถบันทึกข้อมูลได้<br>หน้าต่างจะปิดอัตโนมัติ...", "error");
            setTimeout(() => closeApp(), 3000);
        }
    }

    function updateLoading(text) {
        document.getElementById('loadingTitle').innerText = text;
        document.getElementById('loadingDesc').innerText = "กรุณารอสักครู่ ห้ามปิดหน้าต่างนี้";
    }

    // 🌟 ปรับปรุง showResult รับค่า status (success, warning, error) 🌟
    function showResult(title, desc, status) {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('registerScreen').style.display = 'none';
        const resultScreen = document.getElementById('resultScreen');
        
        document.getElementById('resultTitle').innerText = title;
        document.getElementById('resultDesc').innerHTML = desc; 
        
        const icon = document.getElementById('resultIcon');
        
        if (status === "success") {
            icon.className = "fa-solid fa-circle-check icon-large";
            icon.style.color = "var(--success)";
        } else if (status === "warning") {
            // ไอคอนสีเหลืองเตือน สำหรับกรณีลงทะเบียนผ่านแต่สแกนไม่ทัน
            icon.className = "fa-solid fa-triangle-exclamation icon-large";
            icon.style.color = "var(--warning)";
        } else {
            icon.className = "fa-solid fa-circle-xmark icon-large";
            icon.style.color = "var(--danger)";
        }
        
        resultScreen.style.display = 'flex'; 
    }

    function closeApp() {
        if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.closeWindow();
        } else {
            window.close();
        }
    }
</script>
</body>
</html>
