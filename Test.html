<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BUS QR - Face Processor</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8; 
            --primary: #60a5fa; --primary-hover: #93c5fd; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; -webkit-user-select: none; user-select: none; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: -webkit-fill-available; flex-direction: column; overflow: hidden; padding: 20px;}
        html { height: -webkit-fill-available; }

        .container { text-align: center; width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1;}
        .icon-large { font-size: 70px; margin-bottom: 25px; }
        .spin { animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        h1 { font-size: 26px; margin: 0 0 12px 0; color: white; font-weight: 700; letter-spacing: -0.5px;}
        p { color: var(--muted); font-size: 16px; margin: 0 0 25px 0; line-height: 1.6; }
        
        .register-card { background: var(--card); border-radius: 28px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; display: none; width: 100%; max-width: 360px; border: 1px solid #334155;}
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: var(--muted); font-size: 14px; margin-bottom: 10px; font-weight: 600; }
        input[type="text"] { width: 100%; padding: 16px; border-radius: 14px; border: none; background: #0f172a; color: white; font-size: 16px; outline: none; border: 1px solid #334155; text-align: center; font-weight: 700; letter-spacing: 1px;}
        input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2); }
        
        button { width: 100%; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s;}
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        
        /* 🌟 ปรับปรุงกรอบวิดีโอให้เข้ากับ SVG มุมทั้ง 4 🌟 */
        .video-container { 
            width: 100%; 
            aspect-ratio: 1; 
            border-radius: 24px; /* เปลี่ยนกลับเป็นสี่เหลี่ยมโค้งมนเพื่อให้เข้ากับมุม SVG */
            overflow: hidden; 
            background: #0f172a; 
            margin-bottom: 15px; 
            display: none; 
            position: relative; 
            border: 3px solid #334155;
            transition: border-color 0.3s;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* 🌟 SVG OVERLAY จากของคุณ 🌟 */
        .face-svg-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; height: 85%;
            pointer-events: none;
            z-index: 10;
        }

        /* 🌟 อนิเมชั่นเลเซอร์สแกน 🌟 */
        .laser-line {
            animation: scanLaser 1.5s infinite alternate ease-in-out;
        }
        @keyframes scanLaser {
            0% { transform: translateY(-3px); }
            100% { transform: translateY(3px); }
        }

        /* 🌟 เอฟเฟกต์แสงแฟลชตอนจับภาพอัตโนมัติ 🌟 */
        .flash-effect {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: white; opacity: 0; z-index: 20; pointer-events: none;
        }
        .flash-active { animation: flashAnim 0.6s ease-out; }
        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        #scanStatusText {
            font-size: 15px; font-weight: 700; color: var(--primary); margin-top: 10px; display: none;
        }
    </style>
</head>

<body>

<div id="loadingScreen" class="container">
    <i class="fa-solid fa-face-viewfinder icon-large spin" style="color: var(--primary);"></i>
    <h1 id="loadingTitle">กำลังประมวลผล...</h1>
    <p id="loadingDesc">กรุณารอสักครู่ ระบบกำลังตรวจสอบข้อมูล</p>
</div>

<div id="registerScreen" class="register-card">
    <h1 style="font-size: 22px; font-weight: 800; color: var(--primary);">AI Face Verification</h1>
    <p style="font-size: 13px; margin-bottom: 20px;">กรุณากรอกรหัสและสแกนใบหน้าเพื่อยืนยันสิทธิ์ (ครั้งแรกเท่านั้น)</p>
    
    <div class="input-group">
        <input type="text" id="empIdInput" placeholder="รหัสพนักงาน (เช่น K0123)" autocomplete="off" inputmode="text">
    </div>

    <div id="cameraArea" class="video-container">
        <video id="selfieVideo" playsinline autoplay muted></video>
        <div class="flash-effect" id="flashScreen"></div>
        
        <svg class="face-svg-overlay" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 8V5a1 1 0 0 1 1-1h3M20 8V5a1 1 0 0 0-1-1h-3M4 16v3a1 1 0 0 0 1 1h3M20 16v3a1 1 0 0 1-1 1h-3" stroke="var(--primary)" stroke-width="1.5" />
          <path d="M9 14.5a3 3 0 0 0 6 0V11a3 3 0 0 0-6 0v3.5z" />
          <path d="M7 10a5 5 0 0 1 10 0" />
          <line x1="10.5" y1="11" x2="11" y2="11" stroke-width="2.5" />
          <line x1="13" y1="11" x2="13.5" y2="11" stroke-width="2.5" />
          <path d="M12 11v1.5h.5" />
          <path d="M10.5 14.5a1.5 1.5 0 0 0 3 0" />
          <line class="laser-line" x1="2" y1="12" x2="22" y2="12" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2 2" />
        </svg>
    </div>
    
    <div id="scanStatusText">กรุณาจัดใบหน้าให้อยู่ในกรอบ...</div>

    <button id="startCamBtn" class="btn-primary" onclick="startCameraSequence()">
        <i class="fa-solid fa-camera"></i> เปิดกล้องสแกนใบหน้า
    </button>
</div>

<div id="resultScreen" class="container" style="display: none;">
    <i id="resultIcon" class="fa-solid fa-circle-check icon-large" style="color: var(--success);"></i>
    <h1 id="resultTitle">บันทึกข้อมูลสำเร็จ</h1>
    <p id="resultDesc">หน้าต่างจะปิดอัตโนมัติ...</p>
</div>

<script>
    const LIFF_ID = "2007956727-gZOxrA26"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbxXBx3J64GaNQORciPtSiYcLA87q3x9fzAM1Jqhv4rZ24EbNDH1gZz3ip4tFFkdFXor/exec";
    
    let scannedUUID = "";
    let lineProfile = null;
    let videoStream = null;

    window.onload = async () => { 
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            const urlParams = new URLSearchParams(window.location.search);
            scannedUUID = urlParams.get('id');

            if (!scannedUUID) {
                showResult("เกิดข้อผิดพลาด", "ไม่พบข้อมูล QR Code กรุณาสแกนใหม่", "error");
                return;
            }

            lineProfile = await liff.getProfile();
            updateLoading("กำลังตรวจสอบสิทธิ์ใบหน้า...");
            
            const verifyRes = await fetch(`${API_URL}?action=verifyScanner&scannerLineId=${lineProfile.userId}`);
            const verifyData = await verifyRes.json();

            if (verifyData.allowed === false) {
                showResult("การเข้าถึงถูกปฏิเสธ", verifyData.message, "error");
                return;
            }

            const checkRes = await fetch(`${API_URL}?action=checkForeman&lineUserId=${lineProfile.userId}&t=${Date.now()}`);
            const foremanData = await checkRes.json();

            if (foremanData.registered === true) {
                updateLoading("กำลังบันทึกข้อมูล...");
                await autoSaveData(foremanData.scannerId, false);
            } else {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('registerScreen').style.display = 'block';
            }
        } catch (error) {
            showResult("ข้อผิดพลาดระบบ", "ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่", "error");
        }
    };

    // 🌟 ระบบจับภาพอัตโนมัติ (Smart Auto-Capture Illusion) 🌟
    async function startCameraSequence() {
        const empId = document.getElementById('empIdInput').value.trim().toUpperCase();
        if (!empId) return alert("กรุณากรอกรหัสพนักงานให้เรียบร้อยก่อนเปิดกล้องครับ");

        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", aspectRatio: 1 } });
            document.getElementById('selfieVideo').srcObject = videoStream;
            
            // ปรับ UI เปิดกล้อง
            document.getElementById('startCamBtn').style.display = 'none';
            document.getElementById('empIdInput').disabled = true;
            document.getElementById('cameraArea').style.display = 'block';
            
            const statusText = document.getElementById('scanStatusText');
            statusText.style.display = 'block';
            statusText.innerText = "กำลังค้นหาใบหน้า...";
            statusText.style.color = "var(--warning)";

            // ⏱️ หน่วงเวลาบิ๊วอารมณ์ 2 วินาที
            setTimeout(() => {
                statusText.innerText = "ตรวจพบใบหน้า... กรุณาอยู่นิ่งๆ";
                statusText.style.color = "var(--primary)";
                document.getElementById('cameraArea').style.borderColor = "var(--primary)";
            }, 2000);

            // 📸 ยิงแฟลชและจับภาพอัตโนมัติในวินาทีที่ 3.5
            setTimeout(() => {
                statusText.innerText = "จับภาพสำเร็จ!";
                statusText.style.color = "var(--success)";
                document.getElementById('cameraArea').style.borderColor = "var(--success)";
                
                // สั่ง Flash หน้าจอ
                document.getElementById('flashScreen').classList.add('flash-active');
                
                // สั่งถ่ายรูปส่งเข้าเซิร์ฟเวอร์
                setTimeout(() => {
                    executeCapture(empId);
                }, 400); // รอแสงแฟลชหายแว้บนึงค่อยประมวลผล
            }, 3500);

        } catch (err) {
            alert("ไม่สามารถเปิดกล้องได้ กรุณาตรวจสอบการอนุญาตใช้งานกล้อง");
        }
    }

    // ฟังก์ชันถ่ายรูปตัวจริง (ถูกเรียกใช้อัตโนมัติ)
    async function executeCapture(empId) {
        updateLoading("กำลังประมวลผลใบหน้า...");
        const video = document.getElementById('selfieVideo');
        const canvas = document.createElement("canvas");
        const size = Math.min(video.videoWidth, video.videoHeight);
        canvas.width = size; 
        canvas.height = size;
        canvas.getContext("2d").drawImage(
            video, 
            (video.videoWidth - size) / 2, (video.videoHeight - size) / 2, size, size, 
            0, 0, size, size
        );
        const selfieBase64 = canvas.toDataURL("image/jpeg", 0.5); 

        videoStream.getTracks().forEach(track => track.stop());

        document.getElementById('registerScreen').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';
        updateLoading("กำลังยืนยันใบหน้าในระบบ...");

        const regRes = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "registerForeman", 
                lineUserId: lineProfile.userId,
                displayName: lineProfile.displayName,
                pictureUrl: lineProfile.pictureUrl,
                scannerId: empId, 
                selfie: selfieBase64 
            })
        });
        
        const regData = await regRes.json();
        
        if (regData.success) {
            await autoSaveData(empId, true);
        } else {
            showResult("ยืนยันใบหน้าล้มเหลว", regData.message, "error");
        }
    }

    async function autoSaveData(scannerId, isJustRegistered = false) {
        try {
            const picUrl = (lineProfile && lineProfile.pictureUrl) ? lineProfile.pictureUrl : "";

            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "saveData", 
                    uuidList: [scannedUUID], 
                    scannerId: scannerId, 
                    pictureUrl: picUrl 
                })
            });
            const result = await response.json();

            if (result.expiredList && result.expiredList.length > 0) {
                if (isJustRegistered) {
                    showResult("ลงทะเบียนสำเร็จ!", "แต่ QR Code หมดเวลาสแกนแล้ว<br>กรุณาให้พนักงานสร้าง QR แล้วสแกนใหม่อีกครั้ง", "warning");
                    setTimeout(() => closeApp(), 10000);
                } else {
                    showResult("สแกนไม่สำเร็จ", "QR Code นี้หมดเวลาแล้ว<br>หน้าต่างจะปิดอัตโนมัติ...", "error");
                    setTimeout(() => closeApp(), 3000);
                }
            } 
            else if (result.notFound && result.notFound.length > 0) {
                if (isJustRegistered) {
                    showResult("ลงทะเบียนสำเร็จ!", "แต่ QR Code หมดอายุและถูกยกเลิกแล้ว<br>กรุณาให้พนักงานสร้าง QR แล้วสแกนใหม่อีกครั้ง", "warning");
                    setTimeout(() => closeApp(), 10000);
                } else {
                    showResult("สแกนไม่สำเร็จ", "ไม่พบข้อมูล หรือ QR Code หมดอายุไปนานแล้ว<br>หน้าต่างจะปิดอัตโนมัติ...", "error");
                    setTimeout(() => closeApp(), 3000);
                }
            } 
            else if (result.success) {
                if (isJustRegistered) {
                    showResult("ยืนยันตัวตน & บันทึกสำเร็จ", "หน้าต่างจะปิดอัตโนมัติ...", "success");
                } else {
                    showResult("บันทึกข้อมูลสำเร็จ", "หน้าต่างจะปิดอัตโนมัติ...", "success");
                }
                setTimeout(() => closeApp(), 2500);
            } 
            else {
                showResult("สแกนไม่สำเร็จ", (result.message || "เกิดข้อผิดพลาดบางอย่าง") + "<br>หน้าต่างจะปิดอัตโนมัติ...", "error");
                setTimeout(() => closeApp(), 3000);
            }
        } catch (err) {
            showResult("ข้อผิดพลาด", "ไม่สามารถบันทึกข้อมูลได้<br>หน้าต่างจะปิดอัตโนมัติ...", "error");
            setTimeout(() => closeApp(), 3000);
        }
    }

    function updateLoading(text) {
        document.getElementById('loadingTitle').innerText = text;
        document.getElementById('loadingDesc').innerText = "กรุณารอสักครู่ ห้ามปิดหน้าต่างนี้";
    }

    function showResult(title, desc, status) {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('registerScreen').style.display = 'none';
        const resultScreen = document.getElementById('resultScreen');
        
        document.getElementById('resultTitle').innerText = title;
        document.getElementById('resultDesc').innerHTML = desc; 
        
        const icon = document.getElementById('resultIcon');
        if (status === "success") {
            icon.className = "fa-solid fa-circle-check icon-large";
            icon.style.color = "var(--success)";
        } else if (status === "warning") {
            icon.className = "fa-solid fa-triangle-exclamation icon-large";
            icon.style.color = "var(--warning)";
        } else {
            icon.className = "fa-solid fa-circle-xmark icon-large";
            icon.style.color = "var(--danger)";
        }
        
        resultScreen.style.display = 'flex'; 
    }

    function closeApp() {
        if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.closeWindow();
        } else {
            window.close();
        }
    }
</script>
</body>
</html>
