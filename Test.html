<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUS QR - Auto Processor</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8; 
            --primary: #60a5fa; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }
        * { box-sizing: border-box; font-family: 'Prompt', sans-serif; -webkit-user-select: none; user-select: none; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; overflow: hidden; padding: 20px;}
        
        .container { text-align: center; width: 100%; max-width: 400px; }
        .icon-large { font-size: 60px; margin-bottom: 20px; }
        .spin { animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        h1 { font-size: 24px; margin: 0 0 10px 0; color: white; }
        p { color: var(--muted); font-size: 15px; margin-bottom: 20px; line-height: 1.5; }
        
        /* สไตล์สำหรับหน้าลงทะเบียน */
        .register-card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; display: none; width: 100%; max-width: 360px; border: 1px solid #334155;}
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 8px; font-weight: 600; }
        input[type="text"] { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #0f172a; color: white; font-size: 16px; outline: none; border: 1px solid #334155;}
        input[type="text"]:focus { border-color: var(--primary); }
        
        button { width: 100%; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;}
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        
        .video-container { width: 100%; aspect-ratio: 1; border-radius: 16px; overflow: hidden; background: #0f172a; margin-bottom: 15px; display: none; position: relative; border: 2px dashed #475569;}
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    </style>
</head>

<body>

<div id="loadingScreen" class="container">
    <i class="fa-solid fa-circle-notch icon-large spin" style="color: var(--primary);"></i>
    <h1 id="loadingTitle">กำลังประมวลผล...</h1>
    <p id="loadingDesc">กรุณารอสักครู่ ระบบกำลังตรวจสอบข้อมูล</p>
</div>

<div id="registerScreen" class="register-card">
    <i class="fa-solid fa-id-badge" style="font-size: 40px; color: var(--warning); margin-bottom: 15px;"></i>
    <h1 style="font-size: 20px;">ลงทะเบียนหัวหน้างาน</h1>
    <p style="font-size: 13px;">ระบบต้องการข้อมูลและภาพถ่ายเพื่อยืนยันตัวตนในครั้งแรกเท่านั้น</p>
    
    <div class="input-group">
        <label>รหัสพนักงานของคุณ</label>
        <input type="text" id="empIdInput" placeholder="เช่น K0123" autocomplete="off">
    </div>

    <div id="cameraArea" class="video-container">
        <video id="selfieVideo" playsinline autoplay></video>
    </div>
    
    <button id="startCamBtn" class="btn-primary" onclick="startCamera()">
        <i class="fa-solid fa-camera"></i> เปิดกล้องเพื่อถ่ายภาพ
    </button>
    <button id="captureBtn" class="btn-success" onclick="captureAndRegister()" style="display: none;">
        <i class="fa-solid fa-camera-retro"></i> ถ่ายภาพและลงทะเบียน
    </button>
</div>

<div id="resultScreen" class="container" style="display: none;">
    <i id="resultIcon" class="fa-solid fa-circle-check icon-large" style="color: var(--success);"></i>
    <h1 id="resultTitle">บันทึกข้อมูลสำเร็จ</h1>
    <p id="resultDesc">หน้าต่างจะปิดอัตโนมัติ...</p>
</div>

<script>
    const LIFF_ID = "2007956727-gZOxrA26"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbxXBx3J64GaNQORciPtSiYcLA87q3x9fzAM1Jqhv4rZ24EbNDH1gZz3ip4tFFkdFXor/exec";
    
    let scannedUUID = "";
    let lineProfile = null;
    let videoStream = null;

    window.onload = async () => { 
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }

            // 1. ดึง UUID จาก URL ที่สแกนมา
            const urlParams = new URLSearchParams(window.location.search);
            scannedUUID = urlParams.get('id');

            if (!scannedUUID) {
                showResult("เกิดข้อผิดพลาด", "ไม่พบข้อมูล QR Code กรุณาสแกนใหม่", false);
                return;
            }

            lineProfile = await liff.getProfile();

            // 2. เช็คสิทธิ์และประวัติหัวหน้างานรวดเดียว
            updateLoading("กำลังตรวจสอบสิทธิ์...");
            const verifyRes = await fetch(`${API_URL}?action=verifyScanner&scannerLineId=${lineProfile.userId}`);
            const verifyData = await verifyRes.json();

            if (verifyData.allowed === false) {
                showResult("การเข้าถึงถูกปฏิเสธ", verifyData.message, false);
                return;
            }

            // 3. เช็คว่าหัวหน้าเคยลงทะเบียนหรือยัง
            const checkRes = await fetch(`${API_URL}?action=checkForeman&lineUserId=${lineProfile.userId}&t=${Date.now()}`);
            const foremanData = await checkRes.json();

            if (foremanData.registered === true) {
                // 🟢 เคยลงทะเบียนแล้ว -> บันทึกข้อมูลอัตโนมัติเลย (Super Lazy Mode!)
                updateLoading("กำลังบันทึกข้อมูล...");
                await autoSaveData(foremanData.scannerId, foremanData.selfieUrl);
            } else {
                // 🔴 ยังไม่เคยลงทะเบียน -> โชว์หน้าลงทะเบียน
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('registerScreen').style.display = 'block';
            }

        } catch (error) {
            showResult("ข้อผิดพลาดระบบ", "ไม่สามารถเชื่อมต่อได้ กรุณาลองใหม่", false);
        }
    };

    // ==========================================
    // ระบบถ่ายภาพลงทะเบียน
    // ==========================================
    async function startCamera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const videoElement = document.getElementById('selfieVideo');
            videoElement.srcObject = videoStream;
            
            document.getElementById('cameraArea').style.display = 'block';
            document.getElementById('startCamBtn').style.display = 'none';
            document.getElementById('captureBtn').style.display = 'flex';
        } catch (err) {
            alert("ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการเข้าถึงกล้อง");
        }
    }

    async function captureAndRegister() {
        const empId = document.getElementById('empIdInput').value.trim().toUpperCase();
        if (!empId) return alert("กรุณากรอกรหัสพนักงาน");

        // ถ่ายภาพจาก Video
        const video = document.getElementById('selfieVideo');
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        canvas.getContext("2d").drawImage(video, 0, 0);
        const selfieBase64 = canvas.toDataURL("image/jpeg", 0.4); // บีบอัดให้เล็กลง

        // ปิดกล้อง
        videoStream.getTracks().forEach(track => track.stop());

        // สลับไปหน้าจอโหลด
        document.getElementById('registerScreen').style.display = 'none';
        document.getElementById('loadingScreen').style.display = 'flex';
        updateLoading("กำลังลงทะเบียนและบันทึกข้อมูล...");

        // ยิง API ไปลงทะเบียน (แล้วมันจะบันทึก QR ให้ด้วยเลย)
        const regRes = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "registerForeman", 
                lineUserId: lineProfile.userId,
                displayName: lineProfile.displayName,
                pictureUrl: lineProfile.pictureUrl,
                scannerId: empId, 
                selfie: selfieBase64 
            })
        });
        
        const regData = await regRes.json();
        
        if (regData.success) {
            // ลงทะเบียนเสร็จปุ๊บ สั่งเซฟ QR ทันที
            await autoSaveData(empId, regData.selfieUrl);
        } else {
            showResult("ลงทะเบียนล้มเหลว", regData.message, false);
        }
    }

    // ==========================================
    // ระบบบันทึกข้อมูลอัตโนมัติ (หัวใจสำคัญ)
    // ==========================================
    async function autoSaveData(scannerId, selfieUrl) {
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "saveData", 
                    uuidList: [scannedUUID], 
                    scannerId: scannerId, 
                    existingSelfieUrl: selfieUrl // ส่งรูปลิงก์เดิมไปเซฟ
                })
            });
            const result = await response.json();

            if (result.expiredList && result.expiredList.length > 0) {
                showResult("สแกนไม่สำเร็จ", "QR Code นี้หมดอายุไปแล้ว", false);
            } else if (result.success) {
                showResult("บันทึกข้อมูลสำเร็จ", "หน้าต่างจะปิดอัตโนมัติ...", true);
                setTimeout(() => closeApp(), 2500);
            } else {
                showResult("สแกนไม่สำเร็จ", result.message || "เกิดข้อผิดพลาดบางอย่าง", false);
            }
        } catch (err) {
            showResult("ข้อผิดพลาด", "ไม่สามารถบันทึกข้อมูลได้", false);
        }
    }

    // ==========================================
    // UI Helpers
    // ==========================================
    function updateLoading(text) {
        document.getElementById('loadingTitle').innerText = text;
    }

    function showResult(title, desc, isSuccess) {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('registerScreen').style.display = 'none';
        const resultScreen = document.getElementById('resultScreen');
        
        document.getElementById('resultTitle').innerText = title;
        document.getElementById('resultDesc').innerText = desc;
        
        const icon = document.getElementById('resultIcon');
        if (isSuccess) {
            icon.className = "fa-solid fa-circle-check icon-large";
            icon.style.color = "var(--success)";
        } else {
            icon.className = "fa-solid fa-circle-xmark icon-large";
            icon.style.color = "var(--danger)";
        }
        
        resultScreen.style.display = 'block';
    }

    function closeApp() {
        if (typeof liff !== 'undefined' && liff.isInClient()) {
            liff.closeWindow();
        } else {
            window.close();
        }
    }
</script>
</body>
</html>
