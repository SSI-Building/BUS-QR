<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>QR Scanner System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

:root{

    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --primary:#60a5fa;
    --success:#10b981;
    --danger:#ef4444;
    --warning:#fbbf24;

}

body{

    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI,sans-serif;

}

header{

    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:800;
    color:var(--primary);

}

.container{

    max-width:520px;
    margin:auto;
    padding:16px;

}

.card{

    background:var(--card);
    border-radius:16px;
    padding:16px;
    margin-bottom:14px;

}

input{

    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;

    background:#0f172a;
    color:white;
    font-size:16px;
    box-sizing:border-box;

}

button{

    width:100%;
    border:none;
    border-radius:12px;
    padding:14px;
    margin-top:12px;

    font-size:16px;
    font-weight:700;
    cursor:pointer;

}

#startBtn{

    background:#2563eb;
    color:white;

}

#clearBtn{

    background:#ef4444;
    color:white;

}

#reader{

    overflow:hidden;
    border-radius:16px;

}

.status{

    margin-top:12px;
    text-align:center;
    color:var(--muted);
    font-weight:700;

}

.scan-item{

    background:#0f172a;
    padding:12px;
    border-radius:12px;
    margin-top:10px;

    word-break:break-all;

}

.success{

    color:var(--success);

}

.error{

    color:var(--danger);

}

</style>

</head>

<body>

<header>
QR Scanner System
</header>

<div class="container">

    <div class="card">

        <div>
            รหัสพนักงานผู้สแกน
        </div>

        <input
            type="text"
            id="scannerId"
            placeholder="เช่น 00100101"
        >

        <button id="startBtn"
            onclick="startScanner()">

            เริ่มสแกน QR

        </button>

        <button id="clearBtn"
            onclick="clearList()">

            ล้างรายการ

        </button>

    </div>

    <div class="card">

        <div id="reader"></div>

        <div class="status"
            id="status">

            Ready

        </div>

    </div>

    <div class="card">

        <div>
            สแกนแล้ว
            <span id="count">0</span>
            รายการ
        </div>

        <div id="result"></div>

    </div>

</div>

<script>

// ======================================
// API
// ======================================

const API_URL =
"https://script.google.com/macros/s/AKfycbxXdyoQu-MUXUIQbYJHobJvrQY9NEUojJCkXDnYG-JiC34SsDwBmCbRtxZn_VwaPhVN/exec";

// ======================================
// GLOBAL
// ======================================

let scanner;

let scannedUUID = [];

// ======================================
// LOAD SAVED SCANNER ID
// ======================================

window.onload = ()=>{

    const saved =
    localStorage.getItem(
        "scannerId"
    );

    if(saved){

        document.getElementById(
            "scannerId"
        ).value = saved;

    }
};

// ======================================
// SAVE INPUT
// ======================================

document.addEventListener(
    "input",
    e=>{

        if(
            e.target.id === "scannerId"
        ){

            localStorage.setItem(

                "scannerId",
                e.target.value

            );
        }
    }
);

// ======================================
// STATUS
// ======================================

function setStatus(text,color="#94a3b8"){

    const el =
    document.getElementById(
        "status"
    );

    el.innerHTML = text;
    el.style.color = color;

}

// ======================================
// START SCANNER
// ======================================

async function startScanner(){

    const scannerId =
    document.getElementById(
        "scannerId"
    ).value.trim();

    if(scannerId===""){

        alert(
            "กรุณากรอกรหัสพนักงานผู้สแกน"
        );

        return;
    }

    scanner =
    new Html5Qrcode("reader");

    await scanner.start(

        {
            facingMode:"environment"
        },

        {
            fps:10,
            qrbox:250
        },

        onScanSuccess

    );

    setStatus(
        "กำลังสแกน...",
        "#10b981"
    );
}

// ======================================
// SCAN SUCCESS
// ======================================

async function onScanSuccess(decodedText){

    try{

        const raw =
        decodedText.trim();

        // ======================================
        // CHECK FORMAT
        // ======================================

        const match =
        raw.match(

            /^https:\/\/ssi-building\.github\.io\/BUS-QR\/Test\.html\?id=(.+)$/i

        );

        if(!match){

            setStatus(
                "QR ไม่ถูกต้อง",
                "#ef4444"
            );

            return;
        }

        // ======================================
        // UUID
        // ======================================

        const uuid =
        match[1].trim();

        // ======================================
        // DUPLICATE
        // ======================================

        if(
            scannedUUID.includes(uuid)
        ){

            setStatus(
                "สแกนซ้ำ",
                "#fbbf24"
            );

            return;
        }

        scannedUUID.push(uuid);

        updateCount();

        setStatus(
            "กำลังถ่ายรูป...",
            "#60a5fa"
        );

        // ======================================
        // SELFIE
        // ======================================

        const selfie =
        await captureSelfie();

        // ======================================
        // SEND
        // ======================================

        const scannerId =
        document.getElementById(
            "scannerId"
        ).value
        .trim();

        const payload = {

            uuid:uuid,
            scannerId:scannerId,
            selfie:selfie

        };

        const response =
        await fetch(

            API_URL,

            {

                method:"POST",

                body:JSON.stringify(
                    payload
                )

            }

        );

        const result =
        await response.json();

        // ======================================
        // SUCCESS
        // ======================================

        if(result.success){

            addResult(

                uuid,
                true

            );

            setStatus(
                "บันทึกสำเร็จ",
                "#10b981"
            );

        }else{

            addResult(

                uuid,
                false

            );

            setStatus(
                result.message,
                "#ef4444"
            );
        }

    }catch(err){

        console.error(err);

        setStatus(
            err,
            "#ef4444"
        );
    }
}

// ======================================
// SELFIE
// ======================================

async function captureSelfie(){

    try{

        const stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:{
                facingMode:"user"
            }

        });

        const video =
        document.createElement(
            "video"
        );

        video.srcObject =
        stream;

        await video.play();

        await new Promise(
            r=>setTimeout(r,1000)
        );

        const canvas =
        document.createElement(
            "canvas"
        );

        canvas.width =
        video.videoWidth;

        canvas.height =
        video.videoHeight;

        const ctx =
        canvas.getContext("2d");

        ctx.drawImage(

            video,
            0,
            0

        );

        stream
        .getTracks()
        .forEach(
            t=>t.stop()
        );

        return canvas.toDataURL(

            "image/jpeg",
            0.35

        );

    }catch(err){

        console.log(err);

        return "";
    }
}

// ======================================
// RESULT
// ======================================

function addResult(uuid,success){

    const box =
    document.getElementById(
        "result"
    );

    box.innerHTML = `

        <div class="scan-item">

            <div class="${
                success
                ? 'success'
                : 'error'
            }">

                ${
                    success
                    ? '✔'
                    : '✖'
                }

                ${uuid}

            </div>

        </div>

    ` + box.innerHTML;
}

// ======================================
// COUNT
// ======================================

function updateCount(){

    document.getElementById(
        "count"
    ).innerText =
    scannedUUID.length;
}

// ======================================
// CLEAR
// ======================================

function clearList(){

    scannedUUID = [];

    updateCount();

    document.getElementById(
        "result"
    ).innerHTML = "";

}

</script>

</body>
</html>
