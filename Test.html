<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Rating QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

:root{
    --bg:#0f172a;
    --card:#1e293b;
    --primary:#60a5fa;
    --success:#10b981;
    --danger:#ef4444;
    --text:#f8fafc;
    --muted:#94a3b8;
    --star-off:#475569;
    --star-on:#fbbf24;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

header{
    padding:20px;
    text-align:center;
    font-size:1.2rem;
    font-weight:800;
    letter-spacing:1px;

    color:var(--primary);

    background:rgba(30,41,59,.9);

    border-bottom:1px solid rgba(255,255,255,.08);
}

.container{
    max-width:550px;
    margin:auto;
    padding:20px;
}

#reader{
    width:100%;
    overflow:hidden;
    border-radius:18px;
    border:2px solid rgba(255,255,255,.08);
    background:#000;
}

.status-box{
    margin-top:15px;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    color:var(--muted);

    font-size:.95rem;
}

.spinner{
    width:18px;
    height:18px;
    animation:spin 1.2s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

button{
    width:100%;
    border:none;
    border-radius:14px;

    padding:15px;

    font-size:1rem;
    font-weight:700;

    cursor:pointer;

    transition:.2s;
}

button:active{
    transform:scale(.98);
}

#processBtn{
    margin-top:18px;
    background:#2563eb;
    color:white;
}

#scanCount{
    margin-top:12px;
    text-align:center;
    color:var(--muted);
}

#result-panel{
    margin-top:20px;
}

.employee-row{

    display:flex;
    align-items:center;
    justify-content:space-between;

    gap:10px;

    padding:14px 16px;

    margin-bottom:10px;

    border-radius:14px;

    background:var(--card);

    border:1px solid rgba(255,255,255,.08);
}

.employee-code{

    min-width:120px;

    color:var(--primary);

    font-weight:700;

    font-size:1rem;
}

.star-container{

    display:flex;
    align-items:center;
    gap:2px;
}

.star-btn{

    border:none;
    background:none;

    width:auto;
    padding:0;

    font-size:32px;

    cursor:pointer;

    color:var(--star-off);
}

.star-btn.active{
    color:var(--star-on);
}

#submitAllBtn{
    margin-top:18px;
    background:var(--success);
    color:white;
}

#cancelBtn{
    margin-top:10px;
    background:transparent;
    border:1px solid #475569;
    color:var(--muted);
}

</style>
</head>

<body>

<header>
    STAFF RATING SYSTEM
</header>

<div class="container">

    <!-- Scanner -->
    <div id="scanner-section">

        <div id="reader"></div>

        <div id="statusText" class="status-box">

            <svg class="spinner" viewBox="0 0 50 50">
                <circle
                    cx="25"
                    cy="25"
                    r="20"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="5"
                    stroke-dasharray="80,200"
                    stroke-linecap="round">
                </circle>
            </svg>

            <span>กำลังเปิดกล้อง...</span>

        </div>

    </div>

    <!-- Process Button -->
    <button id="processBtn" onclick="processEmployees()">
        ประมวลผลรายชื่อ
    </button>

    <!-- Scan Count -->
    <div id="scanCount">
        สแกนแล้ว 0 คน
    </div>

    <!-- Result -->
    <div id="result-panel"></div>

</div>

<script>

let html5QrCode;

let scannedEmployees = [];

let finalEmployees = [];

// ================= START CAMERA =================

async function startScanner(){

    if(html5QrCode){

        try{
            await html5QrCode.stop();
        }catch(e){}

    }

    html5QrCode = new Html5Qrcode("reader");

    const config = {

        fps:10,

        qrbox:{
            width:250,
            height:250
        },

        aspectRatio:1.0
    };

    try{

        await html5QrCode.start(

            { facingMode:"environment" },

            config,

            onScanSuccess
        );

        setStatus("success","พร้อมสแกน QR Code");

    }catch(err){

        console.error(err);

        setStatus("error","ไม่สามารถเปิดกล้องได้");

    }
}

// ================= STATUS =================

function setStatus(type,text){

    const el = document.getElementById("statusText");

    let icon = '';

    if(type === "success"){
        icon = "✅";
    }

    if(type === "error"){
        icon = "❌";
    }

    if(type === "loading"){

        icon = `
        <svg class="spinner" viewBox="0 0 50 50">
            <circle
                cx="25"
                cy="25"
                r="20"
                fill="none"
                stroke="currentColor"
                stroke-width="5"
                stroke-dasharray="80,200"
                stroke-linecap="round">
            </circle>
        </svg>`;
    }

    el.innerHTML = `${icon} <span>${text}</span>`;
}

// ================= SCAN SUCCESS =================

async function onScanSuccess(decodedText){

    html5QrCode.pause(true);

    const employeeCode = decodedText.trim();

    const duplicate = scannedEmployees.find(emp =>
        emp.code === employeeCode
    );

    if(duplicate){

        setStatus(
            "error",
            `รหัส ${employeeCode} ถูกสแกนแล้ว`
        );

    }else{

        scannedEmployees.push({

            code:employeeCode,
            rating:0

        });

        updateScanCount();

        setStatus(
            "success",
            `เพิ่ม ${employeeCode} แล้ว`
        );
    }

    setTimeout(()=>{

        html5QrCode.resume();

    },1000);
}

// ================= UPDATE COUNT =================

function updateScanCount(){

    document.getElementById("scanCount").innerHTML =
        `สแกนแล้ว ${scannedEmployees.length} คน`;
}

// ================= PROCESS =================

function processEmployees(){

    if(scannedEmployees.length === 0){

        alert("ยังไม่มีข้อมูลที่สแกน");

        return;
    }

    finalEmployees = [...scannedEmployees];

    document.getElementById("scanner-section").style.display = "none";

    document.getElementById("processBtn").style.display = "none";

    document.getElementById("scanCount").style.display = "none";

    renderEmployees();
}

// ================= RENDER =================

function renderEmployees(){

    const panel = document.getElementById("result-panel");

    panel.innerHTML = "";

    finalEmployees.forEach((emp,index)=>{

        const stars = [1,2,3,4,5].map(n=>{

            return `
                <button
                    class="star-btn ${n <= emp.rating ? 'active' : ''}"
                    onclick="setRating(${index},${n})">
                    ★
                </button>
            `;

        }).join('');

        panel.innerHTML += `

            <div class="employee-row">

                <div class="employee-code">
                    ${emp.code}
                </div>

                <div class="star-container">
                    ${stars}
                </div>

            </div>

        `;
    });

    panel.innerHTML += `

        <button
            id="submitAllBtn"
            onclick="sendAllData()">

            ส่งข้อมูลทั้งหมด

        </button>

        <button
            id="cancelBtn"
            onclick="restartAll()">

            ยกเลิก

        </button>
    `;
}

// ================= SET RATING =================

function setRating(index,rating){

    finalEmployees[index].rating = rating;

    renderEmployees();
}

// ================= SEND =================

function sendAllData(){

    const noRating = finalEmployees.find(emp =>
        emp.rating === 0
    );

    if(noRating){

        alert("กรุณาให้คะแนนให้ครบทุกคน");

        return;
    }

    console.log(finalEmployees);

    let summary = "ส่งข้อมูลเรียบร้อย\n\n";

    finalEmployees.forEach(emp=>{

        summary +=
            `${emp.code}\n` +
            `คะแนน ${emp.rating} ดาว\n\n`;

    });

    alert(summary);

    restartAll();
}

// ================= RESET =================

function restartAll(){

    scannedEmployees = [];

    finalEmployees = [];

    document.getElementById("result-panel").innerHTML = "";

    document.getElementById("scanner-section").style.display = "block";

    document.getElementById("processBtn").style.display = "block";

    document.getElementById("scanCount").style.display = "block";

    updateScanCount();
}

// ================= START =================

window.onload = ()=>{

    startScanner();

    updateScanCount();
};

</script>

</body>
</html>
