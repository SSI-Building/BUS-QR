<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee QR Rating System</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --primary:#60a5fa;
    --success:#10b981;
    --warning:#fbbf24;
}

body{
    margin:0;
    font-family:Segoe UI;
    background:var(--bg);
    color:var(--text);
}

header{
    text-align:center;
    padding:18px;
    font-weight:800;
    color:var(--primary);
    background:rgba(30,41,59,.8);
    letter-spacing:1px;
}

.container{
    max-width:520px;
    margin:auto;
    padding:18px;
}

#reader{
    border-radius:16px;
    overflow:hidden;
}

.status{
    margin-top:12px;
    padding:12px;
    background:var(--card);
    border-radius:12px;
    text-align:center;
    color:var(--muted);
    font-weight:600;
}

button{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    font-size:16px;
}

#processBtn{
    background:#2563eb;
    color:white;
}

#scanCount{
    text-align:center;
    margin-top:10px;
    color:var(--muted);
}

</style>
</head>

<body>

<header>STAFF QR RATING SYSTEM</header>

<div class="container">

    <div id="reader"></div>

    <div id="statusBox" class="status">
        ● Ready to scan
    </div>

    <button id="processBtn" onclick="processEmployees()">
        ประมวลผลรายชื่อ
    </button>

    <div id="scanCount">
        สแกนแล้ว 0 คน
    </div>

    <div id="result"></div>

</div>

<script>

// ================= EMPLOYEE API =================
const EMPLOYEE_API =
"https://script.google.com/macros/s/AKfycbxNNTE57DPtMhM45_z1Qt5WyNhJUr-Gex1IbU4j9XT1UaVq5gTJtfciZdK_eZzi1Zbl/exec";

const SAVE_API =
"https://script.google.com/macros/s/AKfycbxWcGZALWMcbL4Mjm995BVERa26kUUk6hM-HPWZ7rFyiuxCSM_qHBSERlD4tYVGpBVm/exec";

// ================= VARIABLES =================
let scanner;
let scanned = [];
let finalList = [];
let employeeMap = {};
let cameraPermission = false;

// ================= PRELOAD CAMERA =================
async function preloadCameraPermission(){

    try{

        const stream =
            await navigator.mediaDevices.getUserMedia({
                video:true
            });

        stream
            .getTracks()
            .forEach(track=>track.stop());

        cameraPermission = true;

        console.log(
            "Camera permission granted"
        );

    }catch(err){

        console.log(
            "Camera permission denied"
        );

        cameraPermission = false;
    }
}

// ================= START SCANNER =================
async function startScanner(){

    scanner =
        new Html5Qrcode("reader");

    await scanner.start(
        {
            facingMode:"environment"
        },
        {
            fps:10,
            qrbox:250
        },
        onScan
    );

    setStatus("idle","");
}

// ================= STATUS =================
function setStatus(type,text){

    const el =
        document.getElementById(
            "statusBox"
        );

    if(!el) return;

    if(type==="idle"){

        el.innerHTML =
            "● Ready to scan";

        el.style.color =
            "#94a3b8";
    }

    if(type==="scan"){

        el.innerHTML =
            "⟳ Processing...";

        el.style.color =
            "#fbbf24";
    }

    if(type==="success"){

        el.innerHTML =
            "✔ " + text;

        el.style.color =
            "#10b981";
    }

    if(type==="error"){

        el.innerHTML =
            "✖ " + text;

        el.style.color =
            "#ef4444";
    }
}

// ================= SCAN =================
async function onScan(decodedText){

    setStatus("scan","");

    await scanner.pause();

    const raw =
        decodedText.trim();

    const pattern =
        /^https:\/\/ssi-building\.github\.io\/BUS-QR\/Test\.html\?id=([A-Z0-9]+)$/i;

    const match =
        raw.match(pattern);

    // ================= INVALID =================
    if(!match){

        setStatus(
            "error",
            "QR นี้ไม่ใช่รหัสพนักงาน"
        );

        setTimeout(()=>{

            setStatus("idle","");

            scanner.resume();

        },1000);

        return;
    }

    // ================= GET CODE =================
    const code =
        match[1]
        .trim()
        .toUpperCase();

    // ================= DUPLICATE =================
    const dup =
        scanned.find(
            e => e.code === code
        );

    if(!dup){

        scanned.push({

            code:code,
            rating:0

        });

        updateCount();
    }

    setStatus(
        "success",
        code
    );

    setTimeout(()=>{

        setStatus("idle","");

        scanner.resume();

    },700);
}

// ================= UPDATE COUNT =================
function updateCount(){

    document.getElementById(
        "scanCount"
    ).innerText =

        "สแกนแล้ว " +
        scanned.length +
        " คน";
}

// ================= LOAD EMPLOYEE =================
async function loadEmployees(){

    const res =
        await fetch(
            EMPLOYEE_API
        );

    const data =
        await res.json();

    employeeMap = {};

    data.forEach(emp=>{

        employeeMap[
            String(emp.code)
            .trim()
            .toUpperCase()
        ] = emp.name;

    });
}

// ================= PROCESS =================
async function processEmployees(){

    if(scanned.length===0){

        alert("ยังไม่มีข้อมูล");

        return;
    }

    // ================= LOADING =================
    document.body.innerHTML = `

        <div style="
            position:fixed;
            inset:0;
            background:#0f172a;

            display:flex;
            flex-direction:column;

            align-items:center;
            justify-content:center;

            color:white;
            font-family:Segoe UI;
        ">

            <div style="
                width:70px;
                height:70px;

                border:6px solid #334155;
                border-top:6px solid #60a5fa;

                border-radius:50%;

                animation:spin 1s linear infinite;
            "></div>

            <div style="
                margin-top:20px;
                font-size:22px;
                font-weight:700;
            ">
                กำลังประมวลผลรายชื่อ
            </div>

        </div>

        <style>

        @keyframes spin{

            0%{
                transform:rotate(0deg);
            }

            100%{
                transform:rotate(360deg);
            }
        }

        </style>
    `;

    try{

        await loadEmployees();

        finalList =
            scanned.map(emp=>({

                code:emp.code,

                name:
                    employeeMap[emp.code]
                    || "Unknown",

                rating:0
            }));

        // ================= RESTORE PAGE =================
        document.body.innerHTML = `

            <header style="
                text-align:center;
                padding:18px;
                font-weight:800;
                color:#60a5fa;
                background:rgba(30,41,59,.8);
                font-family:Segoe UI;
            ">
                STAFF QR RATING SYSTEM
            </header>

            <div class="container" style="
                max-width:520px;
                margin:auto;
                padding:18px;
            ">

                <div id="result"></div>

            </div>
        `;

        render();

    }catch(err){

        console.error(err);

        alert(
            "โหลดรายชื่อไม่สำเร็จ"
        );

        location.reload();
    }
}

// ================= RENDER =================
function render(){

    const box =
        document.getElementById(
            "result"
        );

    box.innerHTML = "";

    // ================= EVALUATOR =================
    box.innerHTML += `

        <div style="
            background:#1e293b;
            padding:14px;
            border-radius:12px;
            margin-bottom:12px;
        ">

            <div style="
                margin-bottom:8px;
                color:#94a3b8;
                font-size:14px;
            ">
                รหัสพนักงานผู้ประเมิน
            </div>

            <input
                type="text"
                id="evaluatorId"
                placeholder="เช่น K0123"

                style="
                    width:100%;
                    padding:12px;

                    border:none;
                    border-radius:10px;

                    background:#0f172a;
                    color:white;

                    font-size:16px;
                    box-sizing:border-box;
                "
            >

        </div>
    `;

    // ================= EMPLOYEE =================
    finalList.forEach((e,i)=>{

        let stars = "";

        for(let n=1;n<=5;n++){

            stars += `

                <span
                    onclick="rate(${i},${n})"

                    style="
                        font-size:30px;
                        cursor:pointer;

                        color:
                        ${
                            n<=e.rating
                            ? '#fbbf24'
                            : '#475569'
                        };
                    "
                >
                    ★
                </span>
            `;
        }

        box.innerHTML += `

            <div style="
                display:flex;
                justify-content:space-between;
                align-items:center;

                background:#1e293b;

                padding:12px;
                margin-top:10px;

                border-radius:12px;
            ">

                <div>

                    <div style="
                        color:#60a5fa;
                        font-weight:700;
                        font-size:17px;
                    ">
                        ${e.name}
                    </div>

                    <div style="
                        color:#94a3b8;
                        font-size:13px;
                        margin-top:4px;
                        font-family:monospace;
                    ">
                        ${e.code}
                    </div>

                </div>

                <div>
                    ${stars}
                </div>

            </div>
        `;
    });

    // ================= BUTTON =================
    box.innerHTML += `

        <button
            onclick="send()"

            style="
                margin-top:15px;
                background:#10b981;
                color:white;
            "
        >
            ส่งข้อมูล
        </button>

        <button
            onclick="location.reload()"

            style="
                margin-top:10px;
                background:transparent;
                border:1px solid #475569;
                color:#94a3b8;
            "
        >
            เริ่มใหม่
        </button>
    `;
}

// ================= RATE =================
function rate(i,n){

    finalList[i].rating = n;

    render();

    const input =
        document.getElementById(
            "evaluatorId"
        );

    if(
        input &&
        window.savedEvaluator
    ){

        input.value =
            window.savedEvaluator;
    }
}

// ================= CAPTURE SELFIE (FORCE SYNCHRONOUS PROCESS) =================
async function captureSelfie(){
    return new Promise(async (resolve) => {
        try {
            // 1. หยุดกล้องหลังก่อน
            if(scanner){
                await scanner.stop();
            }

            // 2. เปิดกล้องหน้า
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { ideal: "user" } }
            });

            const video = document.createElement("video");
            video.srcObject = stream;
            // บังคับให้เล่นและรอให้วิดีโอโหลด Metadata เสร็จ
            video.playsInline = true;
            await video.play();

            // หน่วงเวลาให้กล้องปรับแสงและโฟกัส 1 วินาทีเต็ม เพื่อให้ได้ภาพที่นิ่งและพร้อมดึงข้อมูล
            await new Promise(r => setTimeout(r, 1000));

            // 3. เตรียมจัดการย่อรูปบน Canvas (เหลือความกว้าง 360px ไฟล์จะเล็กมากอัปโหลดไวแน่นอน)
            const canvas = document.createElement("canvas");
            const MAX_WIDTH = 360;
            let width = video.videoWidth;
            let height = video.videoHeight;

            if (width > MAX_WIDTH) {
                height = Math.round((height * MAX_WIDTH) / width);
                width = MAX_WIDTH;
            }
            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(video, 0, 0, width, height);

            // 4. ปิดการทำงานของกล้องหน้าทันทีที่วาดเสร็จ
            stream.getTracks().forEach(track => track.stop());

            // 5. [จุดสำคัญ] บังคับให้ประมวลผลไฟล์รูปภาพให้เสร็จเป็น Blob ก่อนแปลงเป็น Base64
            // ปรับคุณภาพลงเหลือ 0.4 (ภาพจะขนาดเล็กมากประมาณ 20-30 KB เท่านั้น อัปโหลดเสร็จในเสี้ยววินาที)
            canvas.toBlob((blob) => {
                const reader = new FileReader();
                reader.onloadend = function() {
                    const base64String = reader.result;
                    resolve(base64String); // ส่งค่ากลับเมื่อได้ Base64 ที่สมบูรณ์แล้วเท่านั้น
                };
                reader.readAsDataURL(blob);
            }, "image/jpeg", 0.4);

        } catch (err) {
            console.error("Selfie Capture Error: ", err);
            resolve(""); // หากพังให้ส่งค่าว่างกลับไปเพื่อไม่ให้ระบบค้าง
        }
    });
}

// ================= SEND (WAIT FOR IMAGE COMPLETELY) =================
async function send(){
    try {
        const evaluator = document.getElementById("evaluatorId").value.trim().toUpperCase();

        if (evaluator === "") {
            alert("กรุณากรอกรหัสพนักงานผู้ประเมิน");
            return;
        }

        const empty = finalList.find(e => e.rating === 0);
        if (empty) {
            alert("ให้คะแนนไม่ครบ");
            return;
        }

        // แสดงหน้าจอหมุน ๆ กำลังบันทึกข้อมูล
        document.body.innerHTML = `
            <div style="position:fixed; inset:0; background:#0f172a; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; font-family:Segoe UI;">
                <div style="width:70px; height:70px; border:6px solid #334155; border-top:6px solid #10b981; border-radius:50%; animation:spin 1s linear infinite;"></div>
                <div style="margin-top:20px; font-size:22px; font-weight:700;" id="loadingText">
                    กำลังประมวลผลรูปภาพถ่ายเซลฟี่...
                </div>
            </div>
            <style>
                @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
            </style>
        `;

        // บังคับให้รอจนถ่ายภาพและบีบอัดรูปภาพเสร็จสิ้น 100% ก่อน!
        const selfie = await captureSelfie();
        
        // อัปเดตข้อความให้ผู้ใช้รู้ว่ากำลังส่งเข้าคลาวด์
        document.getElementById("loadingText").innerText = "กำลังอัปโหลดข้อมูลและรูปภาพลงระบบ...";

        console.log("SENDING DATA TO API...");

        // ส่งข้อมูลไปยัง Apps Script
        const res = await fetch(SAVE_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                evaluator: evaluator,
                selfie: selfie,
                data: finalList
            })
        });

        if (!res.ok) {
            throw new Error("HTTP ERROR : " + res.status);
        }

        const result = await res.json();
        console.log("API RESPONSE:", result);

        // หน้าจอเมื่อสำเร็จ
        document.body.innerHTML = `
            <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#0f172a; color:white; font-family:Segoe UI; text-align:center;">
                <div style="font-size:70px; margin-bottom:20px;">✔</div>
                <div style="font-size:24px; font-weight:700; margin-bottom:10px;">ส่งข้อมูลสำเร็จ</div>
                <div style="color:#94a3b8; font-size:15px;">บันทึกรายชื่อและรูปภาพเรียบร้อยแล้ว สามารถปิดหน้านี้ได้เลย</div>
            </div>
        `;

        setTimeout(() => {
            window.open('', '_self');
            window.close();
        }, 2000);

    } catch (err) {
        console.error(err);
        alert("ส่งข้อมูลไม่สำเร็จ : " + err);
        location.reload();
    }
}

// ================= SAVE INPUT =================
document.addEventListener(
    "input",
    (e)=>{

        if(
            e.target.id==="evaluatorId"
        ){

            window.savedEvaluator =
                e.target.value;
        }
    }
);

// ================= START =================
window.onload = async ()=>{

    // ขอ permission ก่อน
    await preloadCameraPermission();

    // เริ่ม scanner
    startScanner();
};

</script>

</body>
</html>
