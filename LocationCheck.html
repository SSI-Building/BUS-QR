<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
      :root { --neon-blue: #00f2ff; --neon-green: #39ff14; --neon-red: #ff3131; }
      body { 
        font-family: 'Segoe UI', sans-serif; 
        background: #0b0e14; 
        color: #e6edf3; 
        margin: 0; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        min-height: 100vh;
      }
      h2 { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-top: 20px; }
      
      #reader-container {
        width: 90%;
        max-width: 500px;
        border: 2px solid var(--neon-blue);
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        border-radius: 15px;
        overflow: hidden;
        background: #000;
        position: relative;
      }
      
      #reader { width: 100%; }

      #result {
        width: 85%;
        max-width: 480px;
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        font-size: 1.1rem;
        text-align: center;
        display: none;
        animation: fadeIn 0.5s ease-in-out;
      }

      .success { border: 2px solid var(--neon-green); background: rgba(57, 255, 20, 0.1); color: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }
      .error { border: 2px solid var(--neon-red); background: rgba(255, 49, 49, 0.1); color: var(--neon-red); box-shadow: 0 0 10px var(--neon-red); }
      .warning { border: 2px solid #ffcc00; background: rgba(255, 204, 0, 0.1); color: #ffcc00; box-shadow: 0 0 10px #ffcc00; }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      
      /* ปรับแต่งปุ่มภายใน library ให้กลมกลืน */
      #reader button {
        background: var(--neon-blue);
        border: none;
        padding: 10px 20px;
        color: black;
        font-weight: bold;
        border-radius: 5px;
        cursor: pointer;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h2>SCANNER PRO</h2>
    <div id="reader-container">
      <div id="reader"></div>
    </div>
    <div id="result"></div>

    <script>
      const locations = [
{ name: "โรงจอดรถด้านหน้าป้อม", lat: 11.225348, lng: 99.538782, url: "chkL1stX9Q2.html" },
{ name: "โรงจอดรถหน้าโรงงาน", lat: 11.225717, lng: 99.538858, url: "001QWER.html" },
{ name: "ป้อมข้างห้องน้ำ", lat: 11.225813, lng: 99.538542, url: "chkL2stX9Q2.html" },
{ name: "ป้อม รปภ. 101", lat: 11.225467, lng: 99.538279, url: "002QWER.html" },
{ name: "ออฟฟิสหน้า SSI", lat: 11.225359, lng: 99.537677, url: "chkL3stX9Q2.html" },
{ name: "ซุ้มศาลาพักผ่อนทางเดินไป Canteen", lat: 11.2254441, lng: 99.537348, url: "chkL4stX9Q2.html" },
{ name: "ออดิทรอเดียม", lat: 11.226557, lng: 99.53779, url: "chkL7stX9Q2.html" },
{ name: "ด้านข้าง Canteen-หน้าห้องน้ำ Canteen", lat: 11.225793, lng: 99.536973, url: "chkL5stX9Q2.html" },
{ name: "ด้านข้าง Canteen-ฝั่งซุ่มกระดังงา", lat: 11.226141, lng: 99.536935, url: "chkL6stX9Q2.html" },
{ name: "ข้าง Fire Station", lat: 11.225385, lng: 99.536293, url: "chkL9stX9Q2.html" },
{ name: "หลังออดิ Lab หลังงาน", lat: 11.226963, lng: 99.537676, url: "chkL8stX9Q2.html" },
{ name: "พื้นที่รับน้ำมันเตา", lat: 11.23028, lng: 99.532628, url: "chkL37stX9Q2.html" },
{ name: "Office Slab Yard", lat: 11.2292899, lng: 99.533559, url: "chkL11stX9Q2.html" },
{ name: "ข้าง RM Pulpit", lat: 11.229717, lng: 99.533626, url: "chkL16stX9Q2.html" },
{ name: "หน้าห้อง MMD ข้าง Line ผลิด HSM", lat: 11.229913, lng: 99.533969, url: "chkL15stX9Q2.html" },
{ name: "Roll shop HSM", lat: 11.229592, lng: 99.533996, url: "chkL17stX9Q2.html" },
{ name: "Roll shop HSM ข้างห้อง Canteen RSH", lat: 11.229901, lng: 99.534295, url: "chkL18stX9Q2.html" },
{ name: "หน้า Down Coiler Pulpit", lat: 11.23163462, lng: 99.53481861, url: "chkL19stX9Q2.html" },
{ name: "อินเซ่ไฟฟ้า", lat: 11.232314, lng: 99.532847, url: "chkL34stX9Q2.html" },
{ name: "บริเวณจุดพักพนักงาน Cleaning", lat: 11.231295, lng: 99.53301, url: "chkL36stX9Q2.html" },
{ name: "WTP-บ่อสแกล", lat: 11.231105, lng: 99.533641, url: "chkL23stX9Q2.html" },
{ name: "ประตู Motor Room(ทางด่วน)", lat: 11.2309399, lng: 99.534475, url: "chkL20stX9Q2.html" },
{ name: "ประตูทางออกไป WTP", lat: 11.231106, lng: 99.53477, url: "chkL14stX9Q2.html" },
{ name: "จุดข้างห้องน้ำทำเนียบขาว", lat: 11.230784, lng: 99.53502, url: "chkL13stX9Q2.html" },
{ name: "หน้า Store Room M1", lat: 11.230279, lng: 99.534693, url: "chkL12stX9Q2.html" },
{ name: "Office CYS ชั้น1 ข้างห้องน้ำชั้น 1", lat: 11.233847, lng: 99.534942, url: "chkL33stX9Q2.html" },
{ name: "SKP#1", lat: 11.231749, lng: 99.535804, url: "chkL24stX9Q2.html" },
{ name: "SKP#3 ด้านหน้า ห้องน้ำ", lat: 11.233425, lng: 99.536786, url: "chkL25stX9Q2.html" },
{ name: "Work Shop", lat: 11.234602, lng: 99.537824, url: "chkL27stX9Q2.html" },
{ name: "หน้า WH", lat: 11.234008, lng: 99.537843, url: "chkL26stX9Q2.html" },
{ name: "SKP#2 ชั้นบน", lat: 11.235266, lng: 99.538055, url: "chkL28stX9Q2.html" },
{ name: "ป้อม 104 ข้าง TCS", lat: 11.233813, lng: 99.539183, url: "chkL10stX9Q2.html" },
{ name: "Office POP", lat: 11.2371599, lng: 99.539134, url: "chkL31stX9Q2.html" },
{ name: "ตาชั่ง TCS", lat: 11.2320967, lng: 99.5410033, url: "004QWER.html" },
{ name: "WCE", lat: 11.23656, lng: 99.53628, url: "chkL9stX9Q3.html" }
      ];

      let userCoords = { lat: 0, lon: 0 };
      const html5QrCode = new Html5Qrcode("reader");

      // ดึง GPS
      navigator.geolocation.getCurrentPosition((pos) => {
        userCoords.lat = pos.coords.latitude;
        userCoords.lon = pos.coords.longitude;
      }, (err) => console.log("Waiting for GPS..."), { enableHighAccuracy: true });

      // ฟังก์ชันเริ่มกล้องอัตโนมัติ
      const startCamera = () => {
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
      };

      function onScanSuccess(decodedText) {
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';

        const match = locations.find(item => decodedText.includes(item.url));

        if (match) {
          const distance = getDistance(userCoords.lat, userCoords.lon, match.lat, match.lng);
          
          if (distance <= 20) {
            resultDiv.className = "success";
            resultDiv.innerHTML = `<strong>SUCCESS</strong><br>📍 ${match.name}<br>Dist: ${distance.toFixed(2)} m.`;
          } else {
            resultDiv.className = "warning";
            resultDiv.innerHTML = `<strong>WRONG LOCATION</strong><br>Target: ${match.name}<br>Away: ${distance.toFixed(2)} m.`;
          }
        } else {
          resultDiv.className = "error";
          resultDiv.innerHTML = "<strong>INVALID QR</strong><br>Link not found in database.";
        }
      }

      function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      }

      // รันกล้องทันทีที่โหลดเสร็จ
      window.onload = startCamera;
    </script>
  </body>
</html>
