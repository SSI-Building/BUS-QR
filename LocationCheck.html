<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Checker Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { 
  --neon-blue: #00f2ff; 
  --neon-green: #39ff14; 
  --neon-red: #ff3131; 
}

body { 
  font-family: 'Segoe UI', Tahoma, sans-serif; 
  background: radial-gradient(circle at top, #111827, #020617);
  color: #e6edf3; 
  margin: 0; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  min-height: 100vh;
}

/* HEADER */
header {
  width: 100%;
  padding: 18px 0;
  text-align: center;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
  border-bottom: 1px solid rgba(0,242,255,0.2);
}

h2 { 
  margin: 0;
  font-size: 1.4rem;
  color: var(--neon-blue); 
  text-shadow: 0 0 12px var(--neon-blue); 
  letter-spacing: 2px;
}

/* SCANNER */
#reader-wrapper {
  width: 92%;
  max-width: 420px;
  margin-top: 20px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  background: black;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
}

#reader { width: 100%; }

/* overlay */
.scan-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.scan-box {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 65%;
  height: 65%;
  transform: translate(-50%, -50%);
  border: 2px solid var(--neon-blue);
  border-radius: 16px;
  box-shadow: 0 0 15px var(--neon-blue);
}

.scan-line {
  position: absolute;
  width: 65%;
  height: 2px;
  background: var(--neon-blue);
  left: 50%;
  transform: translateX(-50%);
  animation: scanMove 2s linear infinite;
}

@keyframes scanMove {
  0% { top: 20%; opacity: 0; }
  50% { opacity: 1; }
  100% { top: 80%; opacity: 0; }
}

/* STATUS */
#statusText {
  margin-top: 10px;
  opacity: 0.7;
}

/* RESULT */
#result {
  width: 90%;
  max-width: 420px;
  margin-top: 20px;
  padding: 18px;
  border-radius: 18px;
  text-align: center;
  display: none;
  backdrop-filter: blur(10px);
}

.status-emoji { font-size: 2rem; display: block; margin-bottom: 8px; }

.success { border: 1px solid var(--neon-green); background: rgba(57,255,20,0.08); color: var(--neon-green);}
.error { border: 1px solid var(--neon-red); background: rgba(255,49,49,0.08); color: var(--neon-red);}
.warning { border: 1px solid #ffcc00; background: rgba(255,204,0,0.08); color: #ffcc00;}

/* BUTTON */
#actionButtons { display:none; margin-top:10px; }

.btn {
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #00f2ff, #00c3ff);
  color: #000;
  font-weight: bold;
  cursor: pointer;
  margin: 5px;
}
</style>
</head>

<body>

<header>
  <h2>QR CHECKER PRO</h2>
</header>

<div id="reader-wrapper">
  <div id="reader"></div>
  <div class="scan-overlay">
    <div class="scan-box"></div>
    <div class="scan-line"></div>
  </div>
</div>

<p id="statusText">🔍 กำลังสแกน QR...</p>

<div id="result"></div>

<div id="actionButtons">
  <button onclick="restartScan()" class="btn">🔄 สแกนใหม่</button>
  <button onclick="clearResult()" class="btn" style="background:#ff3131;color:#fff;">🧹 ล้าง</button>
</div>

<script>
let locations = [];
async function loadLocations() {
  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbxwp63522RTGXFXcpfiqhmJmPEKpYDol5yzRIxRjDo9T5LMZ-P0crY6l0CFsyFMtdVgCw/exec");
    const data = await res.json();

    locations = data.map(item => ({
      name: item.name,
      lat: parseFloat(item.lat),
      lng: parseFloat(item.lng),
      url: item.url.split("/").pop()
    }));

    console.log("โหลดข้อมูลสำเร็จ:", locations);

  } catch (err) {
    console.error("โหลดข้อมูลล้มเหลว:", err);
    alert("❌ โหลดข้อมูลสถานที่ไม่สำเร็จ");
  }
}

let userCoords = { lat: 0, lon: 0 };
let scanning = true;
let isCameraRunning = false;

const html5QrCode = new Html5Qrcode("reader");

// GPS
navigator.geolocation.watchPosition(pos => {
  userCoords.lat = pos.coords.latitude;
  userCoords.lon = pos.coords.longitude;
});

// start camera
async function startCamera() {
  if (isCameraRunning) return;

  const config = { fps: 15, qrbox: w => ({ width: w*0.7, height: w*0.7 }) };

  try {
    await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    isCameraRunning = true;
  } catch(e) {
    console.error(e);
  }
}

// scan success
async function onScanSuccess(decodedText) {
  if (!scanning) return;

  scanning = false;

  const result = document.getElementById('result');
  const status = document.getElementById('statusText');
  const buttons = document.getElementById('actionButtons');

  try {
    await html5QrCode.stop();
    isCameraRunning = false;
  } catch(e) {}

  if (navigator.vibrate) navigator.vibrate(100);

  const match = locations.find(i => decodedText.includes(i.url));

  result.style.display = 'block';
  buttons.style.display = 'block';
  status.innerText = "✅ สแกนสำเร็จ";

  if (match) {
    const d = getDistance(userCoords.lat, userCoords.lon, match.lat, match.lng);

    result.className = d <= 20 ? "success" : "warning";
    result.innerHTML = `
      <span class="status-emoji">${d<=20?"✅":"⚠️"}</span>
      <strong>${d<=20?"ติดตั้งถูกต้อง":"พิกัดไม่ตรงจุด"}</strong><br>
      📍 ${match.name}<br>
      ระยะ: ${d.toFixed(2)} ม.
    `;
  } else {
    result.className = "error";
    result.innerHTML = `
      <span class="status-emoji">❌</span>
      <strong>QR ไม่ถูกต้อง</strong>
    `;
  }
}

// restart
function restartScan() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('actionButtons').style.display = 'none';
  document.getElementById('statusText').innerText = "🔍 กำลังสแกน...";
  scanning = true;
  startCamera();
}

// clear
function clearResult() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('actionButtons').style.display = 'none';
  document.getElementById('statusText').innerText = "🔍 พร้อมสแกนใหม่";
  scanning = true;
  startCamera();
}

// distance
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

window.onload = async () => {
  await loadLocations();
  startCamera();
};
</script>

</body>
</html>
