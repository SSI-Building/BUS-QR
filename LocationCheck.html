// ===== สูตรระยะ =====
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;

    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180) *
              Math.cos(lat2*Math.PI/180) *
              Math.sin(dLon/2)**2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ===== หลังสแกน QR =====
function onScanSuccess(decodedText) {

    const place = locations.find(loc => decodedText.includes(loc.url));

    if (!place) {
        document.getElementById("place").innerText = "❌ ไม่รู้จัก QR นี้";
        return;
    }

    document.getElementById("place").innerText = "📍 " + place.name;

    // 📍 ดึง GPS
    navigator.geolocation.getCurrentPosition(
    function(pos){

        const acc = pos.coords.accuracy;
        const userLat = pos.coords.latitude;
        const userLng = pos.coords.longitude;

        document.getElementById("accuracy").innerText =
            "Accuracy: " + acc.toFixed(0) + " m";

        if (acc > 30) {
            document.getElementById("status").innerText = "⚠️ GPS ไม่แม่น";
            document.getElementById("status").className = "warn";
            return;
        }

        const distance = getDistance(userLat, userLng, place.lat, place.lng);

        document.getElementById("distance").innerText =
            "ระยะ: " + distance.toFixed(2) + " m";

        if (distance <= 20) {
            document.getElementById("status").innerText = "✅ อยู่ในพื้นที่";
            document.getElementById("status").className = "ok";
        } else {
            document.getElementById("status").innerText =
                "❌ นอกพื้นที่ (" + distance.toFixed(0) + " m)";
            document.getElementById("status").className = "bad";
        }

    },
    function(){
        document.getElementById("status").innerText =
            "❌ ต้องเปิด Location";
    },
    {
        enableHighAccuracy:true,
        timeout:10000,
        maximumAge:0
    });

}

// ===== เปิดกล้อง =====
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {
        html5QrCode.start(
            devices[0].id,
            { fps: 10, qrbox: 250 },
            onScanSuccess
        );
    }
});

</script>
