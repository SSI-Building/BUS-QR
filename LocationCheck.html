<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Checker Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { 
  --primary: #60a5fa;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f8fafc;
}

body { 
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  margin: 0;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  padding: 20px;
  background: rgba(30, 41, 59, 0.8);
  backdrop-filter: blur(10px);
  color: var(--primary);
  font-weight: 800;
  font-size: 1.2rem;
  letter-spacing: 1px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 500px;
  margin: 0 auto;
  width: 100%;
  box-sizing: border-box;
}

#reader {
  width: 100%;
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.1);
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
}

/* ปรับแต่งปุ่มภายใน html5-qrcode ถ้ามี */
#reader button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 6px;
  margin: 10px;
}

.status-box {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 20px 0;
  font-size: 0.95rem;
  color: #94a3b8;
}

#result {
  margin: 20px 0;
  padding: 20px;
  border-radius: 16px;
  display: none;
  animation: slideUp 0.3s ease-out;
  text-align: left;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.success { background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); color: #ecfdf5; }
.warning { background: rgba(245, 158, 11, 0.1); border: 1px solid var(--warning); color: #fffbeb; }
.error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: #fef2f2; }

.result-title {
  font-weight: bold;
  font-size: 1.1rem;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-group {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 20px;
}

button {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  font-size: 1rem;
  transition: all 0.2s;
}

button:active { transform: scale(0.98); }

#updateBtn { background: var(--warning); color: #000; }
#restartBtn { background: var(--primary); color: #fff; }

.icon { width: 20px; height: 20px; fill: currentColor; }

/* SVG Spinner */
.spinner {
  animation: rotate 2s linear infinite;
  width: 20px;
  height: 20px;
}
@keyframes rotate {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<header>QR CHECKER PRO</header>

<div class="container">
  <div id="reader"></div>
  
  <div id="statusText" class="status-box">
    <svg class="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-dasharray="80, 200" stroke-dashoffset="0" stroke-linecap="round"></circle></svg>
    <span>กำลังเตรียมระบบ...</span>
  </div>

  <div id="result"></div>

  <div class="btn-group">
    <button id="updateBtn" onclick="updateLocation()" style="display:none;">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      อัปเดทพิกัดปัจจุบัน
    </button>
    <button id="restartBtn" onclick="restartScan()">
      <svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      สแกนใหม่อีกครั้ง
    </button>
  </div>
</div>

<script>
// --- ส่วน Logic คงเดิม แต่ปรับการแสดงผล Text และ SVG ---
const FIND_API = "https://script.google.com/macros/s/AKfycbxwp63522RTGXFXcpfiqhmJmPEKpYDol5yzRIxRjDo9T5LMZ-P0crY6l0CFsyFMtdVgCw/exec";
const UPDATE_API = "https://script.google.com/macros/s/AKfycbxbdQjDtu6da-JIuhHUAVGhohViHvVVALMkIJZItMZWiXUatCR2Sk3U7T4ka8qsUD7N6A/exec";

let userCoords = { lat:0, lon:0 };
let scanning = true;
let html5QrCode;
let currentUrl = "";

// Icon templates
const icons = {
  check: '<svg class="icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>',
  alert: '<svg class="icon" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>',
  error: '<svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>',
  loading: '<svg class="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="5" stroke-dasharray="80, 200" stroke-dashoffset="0" stroke-linecap="round"></circle></svg>'
};

navigator.geolocation.watchPosition(
  pos => {
    userCoords.lat = pos.coords.latitude;
    userCoords.lon = pos.coords.longitude;
  },
  err => console.warn("GPS error:", err),
  { enableHighAccuracy:true }
);

async function startScanner() {
  setInfo("loading", "กำลังสแกน...");
  html5QrCode = new Html5Qrcode("reader");
  try {
    await html5QrCode.start({ facingMode:"environment" }, { fps:15, qrbox:250 }, onScanSuccess);
  } catch (err) {
    setInfo("error", "เปิดกล้องไม่ได้");
  }
}

function setInfo(iconKey, text) {
  document.getElementById("statusText").innerHTML = `${icons[iconKey]} <span>${text}</span>`;
}

async function onScanSuccess(decodedText) {
  if (!scanning) return;
  scanning = false;
  
  const result = document.getElementById("result");
  const updateBtn = document.getElementById("updateBtn");
  
  setInfo("loading", "กำลังตรวจสอบข้อมูล...");
  try { await html5QrCode.stop(); } catch(e){}

  try {
    currentUrl = decodedText;
    const res = await fetch(FIND_API + "?url=" + encodeURIComponent(decodedText));
    const data = await res.json();

    result.style.display = "block";

    if (!data.found) {
      result.className = "error";
      result.innerHTML = `<div class="result-title">${icons.error} ไม่พบข้อมูล</div>QR นี้ไม่มีอยู่ในฐานข้อมูล`;
      updateBtn.style.display = "none";
      setInfo("error", "สแกนไม่สำเร็จ");
      return;
    }

    updateBtn.style.display = "flex";
    const d = getDistance(userCoords.lat, userCoords.lon, data.lat, data.lng);

    if (d <= 20) {
      result.className = "success";
      result.innerHTML = `<div class="result-title">${icons.check} ตำแหน่งถูกต้อง</div>
                          <b>📍 ${data.name}</b><br><small>ระยะห่าง: ${d.toFixed(2)} เมตร</small>`;
      setInfo("check", "ตรวจสอบแล้ว");
    } else {
      result.className = "warning";
      result.innerHTML = `<div class="result-title">${icons.alert} พิกัดไม่ตรง</div>
                          <b>📍 ${data.name}</b><br><small>ระยะห่าง: ${d.toFixed(2)} เมตร</small>`;
      setInfo("alert", "พิกัดคลาดเคลื่อน");
    }

  } catch (err) {
    result.className = "error";
    result.style.display = "block";
    result.innerHTML = "❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้";
  }
}

async function updateLocation() {
  if (!currentUrl || !userCoords.lat) return alert("ข้อมูลไม่พร้อม");
  if (!confirm("ยืนยันการอัปเดทพิกัดใหม่ไปยังตำแหน่งปัจจุบันของคุณ?")) return;

  setInfo("loading", "กำลังบันทึกพิกัด...");
  try {
    const res = await fetch(UPDATE_API + "?url=" + encodeURIComponent(currentUrl) + "&lat=" + userCoords.lat + "&lng=" + userCoords.lon);
    const data = await res.json();
    if (data.success) {
      setInfo("check", "อัปเดทพิกัดสำเร็จ");
      alert("บันทึกข้อมูลเรียบร้อย!");
    } else {
      setInfo("error", data.message);
    }
  } catch (err) {
    setInfo("error", "เกิดข้อผิดพลาด");
  }
}

function restartScan() {
  document.getElementById("result").style.display = "none";
  document.getElementById("updateBtn").style.display = "none";
  currentUrl = "";
  scanning = true;
  startScanner();
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

window.onload = startScanner;
</script>

</body>
</html>
