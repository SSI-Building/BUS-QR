<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR + Location Checker</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { font-family:sans-serif; text-align:center; background:#f4f6f9; }
#reader { width:300px; margin:auto; }

.card {
    background:#fff; padding:20px; margin:20px auto;
    border-radius:15px; max-width:400px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button {
    margin-top:10px;
    padding:10px;
    width:90%;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    font-size:16px;
}

.ok { color:green; font-weight:bold; }
.bad { color:red; font-weight:bold; }
.warn { color:orange; font-weight:bold; }
</style>
</head>

<body>

<h2>📷 สแกน QR เพื่อตรวจสอบพื้นที่</h2>

<div id="reader"></div>

<button onclick="switchCamera()">🔄 สลับกล้อง</button>

<div class="card">
    <p id="place">รอสแกน...</p>
    <p id="distance"></p>
    <p id="accuracy"></p>
    <p id="status"></p>
</div>

<script>

// ===== DATABASE =====
const locations = [
{ name: "โรงจอดรถด้านหน้าป้อม", lat: 11.225348, lng: 99.538782, url: "chkL1stX9Q2.html" },
{ name: "โรงจอดรถหน้าโรงงาน", lat: 11.225717, lng: 99.538858, url: "001QWER.html" },
{ name: "ป้อมข้างห้องน้ำ", lat: 11.225813, lng: 99.538542, url: "chkL2stX9Q2.html" },
{ name: "ป้อม รปภ. 101", lat: 11.225467, lng: 99.538279, url: "002QWER.html" },
{ name: "ออฟฟิสหน้า SSI", lat: 11.225359, lng: 99.537677, url: "chkL3stX9Q2.html" },
{ name: "ซุ้มศาลาพักผ่อนทางเดินไป Canteen", lat: 11.2254441, lng: 99.537348, url: "chkL4stX9Q2.html" },
{ name: "ออดิทรอเดียม", lat: 11.226557, lng: 99.53779, url: "chkL7stX9Q2.html" },
{ name: "ด้านข้าง Canteen-หน้าห้องน้ำ Canteen", lat: 11.225793, lng: 99.536973, url: "chkL5stX9Q2.html" },
{ name: "ด้านข้าง Canteen-ฝั่งซุ่มกระดังงา", lat: 11.226141, lng: 99.536935, url: "chkL6stX9Q2.html" },
{ name: "ข้าง Fire Station", lat: 11.225385, lng: 99.536293, url: "chkL9stX9Q2.html" },
{ name: "หลังออดิ Lab หลังงาน", lat: 11.226963, lng: 99.537676, url: "chkL8stX9Q2.html" }
];

// ===== สูตรคำนวณระยะ =====
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;

    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180) *
              Math.cos(lat2*Math.PI/180) *
              Math.sin(dLon/2)**2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ===== หลังสแกน =====
function onScanSuccess(decodedText) {

    const place = locations.find(loc => decodedText.includes(loc.url));

    if (!place) {
        document.getElementById("place").innerText = "❌ ไม่รู้จัก QR นี้";
        return;
    }

    document.getElementById("place").innerText = "📍 " + place.name;

    navigator.geolocation.getCurrentPosition(
    function(pos){

        const acc = pos.coords.accuracy;
        const userLat = pos.coords.latitude;
        const userLng = pos.coords.longitude;

        document.getElementById("accuracy").innerText =
            "Accuracy: " + acc.toFixed(0) + " m";

        if (acc > 30) {
            document.getElementById("status").innerText = "⚠️ GPS ไม่แม่น";
            document.getElementById("status").className = "warn";
            return;
        }

        const distance = getDistance(userLat, userLng, place.lat, place.lng);

        document.getElementById("distance").innerText =
            "ระยะ: " + distance.toFixed(2) + " m";

        if (distance <= 20) {
            document.getElementById("status").innerText = "✅ อยู่ในพื้นที่";
            document.getElementById("status").className = "ok";
        } else {
            document.getElementById("status").innerText =
                "❌ นอกพื้นที่ (" + distance.toFixed(0) + " m)";
            document.getElementById("status").className = "bad";
        }

    },
    function(){
        document.getElementById("status").innerText = "❌ ต้องเปิด Location";
    },
    {
        enableHighAccuracy:true,
        timeout:10000,
        maximumAge:0
    });

}

// ===== กล้อง =====
const html5QrCode = new Html5Qrcode("reader");

let cameras = [];
let currentCameraIndex = 0;

// โหลดกล้อง
Html5Qrcode.getCameras().then(devices => {

    if (!devices || devices.length === 0) {
        alert("ไม่พบกล้อง");
        return;
    }

    cameras = devices;

    // เลือกกล้องหลัง
    const backIndex = cameras.findIndex(cam =>
        cam.label.toLowerCase().includes("back") ||
        cam.label.toLowerCase().includes("rear")
    );

    currentCameraIndex = backIndex !== -1 ? backIndex : 0;

    startCamera();
});

// เริ่มกล้อง
function startCamera() {
    html5QrCode.start(
        cameras[currentCameraIndex].id,
        { fps: 10, qrbox: 250 },
        onScanSuccess
    );
}

// สลับกล้อง
function switchCamera() {

    if (cameras.length < 2) {
        alert("มีกล้องเดียว");
        return;
    }

    html5QrCode.stop().then(() => {

        currentCameraIndex =
            (currentCameraIndex + 1) % cameras.length;

        startCamera();

    });

}

</script>

</body>
</html>
