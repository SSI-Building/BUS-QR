<style>

}

}
.status { font-size: 18px; margin-top: 10px; font-weight: bold; }

.bad { color: red; }
.warn { color: orange; }

    border: none;
    border-radius: 10px;
    background: #007bff;
    color: #fff;
    font-size: 16px;
}

</head>

<body>

    <p id="distance"></p>
    <p id="accuracy"></p>
    <div id="status" class="status"></div>

    <input type="file" id="photo" accept="image/*" capture="environment">

    <button id="btnSubmit" onclick="submitData()">ส่งข้อมูล</button>

    <p id="result"></p>
</div>

];

// ===== หา location =====
const currentPage = window.location.href;
const place = locations.find(loc => currentPage.includes(loc.url));

let userLat, userLng, distance = 999;

document.getElementById("place").innerText =
    place ? "📍 " + place.name : "❌ ไม่พบจุด";

// ===== สูตรระยะ =====
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI/180;
    const dLon = (lon2 - lon1) * Math.PI/180;

    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)**2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ===== GPS =====
navigator.geolocation.getCurrentPosition(
function(pos){

    const acc = pos.coords.accuracy;

    document.getElementById("accuracy").innerText =
        "Accuracy: " + acc.toFixed(0) + " m";

    if (acc > 30) {
        document.getElementById("status").innerText = "⚠️ GPS ไม่แม่น";
        document.getElementById("status").className = "warn";
        return;
    }

    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    distance = getDistance(userLat, userLng, place.lat, place.lng);

    document.getElementById("distance").innerText =
        "ระยะ: " + distance.toFixed(2) + " เมตร";

    if (distance <= 20) {
        document.getElementById("status").innerText = "✅ อยู่ในพื้นที่";
        document.getElementById("status").className = "ok";
    } else {
        document.getElementById("status").innerText =
            "❌ นอกพื้นที่ (" + distance.toFixed(0) + " m)";
        document.getElementById("status").className = "bad";
    }

},
function(){
    document.getElementById("status").innerText =
        "❌ ต้องเปิด Location";
},
{
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
}
);

// ===== ส่งข้อมูล =====
function submitData(){

    const file = document.getElementById("photo").files[0];
    const btn = document.getElementById("btnSubmit");

    if (!file) return alert("📸 ถ่ายรูปก่อน");
    if (distance > 20) return alert("❌ อยู่นอกพื้นที่");

    btn.disabled = true;

    const reader = new FileReader();

    reader.onload = function(){

        fetch("YOUR_GOOGLE_SCRIPT_URL", {
            method: "POST",
            body: JSON.stringify({
                location: place.name,
                lat: userLat,
                lng: userLng,
                distance: distance,
                accuracy: document.getElementById("accuracy").innerText,
                time: new Date().toLocaleString(),
                image: reader.result
            })
        })
        .then(() => {
            document.getElementById("result").innerText = "✅ บันทึกสำเร็จ";
        });

    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
