<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Checker Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { 
  --neon-blue: #00f2ff; 
  --neon-green: #39ff14; 
  --neon-red: #ff3131; 
}

body { 
  font-family: 'Segoe UI', Tahoma, sans-serif; 
  background: radial-gradient(circle at top, #111827, #020617);
  color: #e6edf3; 
  margin: 0; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  min-height: 100vh;
}

header {
  width: 100%;
  padding: 18px 0;
  text-align: center;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.4);
}

h2 { 
  margin: 0;
  color: var(--neon-blue); 
}

/* SCANNER */
#reader-wrapper {
  width: 92%;
  max-width: 420px;
  margin-top: 20px;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  background: black;
}

#reader { width: 100%; }

.scan-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.scan-box {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 65%;
  height: 65%;
  transform: translate(-50%, -50%);
  border: 2px solid var(--neon-blue);
  border-radius: 16px;
}

.scan-line {
  position: absolute;
  width: 65%;
  height: 2px;
  background: var(--neon-blue);
  left: 50%;
  transform: translateX(-50%);
  animation: scanMove 2s linear infinite;
}

@keyframes scanMove {
  0% { top: 20%; opacity: 0; }
  50% { opacity: 1; }
  100% { top: 80%; opacity: 0; }
}

#statusText { margin-top: 10px; }

#result {
  width: 90%;
  max-width: 420px;
  margin-top: 20px;
  padding: 18px;
  border-radius: 18px;
  text-align: center;
  display: none;
}

.success { border: 1px solid var(--neon-green); color: var(--neon-green);}
.error { border: 1px solid var(--neon-red); color: var(--neon-red);}
.warning { border: 1px solid #ffcc00; color: #ffcc00;}

#actionButtons { display:none; margin-top:10px; }

.btn {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  margin: 5px;
}
</style>
</head>

<body>

<header>
  <h2>QR CHECKER PRO</h2>
</header>

<div id="reader-wrapper">
  <div id="reader"></div>
  <div class="scan-overlay">
    <div class="scan-box"></div>
    <div class="scan-line"></div>
  </div>
</div>

<p id="statusText">🔍 กำลังสแกน QR...</p>

<div id="result"></div>

<div id="actionButtons">
  <button onclick="restartScan()" class="btn">🔄 สแกนใหม่</button>
  <button onclick="clearResult()" class="btn">🧹 ล้าง</button>
  <button onclick="updateLocation()" class="btn" style="background:#39ff14;">
    📍 อัปเดทตำแหน่ง
  </button>
</div>

<script>
let locations = [];
let userCoords = { lat: 0, lon: 0 };
let scanning = true;
let isCameraRunning = false;
let lastMatch = null;

const html5QrCode = new Html5Qrcode("reader");

// โหลดข้อมูล
async function loadLocations() {
  const res = await fetch("https://script.google.com/macros/s/AKfycbxwp63522RTGXFXcpfiqhmJmPEKpYDol5yzRIxRjDo9T5LMZ-P0crY6l0CFsyFMtdVgCw/exec");
  const data = await res.json();

  locations = data.map(item => ({
    name: item.name,
    lat: parseFloat(item.lat),
    lng: parseFloat(item.lng),
    url: item.url.split("/").pop()
  }));
}

// GPS
navigator.geolocation.watchPosition(pos => {
  userCoords.lat = pos.coords.latitude;
  userCoords.lon = pos.coords.longitude;
});

// start camera
async function startCamera() {
  if (isCameraRunning) return;

  const config = { fps: 15, qrbox: w => ({ width: w*0.7, height: w*0.7 }) };

  await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
  isCameraRunning = true;
}

// scan
async function onScanSuccess(decodedText) {
  if (!scanning) return;
  scanning = false;

  await html5QrCode.stop();
  isCameraRunning = false;

  const result = document.getElementById('result');
  const status = document.getElementById('statusText');
  const buttons = document.getElementById('actionButtons');

  const match = locations.find(i => decodedText.includes(i.url));

  result.style.display = 'block';
  buttons.style.display = 'block';
  status.innerText = "✅ สแกนสำเร็จ";

  if (match) {
    lastMatch = match;

    const d = getDistance(userCoords.lat, userCoords.lon, match.lat, match.lng);

    result.className = d <= 20 ? "success" : "warning";
    result.innerHTML = `
      <strong>${match.name}</strong><br>
      ระยะ: ${d.toFixed(2)} ม.
    `;
  } else {
    result.className = "error";
    result.innerHTML = "❌ QR ไม่ถูกต้อง";
  }
}

// อัปเดทตำแหน่ง
async function updateLocation() {

  if (!lastMatch) {
    alert("❌ ยังไม่มีข้อมูล");
    return;
  }

  if (!userCoords.lat) {
    alert("❌ ไม่มี GPS");
    return;
  }

  if (!confirm("ยืนยันอัปเดทตำแหน่ง?")) return;

  const res = await fetch("https://script.google.com/macros/s/AKfycbxbdQjDtu6da-JIuhHUAVGhohViHvVVALMkIJZItMZWiXUatCR2Sk3U7T4ka8qsUD7N6A/exec", {
    method: "POST",
    body: JSON.stringify({
      action: "updateLocation",
      name: lastMatch.name,
      lat: userCoords.lat,
      lng: userCoords.lon
    }),
    headers: { "Content-Type": "application/json" }
  });

  const data = await res.json();

  if (data.status === "success") {
    alert("✅ อัปเดทสำเร็จ");
  } else {
    alert("❌ ไม่สำเร็จ");
  }
}

// restart
function restartScan() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('actionButtons').style.display = 'none';
  document.getElementById('statusText').innerText = "🔍 กำลังสแกน...";
  scanning = true;
  startCamera();
}

// clear
function clearResult() {
  location.reload();
}

// distance
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

window.onload = async () => {
  await loadLocations();
  startCamera();
};
</script>

</body>
</html>
