<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Checker Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { 
  --blue:#00f2ff; 
  --green:#39ff14; 
  --red:#ff3131; 
  --yellow:#ffcc00;
}

body { 
  font-family:sans-serif; 
  background:#020617; 
  color:#e6edf3; 
  text-align:center; 
  margin:0;
}

header {
  padding:15px;
  background:rgba(0,0,0,0.5);
  color:var(--blue);
  font-weight:bold;
}

#reader {
  width:90%;
  max-width:400px;
  margin:20px auto;
}

#statusText { margin-top:10px; }

#result {
  width:90%;
  max-width:400px;
  margin:20px auto;
  padding:15px;
  border-radius:12px;
  display:none;
}

.success { border:1px solid var(--green); color:var(--green); }
.warning { border:1px solid var(--yellow); color:var(--yellow); }
.error { border:1px solid var(--red); color:var(--red); }

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

#updateBtn { background:var(--yellow); }
#restartBtn { background:var(--blue); color:#000; }
</style>
</head>

<body>

<header>QR CHECKER PRO</header>

<div id="reader"></div>
<p id="statusText">🔍 กำลังเตรียม...</p>

<div id="result"></div>

<div>
  <button id="updateBtn" onclick="updateLocation()" style="display:none;">
    📍 อัปเดทพิกัด
  </button>
  <button id="restartBtn" onclick="restartScan()">
    🔄 สแกนใหม่
  </button>
</div>

<script>
const FIND_API = "https://script.google.com/macros/s/AKfycbxwp63522RTGXFXcpfiqhmJmPEKpYDol5yzRIxRjDo9T5LMZ-P0crY6l0CFsyFMtdVgCw/exec";
const UPDATE_API = "https://script.google.com/macros/s/AKfycbxbdQjDtu6da-JIuhHUAVGhohViHvVVALMkIJZItMZWiXUatCR2Sk3U7T4ka8qsUD7N6A/exec";

let userCoords = { lat:0, lon:0 };
let scanning = true;
let html5QrCode;
let currentUrl = "";

// -------------------
// 📍 GPS
// -------------------
navigator.geolocation.watchPosition(
  pos => {
    userCoords.lat = pos.coords.latitude;
    userCoords.lon = pos.coords.longitude;
  },
  err => console.warn("GPS error:", err),
  { enableHighAccuracy:true }
);

// -------------------
// 📷 START SCANNER
// -------------------
async function startScanner() {
  document.getElementById("statusText").innerText = "🔍 กำลังสแกน...";
  html5QrCode = new Html5Qrcode("reader");

  try {
    await html5QrCode.start(
      { facingMode:"environment" },
      { fps:15, qrbox:250 },
      onScanSuccess
    );
  } catch (err) {
    console.error(err);
    document.getElementById("statusText").innerText = "❌ เปิดกล้องไม่ได้";
  }
}

// -------------------
// ✅ SCAN SUCCESS
// -------------------
async function onScanSuccess(decodedText) {
  if (!scanning) return;
  scanning = false;

  const status = document.getElementById("statusText");
  const result = document.getElementById("result");
  const updateBtn = document.getElementById("updateBtn");

  status.innerText = "⏳ กำลังตรวจสอบ...";

  try { await html5QrCode.stop(); } catch(e){}

  try {
    console.log("QR:", decodedText);

    currentUrl = decodedText; // 🔥 เก็บ URL

    const res = await fetch(FIND_API + "?url=" + encodeURIComponent(decodedText));
    const data = await res.json();

    console.log("API:", data);

    result.style.display = "block";

    if (!data.found) {
      currentUrl = "";
      updateBtn.style.display = "none";

      result.className = "error";
      result.innerHTML = "❌ QR ไม่ถูกต้อง";
      return;
    }

    updateBtn.style.display = "inline-block";

    const d = getDistance(
      userCoords.lat,
      userCoords.lon,
      data.lat,
      data.lng
    );

    result.className = d <= 20 ? "success" : "warning";
    result.innerHTML = `
      <b>${d<=20?"✅ ติดตั้งถูกต้อง":"⚠️ พิกัดไม่ตรง"}</b><br>
      📍 ${data.name}<br>
      ระยะ ${d.toFixed(2)} เมตร
    `;

    status.innerText = "✅ ตรวจสอบแล้ว";

  } catch (err) {
    console.error(err);

    currentUrl = "";

    result.className = "error";
    result.style.display = "block";
    result.innerHTML = "❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้";
  }
}

// -------------------
// 📍 UPDATE LOCATION (ใช้ URL)
// -------------------
async function updateLocation() {

  if (!currentUrl) {
    alert("❌ ต้องสแกนก่อน");
    return;
  }

  if (!userCoords.lat || !userCoords.lon) {
    alert("❌ ยังไม่ได้ตำแหน่ง GPS");
    return;
  }

  if (!confirm("ต้องการอัปเดทพิกัดนี้ใช่หรือไม่?")) return;

  const status = document.getElementById("statusText");
  status.innerText = "⏳ กำลังอัปเดท...";

  try {
    const res = await fetch(
      UPDATE_API +
      "?url=" + encodeURIComponent(currentUrl) +
      "&lat=" + userCoords.lat +
      "&lng=" + userCoords.lon
    );

    const data = await res.json();

    console.log("UPDATE:", data);

    if (data.success) {
      status.innerText = "✅ อัปเดทสำเร็จ (Row " + data.row + ")";
    } else {
      status.innerText = "❌ " + data.message;
    }

  } catch (err) {
    console.error(err);
    status.innerText = "❌ เชื่อมต่อไม่ได้";
  }
}

// -------------------
// 🔄 RESTART
// -------------------
function restartScan() {
  document.getElementById("result").style.display = "none";
  document.getElementById("updateBtn").style.display = "none";
  currentUrl = "";
  scanning = true;
  startScanner();
}

// -------------------
// 📏 DISTANCE
// -------------------
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// -------------------
window.onload = startScanner;
</script>

</body>
</html>
