<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Checker Pro</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { 
  --blue: #00f2ff; 
  --green: #39ff14; 
  --red: #ff3131; 
  --yellow: #ffcc00;
}

body { 
  font-family: sans-serif; 
  background: #020617;
  color: #e6edf3; 
  margin: 0; 
  text-align: center;
}

header {
  padding: 15px;
  background: rgba(0,0,0,0.5);
  color: var(--blue);
  font-weight: bold;
}

#reader {
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
}

#statusText {
  margin-top: 10px;
  opacity: 0.8;
}

#result {
  width: 90%;
  max-width: 400px;
  margin: 20px auto;
  padding: 15px;
  border-radius: 12px;
  display: none;
}

.success { border:1px solid var(--green); color:var(--green); }
.error { border:1px solid var(--red); color:var(--red); }
.warning { border:1px solid var(--yellow); color:var(--yellow); }

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>QR CHECKER PRO</header>

<div id="reader"></div>
<p id="statusText">🔍 กำลังเตรียมกล้อง...</p>

<div id="result"></div>

<button onclick="restartScan()">🔄 สแกนใหม่</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxwp63522RTGXFXcpfiqhmJmPEKpYDol5yzRIxRjDo9T5LMZ-P0crY6l0CFsyFMtdVgCw/exec";

let userCoords = { lat: 0, lon: 0 };
let scanning = true;
let html5QrCode;

// -------------------
// 📍 GPS
// -------------------
navigator.geolocation.watchPosition(
  pos => {
    userCoords.lat = pos.coords.latitude;
    userCoords.lon = pos.coords.longitude;
  },
  err => {
    console.warn("GPS error:", err);
  },
  { enableHighAccuracy: true }
);

// -------------------
// 📷 START CAMERA
// -------------------
async function startScanner() {
  document.getElementById("statusText").innerText = "🔍 กำลังสแกน QR...";

  html5QrCode = new Html5Qrcode("reader");

  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 15, qrbox: 250 },
      onScanSuccess
    );
  } catch (err) {
    console.error(err);
    document.getElementById("statusText").innerText = "❌ เปิดกล้องไม่สำเร็จ";
  }
}

// -------------------
// ✅ SCAN SUCCESS
// -------------------
async function onScanSuccess(decodedText) {
  if (!scanning) return;

  scanning = false;

  const status = document.getElementById("statusText");
  const result = document.getElementById("result");

  status.innerText = "⏳ กำลังตรวจสอบ...";

  try {
    await html5QrCode.stop();
  } catch(e) {}

  try {
    const res = await fetch(API_URL + "?url=" + encodeURIComponent(decodedText));
    const data = await res.json();

    result.style.display = "block";

    if (!data.found) {
      result.className = "error";
      result.innerHTML = "❌ QR ไม่ถูกต้อง";
      return;
    }

    // 📏 คำนวณระยะ
    const d = getDistance(
      userCoords.lat,
      userCoords.lon,
      data.lat,
      data.lng
    );

    if (d <= 20) {
      result.className = "success";
      result.innerHTML = `
        ✅ <b>ติดตั้งถูกต้อง</b><br>
        📍 ${data.name}<br>
        ระยะ ${d.toFixed(2)} เมตร
      `;
    } else {
      result.className = "warning";
      result.innerHTML = `
        ⚠️ <b>พิกัดไม่ตรง</b><br>
        📍 ${data.name}<br>
        ระยะ ${d.toFixed(2)} เมตร
      `;
    }

    status.innerText = "✅ ตรวจสอบเสร็จแล้ว";

  } catch (err) {
    console.error(err);

    result.className = "error";
    result.style.display = "block";
    result.innerHTML = "❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้";
  }
}

// -------------------
// 🔄 RESTART
// -------------------
function restartScan() {
  document.getElementById("result").style.display = "none";
  scanning = true;
  startScanner();
}

// -------------------
// 📏 DISTANCE
// -------------------
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// -------------------
// 🚀 INIT
// -------------------
window.onload = startScanner;

</script>

</body>
</html>
