<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Location Check</title>

<style>
body { font-family: sans-serif; background:#f4f6f9; text-align:center; }
.card {
    background:#fff; padding:20px; margin:20px auto;
    border-radius:15px; max-width:500px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
button {
    width:100%; padding:10px; margin-top:10px;
    border-radius:10px; border:none;
    background:#007bff; color:#fff; font-weight:bold;
}
.ok { color:green; }
.bad { color:red; }
</style>
</head>

<body>

<div class="card">
<h2>📍 ตรวจสอบพื้นที่</h2>

<p id="place">กำลังโหลด...</p>
<p id="distance"></p>
<p id="status"></p>

<input type="file" id="photo" accept="image/*" capture="environment">

<button onclick="submitData()">ส่งข้อมูล</button>

<p id="result"></p>
</div>

<script>

// ===== DATABASE =====
const locations = [
{ name: "โรงจอดรถด้านหน้าป้อม", lat: 11.225348, lng: 99.538782, url: "chkL1stX9Q2.html" },
{ name: "โรงจอดรถหน้าโรงงาน", lat: 11.225717, lng: 99.538858, url: "001QWER.html" },
// 👉 ใส่ทั้งหมดที่คุณมี (ตัวเต็มที่ฉันให้ก่อนหน้า)
];

// ===== หา location =====
const currentPage = window.location.href;
const place = locations.find(loc => currentPage.includes(loc.url));

let userLat, userLng, distance = 999;

document.getElementById("place").innerText = place ? place.name : "❌ ไม่พบจุด";

// ===== สูตรระยะ =====
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;

    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180) *
              Math.cos(lat2*Math.PI/180) *
              Math.sin(dLon/2)**2;

    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// ===== GPS =====
navigator.geolocation.getCurrentPosition(pos => {

    if (pos.coords.accuracy > 30) {
        document.getElementById("status").innerText = "⚠️ GPS ไม่แม่น";
        return;
    }

    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    distance = getDistance(userLat, userLng, place.lat, place.lng);

    document.getElementById("distance").innerText =
        "ระยะ: " + distance.toFixed(2) + " m";

    if (distance <= 20) {
        document.getElementById("status").innerHTML = "✅ อยู่ในพื้นที่";
        document.getElementById("status").className = "ok";
    } else {
        document.getElementById("status").innerHTML = "❌ นอกพื้นที่";
        document.getElementById("status").className = "bad";
    }

});

// ===== ส่งข้อมูล =====
function submitData() {

    const file = document.getElementById("photo").files[0];

    if (!file) return alert("📸 กรุณาถ่ายรูปก่อน");
    if (distance > 20) return alert("❌ อยู่นอกพื้นที่");

    const reader = new FileReader();

    reader.onload = function() {

        fetch("YOUR_GOOGLE_SCRIPT_URL", {
            method: "POST",
            body: JSON.stringify({
                location: place.name,
                lat: userLat,
                lng: userLng,
                distance: distance,
                time: new Date().toLocaleString(),
                image: reader.result
            })
        })
        .then(() => {
            document.getElementById("result").innerText = "✅ บันทึกสำเร็จ";
        });

    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
