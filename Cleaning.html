<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>Employee QR System</title>

<!-- LIFF -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<!-- QRCode -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    box-sizing:border-box;
    -webkit-user-select:none;
    user-select:none;
}

body{

    margin:0;
    padding:20px;
    background:#f3f4f6;
    font-family:sans-serif;
    overflow-x:hidden;

}

.card{

    max-width:500px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);

}

h2{

    text-align:center;
    margin-bottom:20px;
    color:#111827;

}

button{

    width:100%;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    cursor:pointer;
    transition:.2s;

}

button:hover{

    opacity:.9;

}

.login-btn{

    background:#06c755;
    color:#fff;

}

.qr-btn{

    margin-top:15px;
    background:#111827;
    color:#fff;

}

.info-box{

    margin-top:20px;
    background:#f9fafb;
    border-radius:12px;
    padding:15px;
    border:1px solid #e5e7eb;

}

.row{

    margin-bottom:12px;
    word-break:break-all;

}

.label{

    font-weight:bold;

}

.loading{

    text-align:center;
    margin-top:20px;
    color:#6b7280;

}

.error{

    color:red;
    text-align:center;
    margin-top:20px;

}

.success{

    color:#16a34a;
    text-align:center;
    margin-top:15px;
    font-weight:bold;

}

#qrcode{

    margin-top:20px;
    display:flex;
    justify-content:center;

}

.qr-box{

    position:relative;
    display:inline-block;

}

.qr-box img{

    animation:floatQR .8s infinite alternate;

}

@keyframes floatQR{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(-5px);
    }

}

.watermark{

    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) rotate(-20deg);
    font-size:24px;
    font-weight:bold;
    color:rgba(255,0,0,.15);
    pointer-events:none;

}

.qr-link{

    margin-top:15px;
    text-align:center;
    font-size:12px;
    word-break:break-all;
    color:#6b7280;

}

.uuid-box{

    margin-top:15px;
    padding:10px;
    background:#eef2ff;
    border-radius:10px;
    font-size:13px;
    word-break:break-all;
    text-align:center;

}

#countdownArea{

    margin-top:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#dc2626;

}

#liveTime{

    margin-top:10px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    color:#2563eb;

}

.expired{

    color:#dc2626;
    font-weight:bold;
    text-align:center;
    margin-top:20px;

}

</style>

</head>

<body>

<div class="card">

    <h2>Employee QR System</h2>

    <button
        class="login-btn"
        onclick="loginLine()">

        Login with LINE

    </button>

    <div id="result"></div>

</div>

<script>

// ========================================
// CONFIG
// ========================================

const LIFF_ID =
"2007956727-fT3yQmc0";

const FIND_USER_URL =
"https://script.google.com/macros/s/AKfycbw6nPMipi-MAtOo_WCdJG3YV8W5MEevzmSh_91TjaVBXeT6r77zJSjX52_iJHmBbkPk/exec";

const CREATE_QR_URL =
"https://script.google.com/macros/s/AKfycbwELK7MPED2yM2IIYKxEB6el7tNTiL5C6IbPRjKXqUBsRZ_a7MqmWb0VXithGe87Nii/exec";


// ========================================
// GLOBAL
// ========================================

let currentLineUserId = "";
let qrCountdown = null;
let clockTimer = null;
let isQRActive = false;


// ========================================
// DISABLE RIGHT CLICK
// ========================================

document.addEventListener("contextmenu",(e)=>{

    e.preventDefault();

});


// ========================================
// LOGIN
// ========================================

async function loginLine(){

    try{

        document.getElementById("result")
        .innerHTML = `
            <div class="loading">
                กำลังโหลดข้อมูล...
            </div>
        `;

        // INIT LIFF
        await liff.init({

            liffId: LIFF_ID

        });

        // LOGIN
        if(!liff.isLoggedIn()){

            liff.login();
            return;

        }

        // PROFILE
        const profile =
        await liff.getProfile();

        currentLineUserId =
        profile.userId;

        // FIND USER
        const response =
        await fetch(
            `${FIND_USER_URL}?lineUserId=${currentLineUserId}`
        );

        const result =
        await response.json();

        // NOT FOUND
        if(!result.success){

            document.getElementById("result")
            .innerHTML = `
                <div class="error">
                    ${result.message}
                </div>
            `;

            return;

        }

        const data =
        result.data;

        // SHOW USER
        document.getElementById("result")
        .innerHTML = `

            <div class="success">

                Login สำเร็จ

            </div>

            <div class="info-box">

                <div class="row">

                    <span class="label">
                    รหัสพนักงาน :
                    </span>

                    ${data.colA}

                </div>

                <div class="row">

                    <span class="label">
                    ชื่อ-สกุล :
                    </span>

                    ${data.colB}

                </div>

                <div class="row">

                    <span class="label">
                    หน่วยงาน :
                    </span>

                    ${data.colC}

                </div>

                <button
                    class="qr-btn"
                    onclick="createQR()">

                    สร้าง QR Code

                </button>

                <div id="qrcode"></div>

                <div id="liveTime"></div>

                <div id="countdownArea"></div>

                <div id="uuidArea"></div>

                <div id="linkArea"></div>

            </div>

        `;

    }catch(err){

        console.error(err);

        document.getElementById("result")
        .innerHTML = `
            <div class="error">
                ${err}
            </div>
        `;

    }

}


// ========================================
// CREATE QR
// ========================================

async function createQR(){

    try{

        // กันกดซ้ำ
        if(isQRActive){

            alert("QR Code กำลังทำงานอยู่");
            return;

        }

        isQRActive = true;

        // clear เก่า
        clearAll();

        // create qr
        const response =
        await fetch(
            `${CREATE_QR_URL}?lineUserId=${currentLineUserId}`
        );

        const result =
        await response.json();

        if(!result.success){

            alert(result.message);
            isQRActive = false;
            return;

        }

        // ========================================
        // QR AREA
        // ========================================

        const qrArea =
        document.getElementById("qrcode");

        // create qr box
        const qrBox =
        document.createElement("div");

        qrBox.className =
        "qr-box";

        qrArea.appendChild(qrBox);

        // generate qr
        new QRCode(

            qrBox,

            {

                text: result.qrText,

                width:250,
                height:250

            }

        );

        // watermark
        const watermark =
        document.createElement("div");

        watermark.className =
        "watermark";

        watermark.innerText =
        "LIVE";

        qrBox.appendChild(watermark);

        // ========================================
        // UUID
        // ========================================

        document.getElementById("uuidArea")
        .innerHTML = `

            <div class="uuid-box">

                <b>UUID</b><br><br>

                ${result.uuid}

            </div>

        `;

        // ========================================
        // LINK
        // ========================================

        document.getElementById("linkArea")
        .innerHTML = `

            <div class="qr-link">

                ${result.qrText}

            </div>

        `;

        // ========================================
        // CLOCK
        // ========================================

        updateClock();

        clockTimer =
        setInterval(()=>{

            updateClock();

        },1000);

        // ========================================
        // COUNTDOWN
        // ========================================

        let timeLeft = 30;

        document.getElementById("countdownArea")
        .innerHTML =
        `หมดอายุใน ${timeLeft} วินาที`;

        qrCountdown =
        setInterval(()=>{

            timeLeft--;

            document.getElementById("countdownArea")
            .innerHTML =
            `หมดอายุใน ${timeLeft} วินาที`;

            // EXPIRE
            if(timeLeft <= 0){

                clearInterval(qrCountdown);
                clearInterval(clockTimer);

                qrCountdown = null;
                clockTimer = null;

                clearAll();

                document.getElementById("countdownArea")
                .innerHTML = `
                    <div class="expired">
                        QR Code หมดอายุแล้ว
                    </div>
                `;

                isQRActive = false;

            }

        },1000);

    }catch(err){

        console.error(err);

        alert(err);

        isQRActive = false;

    }

}


// ========================================
// CLOCK
// ========================================

function updateClock(){

    const now =
    new Date();

    document.getElementById("liveTime")
    .innerHTML =
    now.toLocaleTimeString("th-TH");

}


// ========================================
// CLEAR
// ========================================

function clearAll(){

    document.getElementById("qrcode")
    .innerHTML = "";

    document.getElementById("uuidArea")
    .innerHTML = "";

    document.getElementById("linkArea")
    .innerHTML = "";

    document.getElementById("liveTime")
    .innerHTML = "";

    document.getElementById("countdownArea")
    .innerHTML = "";

}

</script>

</body>
</html>
