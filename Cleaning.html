<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Employee Login</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    background:#f5f5f5;
    font-family:sans-serif;
}

.card{

    max-width:450px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);

}

h2{
    text-align:center;
}

button{

    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;

}

.login-btn{

    background:#06c755;
    color:#fff;

}

.qr-btn{

    background:#111827;
    color:#fff;
    margin-top:15px;

}

.info-box{

    margin-top:20px;
    background:#f9fafb;
    border-radius:12px;
    padding:15px;

}

.row{

    margin-bottom:10px;
    word-break:break-all;

}

.label{

    font-weight:bold;

}

</style>

</head>
<body>

<div class="card">

    <h2>Employee Login</h2>

    <button class="login-btn"
    onclick="loginLine()">

        Login with LINE

    </button>

    <div id="result"></div>

</div>

<script>

const LIFF_ID =
"2008493818-oyVC6yBI";

const GAS_URL =
"https://script.google.com/macros/s/XXXXXXXXXXXXXXXXXXXX/exec";



// ================= LOGIN =================
async function loginLine(){

    // init LIFF
    await liff.init({
        liffId: LIFF_ID
    });

    // login
    if(!liff.isLoggedIn()){

        liff.login();
        return;
    }

    // profile
    const profile =
      await liff.getProfile();

    const lineUserId =
      profile.userId;

    console.log(lineUserId);

    // ===== ส่งไป Apps Script =====
    const response = await fetch(GAS_URL,{

        method:"POST",

        body:JSON.stringify({
            lineUserId:lineUserId
        })

    });

    const result =
      await response.json();

    // ===== ไม่พบ =====
    if(!result.success){

        document.getElementById("result")
        .innerHTML = `

            <div class="info-box">

                ${result.message}

            </div>

        `;

        return;
    }

    // ===== แสดงข้อมูล =====
    const data = result.data;

    document.getElementById("result")
    .innerHTML = `

        <div class="info-box">

            <div class="row">
                <span class="label">
                Column A:
                </span>
                ${data.colA}
            </div>

            <div class="row">
                <span class="label">
                Column B:
                </span>
                ${data.colB}
            </div>

            <div class="row">
                <span class="label">
                Column C:
                </span>
                ${data.colC}
            </div>

            <div class="row">
                <span class="label">
                Column D:
                </span>
                ${data.colD}
            </div>

            <button class="qr-btn">

                สร้าง QR Code

            </button>

        </div>

    `;
}

</script>

</body>
</html>
