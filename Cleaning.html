<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>BUS QR System</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #4f46e5; --line-green: #06c755; --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); --card-bg: rgba(255, 255, 255, 0.9); --text-main: #1f2937; --text-muted: #6b7280; --success: #10b981; --danger: #ef4444; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; transition: all 0.2s ease; }
        body { margin: 0; padding: 12px; background: var(--bg-gradient); font-family: 'Prompt', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card { width: 100%; max-width: 360px; margin: auto; background: var(--card-bg); border-radius: 24px; padding: 20px 18px; box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.08); border: 1px solid rgba(255, 255, 255, 0.7); }
        .brand-section { text-align: center; margin-bottom: 15px; }
        .brand-logo-container { position: relative; width: 50px; height: 50px; background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; margin: 0 auto 8px auto; box-shadow: 0 8px 16px -4px rgba(79, 70, 229, 0.3); }
        h2 { margin: 0; color: var(--text-main); font-weight: 700; font-size: 21px; letter-spacing: -0.5px; }
        .brand-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        button { width: 100%; border: none; border-radius: 12px; padding: 12px 15px; font-size: 15px; font-family: 'Prompt', sans-serif; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; color: white; }
        .login-btn { background: var(--line-green); }
        .qr-btn { margin-top: 12px; background: var(--primary); }
        .info-box { margin-top: 15px; background: rgba(248, 250, 252, 0.6); border-radius: 16px; padding: 14px; border: 1px solid rgba(241, 245, 249, 0.8); }
        .info-title { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; text-align: center; margin-bottom: 8px; }
        .row { margin-bottom: 6px; font-size: 14px; color: #4b5563; display: flex; justify-content: space-between; }
        .success { color: var(--success); text-align: center; margin-top: 6px; margin-bottom: 10px; font-weight: 600; font-size: 14px; }
        #qrcode { margin-top: 15px; display: flex; justify-content: center; }
        .qr-box { position: relative; background: white; padding: 12px; border-radius: 16px; border: 1px solid #e2e8f0; }
        .qr-box canvas, .qr-box img { width: 180px !important; height: 180px !important; }
        #countdownArea { margin-top: 12px; text-align: center; font-size: 14px; font-weight: 500; color: var(--text-muted); }
        #countdownArea span.time-num { color: var(--danger); font-weight: 700; font-size: 16px; }
        
        /* 🌟 หน้าจอติดเชื้อ (Infect Screen) 🌟 */
        #infectScreen { display: none; text-align: center; }
        #infectScreen h1 { font-size: 60px; margin: 0; color: #10b981; }
        #infectScreen p { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div id="infectScreen">
        <h1>✅</h1>
        <h2>ยืนยันอุปกรณ์สำเร็จ</h2>
        <p>ระบบจดจำอุปกรณ์ของคุณเรียบร้อยแล้ว<br>กรุณากดปุ่มด้านล่างเพื่อกลับไปใช้งาน</p>
        <button class="login-btn" onclick="window.location.href='https://line.me/R/app/2007956727-fT3yQmc0'"><i class="fa-solid fa-arrow-right-to-bracket"></i> กลับเข้าสู่แอป LINE</button>
    </div>

    <div id="appScreen">
        <div class="brand-section">
            <div class="brand-logo-container"><i class="fa-solid fa-city"></i></div>
            <h2>BUS QR System</h2>
            <div class="brand-subtitle">Building & Utility Service System</div>
        </div>
        <button class="login-btn" onclick="loginLine()"><i class="fa-brands fa-line"></i> Login with LINE</button>
        <div id="result"></div>
    </div>
</div>

<script>
const LIFF_ID = "2007956727-fT3yQmc0";
const API_URL = "https://script.google.com/macros/s/AKfycbxXBx3J64GaNQORciPtSiYcLA87q3x9fzAM1Jqhv4rZ24EbNDH1gZz3ip4tFFkdFXor/exec";
let currentLineUserId = "";

// 🌟 สร้างหรือดึง Device ID ประจำเครื่อง
function getOrCreateDeviceId() {
    let deviceId = localStorage.getItem("bus_system_device_id");
    if (!deviceId) {
        deviceId = `DEV-${Math.random().toString(36).substring(2, 11).toUpperCase()}`;
        localStorage.setItem("bus_system_device_id", deviceId);
    }
    return deviceId;
}

// 🌟 ดักจับไวรัส (Infection Payload) ถ้าถูกดีดมาที่เบราว์เซอร์นอก
const urlParams = new URLSearchParams(window.location.search);
const infectId = urlParams.get('infect');

if (infectId) {
    // 💥 ทำการฝัง Device ID ลงเบราว์เซอร์นอก แล้วโชว์ปุ่มให้กลับเข้า LINE 💥
    localStorage.setItem("bus_system_device_id", infectId);
    document.getElementById("appScreen").style.display = "none";
    document.getElementById("infectScreen").style.display = "block";
}

// 🌟 ระบบเข้าสู่ระบบปกติในแอป LINE
async function loginLine() {
    document.getElementById("result").innerHTML = `<div style="text-align:center; color:gray; margin-top:15px;"><i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลด...</div>`;
    
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    // 🌟 ดึงข้อมูลและตรวจสอบการติดเชื้อ
    const deviceId = getOrCreateDeviceId();
    const isInfected = localStorage.getItem("is_infected");

    // ถ้าพนักงานคนนี้ยังไม่เคยติดเชื้อ ให้ดีดตัวออกไปเบราว์เซอร์นอกเพื่อฝังรหัสทันที
    if (!isInfected) {
        localStorage.setItem("is_infected", "true");
        const currentUrl = window.location.href.split('?')[0]; 
        liff.openWindow({ url: `${currentUrl}?infect=${deviceId}`, external: true });
        
        document.getElementById("result").innerHTML = `
            <div style="color:#ef4444; font-weight:bold; margin-top:15px; text-align:center;">
                <i class="fa-solid fa-up-right-from-square"></i> กรุณากด "กลับเข้าสู่แอป LINE" ที่หน้าเว็บที่เด้งขึ้นมา
            </div>`;
        return; 
    }

    // ถ้าติดเชื้อแล้ว ให้แสดง UI ที่สวยงามปกติ
    currentLineUserId = (await liff.getProfile()).userId;
    const response = await fetch(`${API_URL}?action=findUser&lineUserId=${currentLineUserId}&deviceId=${deviceId}`);
    const result = await response.json();

    if (!result.success) {
        document.getElementById("result").innerHTML = `<div style="color:red; text-align:center; margin-top:15px;">${result.message}</div>`;
        return;
    }

    const data = result.data;
    document.getElementById("result").innerHTML = `
        <div class="success"><i class="fa-solid fa-circle-check"></i> เข้าสู่ระบบสำเร็จ</div>
        <div class="info-box">
            <div class="info-title">ข้อมูลผู้ใช้งาน</div>
            <div class="row"><span class="label">รหัสพนักงาน</span><span class="value" style="color: var(--primary);">${data.colA}</span></div>
            <div class="row"><span class="label">ชื่อ-สกุล</span><span class="value">${data.colB}</span></div>
            <button class="qr-btn" onclick="createQR()"><i class="fa-solid fa-qrcode"></i> สร้าง QR Code</button>
            <div id="qrcode"></div><div id="countdownArea"></div>
        </div>
    `;
}

// ระบบสร้าง QR แบบดั้งเดิม
async function createQR() {
    document.getElementById("qrcode").innerHTML = "";
    const response = await fetch(`${API_URL}?action=createQR&lineUserId=${currentLineUserId}`);
    const result = await response.json();
    
    if (result.success) {
        const qrBox = document.createElement("div");
        qrBox.className = "qr-box";
        document.getElementById("qrcode").appendChild(qrBox);
        new QRCode(qrBox, { text: result.qrText, width: 180, height: 180, colorDark : "#111827", colorLight : "#ffffff" });
        
        let timeLeft = 30;
        document.getElementById("countdownArea").innerHTML = `หมดอายุใน <span class="time-num">${timeLeft}</span> วินาที`;
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft >= 0) {
                document.getElementById("countdownArea").innerHTML = `หมดอายุใน <span class="time-num">${timeLeft}</span> วินาที`;
            } else {
                clearInterval(countdown);
                document.getElementById("qrcode").innerHTML = "";
                document.getElementById("countdownArea").innerHTML = "<div style='color:red; font-weight:bold;'>QR Code หมดอายุแล้ว</div>";
            }
        }, 1000);
    }
}
</script>
</body>
</html>
