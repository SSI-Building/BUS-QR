<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Employee QR System</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* {
    box-sizing: border-box;
    -webkit-user-select: none;
    user-select: none;
}

body {
    margin: 0;
    padding: 20px;
    /* เปลี่ยนสีพื้นหลังเป็น Gradient ให้ดูมีมิติ */
    background: linear-gradient(135deg, #f0fdf4 0%, #e0e7ff 100%);
    font-family: 'Prompt', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    width: 100%;
    max-width: 420px;
    margin: auto;
    background: #ffffff;
    border-radius: 24px;
    padding: 30px 25px;
    /* เพิ่มเงาแบบนุ่มนวล (Soft Shadow) */
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
    border: 1px solid rgba(255, 255, 255, 0.8);
}

h2 {
    text-align: center;
    margin-top: 0;
    margin-bottom: 25px;
    color: #111827;
    font-weight: 700;
    font-size: 24px;
}

button {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 16px;
    font-size: 16px;
    font-family: 'Prompt', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

button:active {
    transform: translateY(0);
}

.login-btn {
    background: #06c755;
    color: #fff;
    box-shadow: 0 4px 12px rgba(6, 199, 85, 0.2);
}

.qr-btn {
    margin-top: 15px;
    background: #4f46e5;
    color: #fff;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
}

.info-box {
    margin-top: 20px;
    background: #f8fafc;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid #f1f5f9;
}

.row {
    margin-bottom: 12px;
    font-size: 15px;
    color: #4b5563;
}

.row:last-child {
    margin-bottom: 0;
}

.label {
    font-weight: 600;
    color: #1f2937;
    margin-right: 5px;
}

.loading {
    text-align: center;
    margin-top: 20px;
    color: #6b7280;
    font-weight: 400;
}

.error {
    color: #ef4444;
    text-align: center;
    margin-top: 20px;
    background: #fef2f2;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
}

.success {
    color: #10b981;
    text-align: center;
    margin-top: 10px;
    margin-bottom: 15px;
    font-weight: 600;
    font-size: 16px;
}

#qrcode {
    margin-top: 25px;
    display: flex;
    justify-content: center;
}

.qr-box {
    position: relative;
    display: inline-block;
    background: white;
    padding: 15px;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

.qr-box img {
    animation: floatQR 2s ease-in-out infinite alternate;
}

@keyframes floatQR {
    from { transform: translateY(0px); }
    to { transform: translateY(-6px); }
}

/* ปรับ Watermark ให้เป็น Badge ทันสมัย */
.watermark {
    position: absolute;
    top: -10px;
    right: -10px;
    background: #ef4444;
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
}

#countdownArea {
    margin-top: 15px;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    color: #ef4444;
}

#liveTime {
    margin-top: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #4f46e5;
    letter-spacing: 1px;
}

.expired {
    color: #ef4444;
    font-weight: 700;
    text-align: center;
    margin-top: 20px;
    background: #fef2f2;
    padding: 15px;
    border-radius: 12px;
}
</style>
</head>

<body>

<div class="card">
    <h2>Employee QR System</h2>

    <button class="login-btn" onclick="loginLine()">
        Login with LINE
    </button>

    <div id="result"></div>
</div>

<script>

// ========================================
// CONFIG
// ========================================

const LIFF_ID = "2007956727-fT3yQmc0";

const FIND_USER_URL = "https://script.google.com/macros/s/AKfycbxXBx3J64GaNQORciPtSiYcLA87q3x9fzAM1Jqhv4rZ24EbNDH1gZz3ip4tFFkdFXor/exec";
const CREATE_QR_URL = "https://script.google.com/macros/s/AKfycbxXBx3J64GaNQORciPtSiYcLA87q3x9fzAM1Jqhv4rZ24EbNDH1gZz3ip4tFFkdFXor/exec";

// ========================================
// GLOBAL
// ========================================

let currentLineUserId = "";
let qrCountdown = null;
let clockTimer = null;
let isQRActive = false;

// ========================================
// DISABLE RIGHT CLICK
// ========================================

document.addEventListener("contextmenu", (e) => {
    e.preventDefault();
});

// ========================================
// LOGIN
// ========================================

async function loginLine() {
    try {
        document.getElementById("result").innerHTML = `
            <div class="loading">
                ⏳ กำลังโหลดข้อมูล...
            </div>
        `;

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }

        const profile = await liff.getProfile();
        currentLineUserId = profile.userId;

        const response = await fetch(
            `${FIND_USER_URL}?action=findUser&lineUserId=${currentLineUserId}`
        );
        const result = await response.json();

        if (!result.success) {
            document.getElementById("result").innerHTML = `
                <div class="error">
                    ${result.message}
                </div>
            `;
            return;
        }

        const data = result.data;

        // SHOW USER (ซ่อนคอลัมน์ C หรือ "หน่วยงาน" แล้ว)
        document.getElementById("result").innerHTML = `
            <div class="success">
                ✔ เข้าสู่ระบบสำเร็จ
            </div>

            <div class="info-box">
                <div class="row">
                    <span class="label">รหัสพนักงาน :</span>
                    <span style="color: #4f46e5; font-weight: 700;">${data.colA}</span>
                </div>
                <div class="row">
                    <span class="label">ชื่อ-สกุล :</span>
                    ${data.colB}
                </div>
                
                <button class="qr-btn" onclick="createQR()">
                    สร้าง QR Code
                </button>

                <div id="qrcode"></div>
                <div id="liveTime"></div>
                <div id="countdownArea"></div>
            </div>
        `;

    } catch (err) {
        console.error(err);
        document.getElementById("result").innerHTML = `
            <div class="error">เกิดข้อผิดพลาด: ${err}</div>
        `;
    }
}

// ========================================
// CREATE QR
// ========================================

async function createQR() {
    try {
        if (isQRActive) {
            alert("QR Code กำลังทำงานอยู่");
            return;
        }

        isQRActive = true;
        clearAll();

        const response = await fetch(
            `${CREATE_QR_URL}?action=createQR&lineUserId=${currentLineUserId}`
        );
        const result = await response.json();

        if (!result.success) {
            alert(result.message);
            isQRActive = false;
            return;
        }

        // QR AREA
        const qrArea = document.getElementById("qrcode");
        const qrBox = document.createElement("div");
        qrBox.className = "qr-box";
        qrArea.appendChild(qrBox);

        // GENERATE QR
        new QRCode(qrBox, {
            text: result.qrText,
            width: 220,
            height: 220,
            colorDark : "#111827",
            colorLight : "#ffffff",
        });

        // WATERMARK BADGE
        const watermark = document.createElement("div");
        watermark.className = "watermark";
        watermark.innerText = "LIVE";
        qrBox.appendChild(watermark);

        // หมายเหตุ: ลบการสร้าง HTML ของ UUID และ ลิงก์ URL ออกเรียบร้อยแล้ว

        // CLOCK
        updateClock();
        clockTimer = setInterval(() => {
            updateClock();
        }, 1000);

        // COUNTDOWN
        let timeLeft = 30;
        document.getElementById("countdownArea").innerHTML = `หมดอายุใน ${timeLeft} วินาที`;

        qrCountdown = setInterval(() => {
            timeLeft--;
            document.getElementById("countdownArea").innerHTML = `หมดอายุใน ${timeLeft} วินาที`;

            // EXPIRE
            if (timeLeft <= 0) {
                clearInterval(qrCountdown);
                clearInterval(clockTimer);
                qrCountdown = null;
                clockTimer = null;
                clearAll();

                document.getElementById("countdownArea").innerHTML = `
                    <div class="expired">
                        ✖ QR Code หมดอายุแล้ว
                    </div>
                `;
                isQRActive = false;
            }
        }, 1000);

    } catch (err) {
        console.error(err);
        alert(err);
        isQRActive = false;
    }
}

// ========================================
// CLOCK
// ========================================

function updateClock() {
    const now = new Date();
    document.getElementById("liveTime").innerHTML = now.toLocaleTimeString("th-TH");
}

// ========================================
// CLEAR
// ========================================

function clearAll() {
    document.getElementById("qrcode").innerHTML = "";
    document.getElementById("liveTime").innerHTML = "";
    document.getElementById("countdownArea").innerHTML = "";
}

</script>

</body>
</html>
