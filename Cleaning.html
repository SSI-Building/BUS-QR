<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Employee QR</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
    font-family:sans-serif;
    background:#f5f5f5;
    padding:20px;
    text-align:center;
}

.card{
    max-width:400px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

button{
    background:#06c755;
    color:#fff;
    border:none;
    padding:14px 25px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
}

#qrcode{
    margin-top:25px;
    display:flex;
    justify-content:center;
}

.user-box{
    margin-top:20px;
    text-align:left;
    background:#f8f8f8;
    padding:15px;
    border-radius:12px;
}

</style>

</head>
<body>

<div class="card">

<h2>Employee QR</h2>

<button onclick="startLogin()">
Login with LINE
</button>

<div id="userInfo"></div>

<div id="createBtn"></div>

<div id="qrcode"></div>

</div>

<script>

const LIFF_ID = "2008493818-oyVC6yBI";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbxhZ556pdsczPWHuJ31rC30ApPMulXsecjdPeT8xWv1ivEbrV7sKR6RLfWjz6OLZmPN/exec";

let currentLineUserId = "";



// ================= LOGIN =================
async function startLogin(){

    await liff.init({
        liffId: LIFF_ID
    });

    if(!liff.isLoggedIn()){

        liff.login();
        return;
    }

    const profile = await liff.getProfile();

    currentLineUserId = profile.userId;

    checkUser();
}



// ================= CHECK USER =================
async function checkUser(){

    const response = await fetch(GAS_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"checkUser",
            lineUserId:currentLineUserId

        })

    });

    const result = await response.json();

    // ===== ไม่พบ =====
    if(!result.success){

        document.getElementById("userInfo").innerHTML =
        result.message;

        return;
    }

    // ===== แสดงข้อมูล =====
    document.getElementById("userInfo").innerHTML = `

        <div class="user-box">

            <p><b>รหัสพนักงาน:</b> ${result.empId}</p>

            <p><b>ชื่อ:</b> ${result.fullName}</p>

            <p><b>LINE ID:</b><br>${result.lineId}</p>

        </div>

    `;

    // ===== ปุ่มสร้าง QR =====
    document.getElementById("createBtn").innerHTML = `

        <button onclick="createQR()">

            สร้าง QR Code

        </button>

    `;
}



// ================= CREATE QR =================
async function createQR(){

    const response = await fetch(GAS_URL,{

        method:"POST",

        body:JSON.stringify({

            action:"createQR",
            lineUserId:currentLineUserId

        })

    });

    const result = await response.json();

    if(!result.success){

        alert("เกิดข้อผิดพลาด");
        return;
    }

    // ===== clear QR เดิม =====
    document.getElementById("qrcode").innerHTML = "";

    // ===== สร้าง QR =====
    new QRCode(document.getElementById("qrcode"), {

        text: result.qrText,

        width: 250,
        height: 250

    });

}

</script>

</body>
</html>
