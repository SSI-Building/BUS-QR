<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Employee QR System</title>

<!-- LIFF SDK -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<!-- QRCode -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    box-sizing:border-box;
}

body{

    margin:0;
    padding:20px;
    background:#f3f4f6;
    font-family:sans-serif;

}

.card{

    max-width:500px;
    margin:auto;
    background:#ffffff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);

}

h2{

    text-align:center;
    margin-bottom:20px;
    color:#111827;

}

button{

    width:100%;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    cursor:pointer;
    transition:.2s;

}

button:hover{

    opacity:.9;

}

.login-btn{

    background:#06c755;
    color:#fff;

}

.qr-btn{

    margin-top:15px;
    background:#111827;
    color:#fff;

}

.info-box{

    margin-top:20px;
    background:#f9fafb;
    border-radius:12px;
    padding:15px;
    border:1px solid #e5e7eb;

}

.row{

    margin-bottom:12px;
    word-break:break-all;
    font-size:15px;

}

.label{

    font-weight:bold;
    color:#111827;

}

.loading{

    text-align:center;
    margin-top:20px;
    color:#6b7280;

}

.error{

    color:red;
    text-align:center;
    margin-top:20px;

}

.success{

    color:#16a34a;
    text-align:center;
    margin-top:15px;
    font-weight:bold;

}

#qrcode{

    margin-top:20px;
    display:flex;
    justify-content:center;

}

.qr-link{

    margin-top:15px;
    text-align:center;
    font-size:13px;
    word-break:break-all;
    color:#374151;

}

.uuid-box{

    margin-top:15px;
    padding:10px;
    background:#eef2ff;
    border-radius:10px;
    font-size:13px;
    word-break:break-all;
    text-align:center;

}

</style>

</head>

<body>

<div class="card">

    <h2>Employee QR System</h2>

    <button
        class="login-btn"
        onclick="loginLine()">

        Login with LINE

    </button>

    <div id="result"></div>

</div>



<script>

// ========================================
// CONFIG
// ========================================

const LIFF_ID =
"2007956727-fT3yQmc0";


// ========================================
// SCRIPT 1
// FIND USER
// ========================================
const FIND_USER_URL =
"https://script.google.com/macros/s/AKfycbw6nPMipi-MAtOo_WCdJG3YV8W5MEevzmSh_91TjaVBXeT6r77zJSjX52_iJHmBbkPk/exec";


// ========================================
// SCRIPT 2
// CREATE QR
// ========================================
const CREATE_QR_URL =
"https://script.google.com/macros/s/AKfycbwELK7MPED2yM2IIYKxEB6el7tNTiL5C6IbPRjKXqUBsRZ_a7MqmWb0VXithGe87Nii/exec";


// ========================================
// GLOBAL
// ========================================
let currentLineUserId = "";



// ========================================
// LOGIN
// ========================================
async function loginLine(){

    try{

        // ===== loading =====
        document.getElementById("result")
        .innerHTML = `
            <div class="loading">
                กำลังโหลดข้อมูล...
            </div>
        `;

        // ========================================
        // INIT LIFF
        // ========================================
        await liff.init({
            liffId: LIFF_ID
        });

        // ========================================
        // LOGIN
        // ========================================
        if(!liff.isLoggedIn()){

            liff.login();
            return;

        }

        // ========================================
        // PROFILE
        // ========================================
        const profile =
        await liff.getProfile();

        // ========================================
        // LINE USER ID
        // ========================================
        const lineUserId =
        profile.userId;

        currentLineUserId =
        lineUserId;

        console.log(lineUserId);

        // ========================================
        // FETCH USER
        // ========================================
        const response =
        await fetch(
            `${FIND_USER_URL}?lineUserId=${lineUserId}`
        );

        // ========================================
        // TEXT
        // ========================================
        const text =
        await response.text();

        console.log(text);

        // ========================================
        // JSON
        // ========================================
        const result =
        JSON.parse(text);

        // ========================================
        // FAIL
        // ========================================
        if(!result.success){

            document.getElementById("result")
            .innerHTML = `

                <div class="error">

                    ${result.message}

                </div>

            `;

            return;

        }

        // ========================================
        // DATA
        // ========================================
        const data =
        result.data;

        // ========================================
        // SHOW USER
        // ========================================
        document.getElementById("result")
        .innerHTML = `

            <div class="success">

                Login สำเร็จ

            </div>

            <div class="info-box">

                <div class="row">

                    <span class="label">
                        รหัสพนักงาน :
                    </span>

                    ${data.colA}

                </div>

                <div class="row">

                    <span class="label">
                        ชื่อ - สกุล :
                    </span>

                    ${data.colB}

                </div>

                <div class="row">

                    <span class="label">
                        หน่วยงาน :
                    </span>

                    ${data.colC}

                </div>

                <div class="row">

                    <span class="label">
                        LINE User ID :
                    </span>

                    ${data.colD}

                </div>

                <button
                    class="qr-btn"
                    onclick="createQR()">

                    สร้าง QR Code

                </button>

                <div id="qrcode"></div>

                <div id="uuidArea"></div>

                <div id="linkArea"></div>

            </div>

        `;

    }catch(err){

        console.error(err);

        document.getElementById("result")
        .innerHTML = `

            <div class="error">

                ${err}

            </div>

        `;

    }

}



// ========================================
// CREATE QR
// ========================================
async function createQR(){

    try{

        // ========================================
        // CLEAR OLD
        // ========================================
        document.getElementById("qrcode")
        .innerHTML = "";

        document.getElementById("uuidArea")
        .innerHTML = "";

        document.getElementById("linkArea")
        .innerHTML = "";

        // ========================================
        // FETCH CREATE QR
        // ========================================
        const response =
        await fetch(

            `${CREATE_QR_URL}?lineUserId=${currentLineUserId}`

        );

        // ========================================
        // TEXT
        // ========================================
        const text =
        await response.text();

        console.log(text);

        // ========================================
        // JSON
        // ========================================
        const result =
        JSON.parse(text);

        // ========================================
        // FAIL
        // ========================================
        if(!result.success){

            alert(result.message);
            return;

        }

        // ========================================
        // GENERATE QR
        // ========================================
        new QRCode(

            document.getElementById("qrcode"),

            {

                text: result.qrText,

                width:250,
                height:250

            }

        );

        // ========================================
        // UUID
        // ========================================
        document.getElementById("uuidArea")
        .innerHTML = `

            <div class="uuid-box">

                <b>UUID</b><br><br>

                ${result.uuid}

            </div>

        `;

        // ========================================
        // LINK
        // ========================================
        document.getElementById("linkArea")
        .innerHTML = `

            <div class="qr-link">

                ${result.qrText}

            </div>

        `;

    }catch(err){

        console.error(err);

        alert(err);

    }

}

</script>

</body>
</html>
