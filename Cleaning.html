<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Employee QR System</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { margin: 0; padding: 20px; background: linear-gradient(135deg, #f0fdf4 0%, #e0e7ff 100%); font-family: 'Prompt', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 100%; max-width: 420px; background: #ffffff; border-radius: 24px; padding: 30px 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 25px; color: #111827; font-weight: 700; font-size: 24px; }
        button { width: 100%; border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .login-btn { background: #06c755; color: #fff; }
        .qr-btn { margin-top: 15px; background: #4f46e5; color: #fff; }
        .info-box { margin-top: 20px; background: #f8fafc; border-radius: 16px; padding: 20px; border: 1px solid #f1f5f9; }
        .row { margin-bottom: 12px; font-size: 15px; color: #4b5563; }
        .label { font-weight: 600; color: #1f2937; margin-right: 5px; }
        .loading { text-align: center; margin-top: 20px; color: #6b7280; }
        .error { color: #ef4444; text-align: center; margin-top: 20px; background: #fef2f2; padding: 12px; border-radius: 10px; }
        .success { color: #10b981; text-align: center; margin: 10px 0; font-weight: 600; }
        #qrcode { margin-top: 25px; display: flex; justify-content: center; }
        .qr-box { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); position: relative; }
        .watermark { position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; font-size: 12px; padding: 4px 10px; border-radius: 20px; }
        #countdownArea { margin-top: 15px; text-align: center; font-weight: 600; color: #ef4444; }
        #liveTime { margin-top: 20px; text-align: center; font-size: 22px; font-weight: 700; color: #4f46e5; }
        .expired { color: #ef4444; font-weight: 700; text-align: center; margin-top: 20px; background: #fef2f2; padding: 15px; border-radius: 12px; }
    </style>
</head>

<body>
<div class="card">
    <h2>Employee QR System</h2>
    <button class="login-btn" onclick="loginLine()">Login with LINE</button>
    <div id="result"></div>
</div>

<script>
    const LIFF_ID = "2007956727-fT3yQmc0";
    const URL_SCRIPT = "ใส่ URL ของคุณที่นี่"; // 🌟 ใส่ URL ของ Google Apps Script ที่นี่
    let currentLineUserId = "";
    let currentUUID = "";
    let isQRActive = false;

    async function loginLine() {
        document.getElementById("result").innerHTML = `<div class="loading">⏳ กำลังโหลด...</div>`;
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        currentLineUserId = profile.userId;

        const res = await fetch(`${URL_SCRIPT}?action=findUser&lineUserId=${currentLineUserId}`);
        const result = await res.json();

        if (!result.success) {
            document.getElementById("result").innerHTML = `<div class="error">${result.message}</div>`;
            return;
        }

        document.getElementById("result").innerHTML = `
            <div class="success">✔ เข้าสู่ระบบสำเร็จ</div>
            <div class="info-box">
                <div class="row"><span class="label">รหัส :</span> ${result.data.colA}</div>
                <div class="row"><span class="label">ชื่อ :</span> ${result.data.colB}</div>
                <button class="qr-btn" onclick="createQR()">สร้าง QR Code</button>
                <div id="qrcode"></div>
                <div id="liveTime"></div>
                <div id="countdownArea"></div>
            </div>
        `;
    }

    async function createQR() {
        if (isQRActive) return;
        isQRActive = true;
        document.getElementById("qrcode").innerHTML = "";

        const res = await fetch(`${URL_SCRIPT}?action=createQR&lineUserId=${currentLineUserId}`);
        const result = await res.json();
        currentUUID = result.uuid;

        const qrBox = document.createElement("div");
        qrBox.className = "qr-box";
        new QRCode(qrBox, { text: result.qrText, width: 200, height: 200 });
        qrBox.innerHTML += `<div class="watermark">LIVE</div>`;
        document.getElementById("qrcode").appendChild(qrBox);

        let timeLeft = 30;
        let timer = setInterval(async () => {
            timeLeft--;
            document.getElementById("countdownArea").innerText = `หมดอายุใน ${timeLeft} วินาที`;
            document.getElementById("liveTime").innerText = new Date().toLocaleTimeString("th-TH");

            if (timeLeft <= 0) {
                clearInterval(timer);
                checkStatus(currentUUID);
            }
        }, 1000);
    }

    async function checkStatus(uuid) {
        document.getElementById("qrcode").innerHTML = "";
        document.getElementById("countdownArea").innerText = "กำลังตรวจสอบสถานะ...";
        
        const res = await fetch(`${URL_SCRIPT}?action=checkStatus&uuid=${uuid}`);
        const result = await res.json();

        if (result.status === "SAVED") {
            document.getElementById("countdownArea").innerHTML = `<div style="color: #10b981; font-weight:700;">✅ บันทึกเวลาเรียบร้อย</div>`;
        } else {
            document.getElementById("countdownArea").innerHTML = `<div class="expired">✖ QR Code หมดอายุ</div>`;
        }
        isQRActive = false;
    }
</script>
</body>
</html>
