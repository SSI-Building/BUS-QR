<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>BUS QR System</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root { --primary: #4f46e5; --line-green: #06c755; --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); --card-bg: rgba(255, 255, 255, 0.9); --text-main: #1f2937; --danger: #ef4444; }
* { box-sizing: border-box; -webkit-user-select: none; user-select: none; font-family: 'Prompt', sans-serif; }
body { margin: 0; padding: 12px; background: var(--bg-gradient); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { width: 100%; max-width: 360px; background: var(--card-bg); border-radius: 24px; padding: 20px 18px; box-shadow: 0 15px 30px -10px rgba(0,0,0,0.08); text-align: center; }
button { width: 100%; border: none; border-radius: 12px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; color: white; }
.login-btn { background: var(--line-green); }
.qr-btn { background: var(--primary); }
.infect-btn { background: #f59e0b; animation: pulse 2s infinite; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
.info-box { margin-top: 15px; background: rgba(248, 250, 252, 0.6); border-radius: 16px; padding: 14px; text-align: left; }
.success { color: #10b981; font-weight: 600; margin-bottom: 10px; }
#qrcode { display: flex; justify-content: center; margin-top: 15px; }
.qr-box { background: white; padding: 12px; border-radius: 16px; border: 1px solid #e2e8f0; }
.qr-box img { width: 180px; height: 180px; }
#countdownArea { margin-top: 12px; text-align: center; color: #6b7280; font-size: 14px; }
#countdownArea span { color: var(--danger); font-weight: 700; }
</style>
</head>

<body>
<div class="card">
    <h2>BUS QR System</h2>
    <p style="font-size: 12px; color: #6b7280;">Building & Utility Service</p>
    <button class="login-btn" onclick="loginLine()"><i class="fa-brands fa-line"></i> Login with LINE</button>
    <div id="result"></div>
</div>

<script>
const LIFF_ID = "2007956727-fT3yQmc0";
const API_URL = "https://script.google.com/macros/s/AKfycbxXBx3J64GaNQORciPtSiYcLA87q3x9fzAM1Jqhv4rZ24EbNDH1gZz3ip4tFFkdFXor/exec";

let currentLineUserId = "";
let deviceId = "";

function getOrCreateDeviceId() {
    deviceId = localStorage.getItem("bus_system_device_id");
    if (!deviceId) {
        deviceId = `DEV-${Math.random().toString(36).substring(2, 11).toUpperCase()}`;
        localStorage.setItem("bus_system_device_id", deviceId);
    }
    return deviceId;
}

async function loginLine() {
    document.getElementById("result").innerHTML = `<div>กำลังโหลด...</div>`;
    getOrCreateDeviceId();

    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    currentLineUserId = (await liff.getProfile()).userId;

    const res = await fetch(`${API_URL}?action=findUser&lineUserId=${currentLineUserId}&deviceId=${deviceId}`);
    const result = await res.json();

    if (!result.success) {
        document.getElementById("result").innerHTML = `<div style="color:red;">${result.message}</div>`;
        return;
    }

    // 🌟 ตรวจสอบว่าพนักงานเคยกดฝังเชื้อใส่ Chrome หรือยัง?
    const isInfected = localStorage.getItem("is_chrome_infected");

    let html = `
        <div class="success">✔ เข้าสู่ระบบสำเร็จ</div>
        <div class="info-box">รหัสพนักงาน: <b>${result.data.colA}</b><br>ชื่อ: <b>${result.data.colB}</b></div>
    `;

    if (!isInfected) {
        // บังคับให้เปิดเบราว์เซอร์นอกเพื่อฝังรหัส Device ID
        html += `
            <div style="margin-top:15px; font-size:13px; color:#ef4444; font-weight:bold;">
                ⚠️ กรุณายืนยันการเชื่อมต่ออุปกรณ์ (ทำครั้งแรกครั้งเดียว)
            </div>
            <button class="infect-btn" onclick="infectBrowser()">
                <i class="fa-solid fa-mobile-screen"></i> ยืนยันอุปกรณ์
            </button>
        `;
    } else {
        html += `<button class="qr-btn" onclick="createQR()">สร้าง QR Code</button>
                 <div id="qrcode"></div><div id="countdownArea"></div>`;
    }
    document.getElementById("result").innerHTML = html;
}

// 🌟 ฟังก์ชันดีดออกเบราว์เซอร์นอก พร้อมส่ง Device ID ไปฝัง
function infectBrowser() {
    localStorage.setItem("is_chrome_infected", "true");
    // ห้อยพารามิเตอร์ ?infect=DEV-XXX ไปด้วย
    const infectUrl = `https://ssi-building.github.io/BUS-QR/Test.html?infect=${deviceId}`;
    liff.openWindow({ url: infectUrl, external: true });
    
    setTimeout(() => { location.reload(); }, 2000); // รีเฟรชหน้าตัวเองเพื่อให้ปุ่ม QR โผล่มา
}

async function createQR() {
    document.getElementById("qrcode").innerHTML = "";
    const res = await fetch(`${API_URL}?action=createQR&lineUserId=${currentLineUserId}`);
    const result = await res.json();
    
    if (result.success) {
        new QRCode(document.getElementById("qrcode"), { text: result.qrText, width: 180, height: 180 });
        let timeLeft = 30;
        const countdown = setInterval(() => {
            timeLeft--;
            document.getElementById("countdownArea").innerHTML = `หมดอายุใน <span>${timeLeft}</span> วินาที`;
            if (timeLeft <= 0) { clearInterval(countdown); document.getElementById("qrcode").innerHTML = "<div style='color:red;'>หมดอายุแล้ว</div>"; }
        }, 1000);
    }
}
</script>
</body>
</html>
