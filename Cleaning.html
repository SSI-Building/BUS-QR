<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Employee Login</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{

    margin:0;
    padding:20px;
    background:#f3f4f6;
    font-family:sans-serif;

}

.card{

    max-width:450px;
    margin:auto;
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);

}

h2{

    text-align:center;
    margin-bottom:20px;

}

button{

    width:100%;
    border:none;
    border-radius:12px;
    padding:15px;
    font-size:16px;
    cursor:pointer;

}

.login-btn{

    background:#06c755;
    color:#fff;

}

.qr-btn{

    margin-top:15px;
    background:#111827;
    color:#fff;

}

.info-box{

    margin-top:20px;
    background:#f9fafb;
    border-radius:12px;
    padding:15px;

}

.row{

    margin-bottom:10px;
    word-break:break-all;

}

.label{

    font-weight:bold;

}

.loading{

    text-align:center;
    margin-top:20px;

}

</style>

</head>

<body>

<div class="card">

    <h2>Employee Login</h2>

    <button class="login-btn"
    onclick="loginLine()">

        Login with LINE

    </button>

    <div id="result"></div>

</div>



<script>



// ========================================
// CONFIG
// ========================================

const LIFF_ID =
"2008493818-oyVC6yBI";

const GAS_URL =
"https://script.google.com/macros/s/AKfycbw6nPMipi-MAtOo_WCdJG3YV8W5MEevzmSh_91TjaVBXeT6r77zJSjX52_iJHmBbkPk/exec";



// ========================================
// LOGIN
// ========================================
async function loginLine(){

    try{

        // ===== loading =====
        document.getElementById("result")
        .innerHTML = `
            <div class="loading">
                กำลังโหลด...
            </div>
        `;

        // ===== init LIFF =====
        await liff.init({
            liffId: LIFF_ID
        });

        // ===== login =====
        if(!liff.isLoggedIn()){

            liff.login();
            return;
        }

        // ===== get profile =====
        const profile =
          await liff.getProfile();

        // ===== line user id =====
        const lineUserId =
          profile.userId;

        console.log("LINE USER ID:");
        console.log(lineUserId);

        alert(lineUserId);

        // ===== fetch GAS =====
        const response =
          await fetch(GAS_URL,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                lineUserId:lineUserId
            })

        });

        // ===== text =====
        const text =
          await response.text();

        console.log(text);

        // ===== json =====
        const result =
          JSON.parse(text);

        // ===== fail =====
        if(!result.success){

            document.getElementById("result")
            .innerHTML = `

                <div class="info-box">

                    ${result.message}

                </div>

            `;

            return;
        }

        // ===== data =====
        const data = result.data;

        // ===== show =====
        document.getElementById("result")
        .innerHTML = `

            <div class="info-box">

                <div class="row">

                    <span class="label">
                    Column A:
                    </span>

                    ${data.colA}

                </div>

                <div class="row">

                    <span class="label">
                    Column B:
                    </span>

                    ${data.colB}

                </div>

                <div class="row">

                    <span class="label">
                    Column C:
                    </span>

                    ${data.colC}

                </div>

                <div class="row">

                    <span class="label">
                    Column D:
                    </span>

                    ${data.colD}

                </div>

                <button class="qr-btn">

                    สร้าง QR Code

                </button>

            </div>

        `;

    }catch(err){

        console.error(err);

        document.getElementById("result")
        .innerHTML = `

            <div class="info-box">

                ${err}

            </div>

        `;
    }
}

</script>

</body>
</html>
