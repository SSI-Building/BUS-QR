<button onclick="testUpload()">
UPLOAD TEST
</button>

<script>

const API =
"https://script.google.com/macros/s/AKfycbxD1vjQCuiFQvVb6L-t9t7K5GjyR_pfg7lfY8GUohH3hZOYb4S9tZhROxgLOAvfl5jw/exec";

// ================= CAPTURE =================
async function captureSelfie(){

    try{

        console.log("OPEN CAMERA");

        // เปิดกล้อง
        const stream =
            await navigator.mediaDevices.getUserMedia({

                video:{
                    facingMode:"user"
                },

                audio:false
            });

        // ================= VIDEO =================
        const video =
            document.createElement("video");

        video.srcObject = stream;

        video.autoplay = true;

        video.playsInline = true;

        video.muted = true;

        // รอให้กล้องเปิดจริง
        await new Promise(
            r=>setTimeout(r,1500)
        );

        console.log("CAMERA READY");

        // ================= CANVAS =================
        const canvas =
            document.createElement("canvas");

        canvas.width = 640;

        canvas.height = 480;

        const ctx =
            canvas.getContext("2d");

        ctx.drawImage(
            video,
            0,
            0,
            640,
            480
        );

        console.log("DRAW IMAGE");

        // ปิดกล้อง
        stream
            .getTracks()
            .forEach(t=>t.stop());

        // ================= BASE64 =================
        const base64 =
            canvas.toDataURL(
                "image/jpeg",
                0.3
            );

        console.log("BASE64 OK");

        return base64;

    }catch(err){

        console.error(err);

        alert(err);

        return "";
    }
}

// ================= TEST UPLOAD =================
async function testUpload(){

    try{

        console.log("START");

        // ถ่ายรูป
        const selfie =
            await captureSelfie();

        console.log("SELFIE READY");

        if(!selfie){

            alert("ถ่ายรูปไม่สำเร็จ");

            return;
        }

        console.log("FETCH START");

        // ส่งไป Apps Script
        const res =
            await fetch(API,{

                method:"POST",

                body:JSON.stringify({

                    selfie:selfie

                })
            });

        console.log("FETCH DONE");

        const text =
            await res.text();

        console.log(text);

        alert(text);

    }catch(err){

        console.error(err);

        alert(
            "ERROR : " + err
        );
    }
}

</script>
